      example:
        - penalty-001
        - penalty-002
      items:
        type: string
        description: List of penalty plan codes in order
        example: '["penalty-001","penalty-002"]'
    ProductStatus:
      type: string
      description: Product status
      example: ACTIVE
      enum:
        - ACTIVE
        - INACTIVE
    ProductType:
      type: string
      description: Product type
      example: BNPL
      enum:
        - BNPL
        - PERSONAL
        - BUSINESS
    ProductVersionV2:
      type: integer
      format: int64
      description: Product version
      example: 1762434786787
    LoansRates:
      type: object
      description: >-
        Loan rates including annual interest rate and effective annual and
        monthly costs
      properties:
        interest_rate:
          $ref: '#/components/schemas/LoanInterestRate'
        annual_interest_rate:
          $ref: '#/components/schemas/AnnualInterestRate'
        effective_monthly_cost:
          $ref: '#/components/schemas/EffectiveMonthlyCost'
        effective_annual_cost:
          $ref: '#/components/schemas/EffectiveAnnualCost'
    LoanInterestRate:
      type: number
      format: double
      description: Loan interest rate
      example: 12
    AnnualInterestRate:
      type: number
      format: double
      description: Annual interest rate
      example: 12
    EffectiveMonthlyCost:
      type: number
      format: double
      description: Effective monthly cost of the loan in configured currency
      example: 12.7
    EffectiveAnnualCost:
      type: number
      format: double
      description: Effective annual cost of the loan in configured currency
      example: 319.98
    LoanDisbursement:
      type: object
      description: Disbursement details for the loan
      properties:
        type:
          $ref: '#/components/schemas/LoanDisbursementType'
        schedule:
          $ref: '#/components/schemas/LoanDisbursementSchedule'
    LoanDisbursementType:
      type: string
      description: Disbursement type
      example: SINGLE
      enum:
        - SINGLE
        - MULTIPLE
    LoanDisbursementSchedule:
      type: array
      description: List of disbursement schedules
      items:
        $ref: '#/components/schemas/DisbursementScheduleItem'
    DisbursementScheduleItem:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/LoanDisbursementID'
        amount:
          $ref: '#/components/schemas/LoanDisbursementAmount'
        date:
          $ref: '#/components/schemas/LoanDisbursementDate'
        disbursement_account:
          $ref: '#/components/schemas/LoanDisbursementAccount'
        authorization_id:
          $ref: '#/components/schemas/LoanAuthorizationID'
        tracking_id:
          $ref: '#/components/schemas/TrackingID'
        status:
          $ref: '#/components/schemas/LoanDisbursementStatus'
        transactions_ids:
          $ref: '#/components/schemas/TransactionsIDs'
    LoanDisbursementID:
      type: string
      format: uuid
      description: Disbursement ID
      example: 54efa995-66f1-4595-9934-5b92222faf37
    LoanDisbursementAmount:
      type: number
      format: double
      description: Disbursement amount
      example: 300
    LoanDisbursementDate:
      type: string
      format: date
      description: Disbursement date
      example: '2025-11-13'
    LoanDisbursementAccount:
      type: object
      properties:
        account_type:
          type: string
          description: Account type
          example: INTERNAL
          enum:
            - INTERNAL
            - EXTERNAL
        account_id:
          type: integer
          format: int64
          description: Account ID
          example: 317890964
    LoanAuthorizationID:
      type: integer
      format: int64
      description: Authorization ID
      example: 2422410859
    TrackingID:
      type: string
      format: uuid
      description: Tracking ID
      example: 003b3de8-c321-464c-a3dd-6009b8698325
    LoanDisbursementStatus:
      type: string
      description: Disbursement status
      example: PAID
      enum:
        - SCHEDULED
        - PROCESSING
        - CANCELED
        - EXPIRED
        - PAID
    TransactionsIDs:
      type: array
      items:
        type: integer
        format: int64
      description: List of transaction IDs
      example:
        - 6354273849
        - 982393773
    ReduceOption:
      description: Defines the way that the outstanding loan amount is reduced.
      type: string
      example: INSTALLMENT
      enum:
        - INSTALLMENT
        - TERM
    ReduceOptionsArray:
      description: >
        List of options to define how to reduce an outstanding loan amount.
        `INSTALLMENT` reduces the installment amounts over time but keeps the
        same maturity date. `TERM` applies the prepayment amount to reduce the
        loan term (duration), changing the loan maturity date. With either
        option, if the amount paid is not enough to cover a full installment
        amount, it partially pays the installment based on the prepayment
        hierarchy settings.
      type: array
      minItems: 1
      uniqueItems: true
      items:
        $ref: '#/components/schemas/ReduceOption'
      example:
        - INSTALLMENT
        - TERM
    PenaltyV2:
      description: Penalty configuration for early settlement or prepayment
      type: object
      required:
        - type
        - value
      properties:
        type:
          $ref: '#/components/schemas/PenaltyType'
        value:
          $ref: '#/components/schemas/PenaltyValue'
    PenaltyType:
      description: Type of penalty calculation
      type: string
      example: PERCENTAGE
      enum:
        - PERCENTAGE
        - FIXED_AMOUNT
    PenaltyValue:
      description: >-
        Penalty value. For `PERCENTAGE` penalty type, enter a value between 0
        and 1 (such as 0.05 for 5%). For `FIXED_AMOUNT` penalty type, enter the
        fixed amount value.
      type: number
      format: double
      minimum: 0
      example: 0.05
    RepaymentAmount:
      type: number
      format: double
      description: Repayment amount
      example: 100
    RepaidAmount:
      type: number
      format: double
      description: Repaid amount
      example: 100
    RepaymentDate:
      type: string
      description: Repayment date. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-30'
    RepaymentID:
      type: string
      description: Repayment ID
      format: uuid
      example: 5c075cc6-8dc2-4fe6-9ed7-cf5687d4e834
    RepaymentHierarchyCodeV2:
      maxLength: 80
      minLength: 1
      type: string
      description: >-
        Repayment hierarchy code. Must be normalized (Unicode NFC), and may
        contain a UUID, or uppercase letters, numbers, and underscore.
      example: RH001
    GracePeriodDays:
      description: >-
        Number of calendar days after the installment due date during which late
        fees and delinquency are not applied. A value of `0` or omitted
        indicates no grace period.
      type: integer
      format: int32
      minimum: 0
      maximum: 365
      example: 7
    DaysPastDue:
      description: >-
        Number of calendar days elapsed since the real due date of the loan's
        most overdue repayment. Computed from repayments currently in a past due
        or overdue status. A value of `0` indicates the loan has no past due or
        overdue repayments.
      type: integer
      format: int32
      minimum: 0
      example: 12
    MinimumTotalPayment:
      description: Minimum total payment for the loan product. Must be positive.
      type: number
      format: double
      minimum: 0
      exclusiveMinimum: 0
      example: 50
    MinimumTotalPaymentDelta:
      description: >-
        Additional amount added to the repayment to cover the minimum total
        payment requirement
      type: number
      format: double
      minimum: 0
      example: 43.46
    LoanAllocationSummary:
      type: object
      description: Summary of a loan allocation within a group payment
      properties:
        loan_id:
          type: string
          description: Loan ID
        loan_start_date:
          type: string
          format: date-time
          description: Loan start date
        installment_amount:
          type: number
          format: double
          description: Installment amount allocated
        minimum_total_payment_delta:
          $ref: '#/components/schemas/MinimumTotalPaymentDelta'
    LoanProductV2Parameters:
      type: object
      description: Loan product V2 parameters
      properties:
        stop_accrual_number_of_days:
          description: >-
            Number of days after which interest accrual stops on overdue
            installments
          type: number
          format: int32
          minimum: 1
          maximum: 365
          example: 60
        overdue_threshold_days:
          description: Number of days before the account is considered overdue
          type: number
          format: int32
          minimum: 1
          maximum: 365
          example: 30
    HierarchyCode:
      type: string
      description: >-
        Repayment hierarchy code. Must be unique and can contain alphanumeric
        characters, hyphens, and underscores.
      maxLength: 80
      minLength: 1
      example: CR008
    HierarchyV2:
      type: array
      description: >-
        List that defines the repayment priority order using the order items are
        listed. Determines which loan components are paid first during repayment
        processing. All seven items are required.
      minItems: 7
      maxItems: 7
      uniqueItems: true
      items:
        type: string
        enum:
          - PRINCIPAL
          - INTEREST
          - TAX
          - FEE
          - CHARGE
          - PENALTY
          - INSURANCE
      example:
        - PRINCIPAL
        - INTEREST
        - TAX
        - FEE
        - CHARGE
        - PENALTY
        - INSURANCE
    RepaymentHierarchyV2Request:
      required:
        - hierarchy_code
        - hierarchy
      type: object
      properties:
        hierarchy_code:
          $ref: '#/components/schemas/HierarchyCode'
        hierarchy:
          $ref: '#/components/schemas/HierarchyV2'
    RepaymentHierarchyV2Response:
      required:
        - hierarchy_code
      type: object
      properties:
        hierarchy_code:
          type: string
          description: Repayment hierarchy code
          example: CR008
    GetRepaymentHierarchyV2Response:
      required:
        - hierarchy_code
        - hierarchy
        - status
      type: object
      properties:
        hierarchy_code:
          $ref: '#/components/schemas/HierarchyCode'
        hierarchy:
          $ref: '#/components/schemas/HierarchyV2'
        status:
          $ref: '#/components/schemas/HierarchyStatus'
    HierarchyStatus:
      type: string
      description: Repayment hierarchy status
      enum:
        - ENABLED
        - DISABLED
        - DELETED
      example: ENABLED
    OriginalLoanID:
      type: string
      description: >-
        Original loan ID. When a loan is created from a restructure, this field
        contains the ID of the original loan that was restructured.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    RestructureLoanID:
      type: string
      description: >-
        Restructure loan ID. When a loan has been restructured, this field
        contains the ID of the new loan created from the restructure.
      format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    ErrorCode:
      type: string
      description: Lending error code
      example: ELND0001
    ErrorMessage:
      type: string
      example: Unexpected error
      description: Lending error message
    AuthorizationResponseCode:
      type: string
      description: Payment Methods - Response Code
      example: '62'
      minLength: 2
      maxLength: 2
    AuthorizationDenialCode:
      type: string
      description: Payment Methods - Denial Code
      example: IAD
      minLength: 3
      maxLength: 5
    StandardErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/ErrorMessage'
    StandardAuthorizationErrorResponse:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/ErrorMessage'
        response_code:
          $ref: '#/components/schemas/AuthorizationResponseCode'
        denial_code:
          $ref: '#/components/schemas/AuthorizationDenialCode'
    TaxAmount:
      type: number
      format: double
      example: 10
      description: Tax amount
    TotalAmount:
      type: number
      format: double
      example: 2072
      description: Total amount
    TotalExpectedPaymentAmount:
      type: number
      format: double
      description: >-
        Total expected payment amount for the loan including principal,
        interest, fees, and penalty (if applied)
      example: 1100
    TotalPayable:
      type: object
      properties:
        principal:
          $ref: '#/components/schemas/PrincipalAmount'
        interest:
          $ref: '#/components/schemas/InterestAmount'
        fee:
          $ref: '#/components/schemas/FeeAmount'
        tax:
          $ref: '#/components/schemas/TaxAmount'
        charge:
          $ref: '#/components/schemas/ChargeAmount'
        penalty:
          $ref: '#/components/schemas/PenaltyAmount'
        total:
          $ref: '#/components/schemas/TotalAmount'
        amount_due:
          type: object
          properties:
            principal:
              $ref: '#/components/schemas/PrincipalAmount'
            interest:
              $ref: '#/components/schemas/InterestAmount'
            fee:
              $ref: '#/components/schemas/FeeAmount'
            tax:
              $ref: '#/components/schemas/TaxAmount'
            charge:
              $ref: '#/components/schemas/ChargeAmount'
            penalty:
              $ref: '#/components/schemas/PenaltyAmount'
            total:
              $ref: '#/components/schemas/TotalAmount'
        arrears:
          type: object
          properties:
            principal:
              $ref: '#/components/schemas/PrincipalAmount'
            interest:
              $ref: '#/components/schemas/InterestAmount'
            fee:
              $ref: '#/components/schemas/FeeAmount'
            tax:
              $ref: '#/components/schemas/TaxAmount'
            charge:
              $ref: '#/components/schemas/ChargeAmount'
            penalty:
              $ref: '#/components/schemas/PenaltyAmount'
            total:
              $ref: '#/components/schemas/TotalAmount'
    TransactionsID:
      type: array
      description: List of transactions IDs
      items:
        type: string
        description: Transaction ID
        example: c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
    PrepaymentV2Request:
      required:
        - repayment_ids
      type: object
      properties:
        repayment_ids:
          $ref: '#/components/schemas/PrepaymentRepaymentDetails'
        expiration_date:
          $ref: '#/components/schemas/ExpirationDate'
        reference_date:
          $ref: '#/components/schemas/ReferenceDate'
        metadata:
          $ref: '#/components/schemas/PrepaymentMetadata'
    PrepaymentMetadata:
      type: object
      description: >
        Additional prepayment information


        **Note**: This field must not be used to send Personally Identifiable
        Information (PII), Payment Card Industry (PCI) data, or any
        sensitive/regulated information. Metadata fields are intended for
        operational, non-sensitive data only. For sensitive data, use the
        specific parameters designed for that purpose. For more information,
        refer to [Get started with Pismo APIs](ref:get-started-with-pismo-apis).
      additionalProperties:
        type: string
        description: Additional property
    PrepaymentV2Response:
      type: object
      description: Prepayment response
      properties:
        prepayment_id:
          type: string
          format: uuid
          example: c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
          description: Prepayment ID
        expected_amount:
          type: number
          format: double
          example: 100
          description: Expected amount to be paid
        insurance:
          type: object
          description: Insurance prepayment details (if applicable)
          properties:
            prepayment_id:
              type: string
              format: uuid
              description: Insurance prepayment ID
            expected_amount:
              type: number
              format: double
              description: Expected insurance amount to be paid
        allocation_summary:
          type: array
          description: >-
            List of summarized loan allocations with minimum total payment
            deltas, which represent the difference between the borrower's actual
            payment and the scheduled installment amount, applied as a principal
            reduction on the loan.
          example:
            - loan_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
              loan_start_date: '2025-01-15T00:00:00.000Z'
              installment_amount: 156.54
              minimum_total_payment_delta: 43.46
            - loan_id: b2c3d4e5-f6a7-8901-bcde-f12345678901
              loan_start_date: '2025-03-01T00:00:00.000Z'
              installment_amount: 200
              minimum_total_payment_delta: 0
          items:
            $ref: '#/components/schemas/LoanAllocationSummary'
    PrepaymentRepaymentDetails:
      type: array
      description: List of repayments to be paid in the current prepayment
      items:
        type: string
        description: Repayments to be paid
      example:
        - c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
        - jdu55ks2-7d9c-4099-aaf4-9ee002tkl554
    ExpirationDate:
      type: string
      description: Expiration date of the prepayment. Format = YYYY-MM-DD.
      format: date
      example: '2025-04-28'
    ReferenceDate:
      type: string
      description: Reference date of the installment. Format = YYYY-MM-DD.
      format: date
      example: '2025-04-14'
    UpdateLoanProductV2Request:
      type: object
      description: >-
        Request body for updating a loan product. Only provided fields will be
        updated.
      properties:
        product_name:
          $ref: '#/components/schemas/ProductName'
        loan_activation_method:
          $ref: '#/components/schemas/LoanProductLoanActivationMethod'
        disbursement_method:
          $ref: '#/components/schemas/LoanProductV2DisbursementMethod'
        parameters:
          $ref: '#/components/schemas/LoanProductV2Parameters'
        interest_plan_ids:
          $ref: '#/components/schemas/InterestPlanIDs'
        processing_codes:
          $ref: '#/components/schemas/UpdateProcessingCodes'
        minimum_total_payment:
          description: >-
            Minimum total payment for the loan product. Set to "null" to remove.
            Must be positive if provided.
          anyOf:
            - $ref: '#/components/schemas/MinimumTotalPayment'
            - type: 'null'
          example: 50
    UpdateProcessingCodes:
      type: object
      description: Processing codes to update. Only provided fields will be updated.
      properties:
        booking:
          type: array
          description: List of booking processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: List of repayment processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        present_value_discount:
          type: array
          description: List of present value discount processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_accruals:
          type: array
          description: List of penalty accruals processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_waiver:
          type: array
          description: List of penalty waiver processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        restructuring:
          type: array
          description: List of restructuring processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        insurance:
          $ref: '#/components/schemas/InsurancePC'
        disbursement:
          $ref: '#/components/schemas/DisbursementPC'
        prepayment:
          $ref: '#/components/schemas/PrepaymentPC'
        early_final_settlement:
          $ref: '#/components/schemas/EfsPC'
    LoansV2PaginatedResponse:
      type: object
      required:
        - has_next
        - items
      properties:
        has_next:
          $ref: '#/components/schemas/HasNext'
        next_cursor:
          $ref: '#/components/schemas/NextCursor'
        items:
          type: array
          items:
            $ref: '#/components/schemas/LendingLoanRepaymentResponse'
    LoansV2SummaryResponse:
      type: object
      required:
        - loan_summary
      properties:
        loan_summary:
          $ref: '#/components/schemas/LoanSummary'
    LoanSummary:
      type: object
      description: Aggregated loan data for the account matching the applied filters
      required:
        - loan_count_by_status
        - loan_value_by_status
        - total_loan_count
        - total_loan_value
        - total_outstanding
        - total_paid
        - total_principal
      properties:
        loan_count_by_status:
          type: object
          description: Number of loans per loan status for the account
          example:
            ACTIVE: 3
            SETTLED: 2
          additionalProperties:
            type: integer
            format: int32
        loan_value_by_status:
          type: object
          description: >-
            Sum of the original booked loan amount per loan status for the
            account
          example:
            ACTIVE: 8000
            SETTLED: 5000
          additionalProperties:
            type: number
            format: double
        total_loan_count:
          type: integer
          format: int32
          description: Total number of loans for the account
          example: 5
        total_loan_value:
          type: number
          format: double
          description: Sum of the original booked loan amount across all account loans
          example: 13000
        total_outstanding:
          type: number
          format: double
          description: Sum of the amount due across all unpaid installments for the account
          example: 8000
        total_paid:
          type: number
          format: double
          description: >-
            Sum of the amount paid across all fully paid installments for the
            account
          example: 5000
        total_principal:
          type: number
          format: double
          description: >-
            Sum of the principal component of the booked loan amount across all
            account loans
          example: 10000
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
security:
  - BearerAuth: []
paths:
  /v2/accounts/{accountId}/loans:
    get:
      tags:
        - Loans
      summary: List account loans
      description: >
        Retrieve all loans associated with the specified account.


        **Note**: This endpoint requires an [account-specific access
        token](ref:get-an-account-specific-token-basic-authentication).
      operationId: getLoansByAccountIdV2
      parameters:
        - $ref: '#/components/parameters/AccountIdPath'
        - $ref: '#/components/parameters/NextCursorQueryCamelCase'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/StatusQuery'
        - $ref: '#/components/parameters/ExpandQuery'
        - $ref: '#/components/parameters/PresentValueQuery'
        - $ref: '#/components/parameters/ReferenceDateQuery'
        - $ref: '#/components/parameters/FromCreatedDateQuery'
        - $ref: '#/components/parameters/ToCreatedDateQuery'
        - $ref: '#/components/parameters/FromStartDateQuery'
        - $ref: '#/components/parameters/ToStartDateQuery'
        - $ref: '#/components/parameters/SummarizeLoansQuery'
      responses:
        '200':
          description: Loans retrieved
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoansV2PaginatedResponse'
                  - $ref: '#/components/schemas/LoansV2SummaryResponse'
              examples:
                Paginated response:
                  summary: >-
                    Paginated list of loans (default, when summarizeLoans is
                    omitted or false)
                  value:
                    has_next: true
                    next_cursor: >-
                      NmI5NmNlYzUtZTg1Ni00MjY0LTlkNzctNGY5OGIzNTk4YWM1IzE3NDU5NDY2MTg3NTIjMjAyNS0wNC0yOVQxNzoxMDoxOC43MjY3MTY0Mlo
                    items:
                      - loan_id: MY_CUSTOM_LOAN_ID
                        account_id: 514751581
                        external_id: my_external_id
                        loan_amount: 2000
                        total_payable:
                          principal: 1800
                          interest: 200
                        product_id: 2717a296-124a-47cc-b2a1-91e80dc723eb
                        start_date: '2022-06-28'
                        status: ACTIVE
                        created_at: '2024-03-15T13:00:00.000+00:00'
                        updated_at: '2024-03-15T13:00:00.000+00:00'
                Summary response:
                  summary: Aggregated loan summary (when summarizeLoans is true)
                  value:
                    loan_summary:
                      loan_count_by_status:
                        ACTIVE: 3
                        SETTLED: 2
                      loan_value_by_status:
                        ACTIVE: 8000
                        SETTLED: 5000
                      total_loan_count: 5
                      total_loan_value: 13000
                      total_outstanding: 8000
                      total_paid: 5000
                      total_principal: 10000
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND1802:
                  description: fromCreatedDate is after toCreatedDate.
                  value:
                    code: ELND1802
                    message: >-
                      Field fromCreatedDate must be before or equal to
                      toCreatedDate.
                ELND1803:
                  description: fromStartDate is after toStartDate.
                  value:
                    code: ELND1803
                    message: >-
                      Field fromStartDate must be before or equal to
                      toStartDate.
                ELND1804:
                  description: summarizeLoans is not a valid boolean value.
                  value:
                    code: ELND1804
                    message: summarizeLoans must be a valid boolean value.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
      security:
        - BearerAuth: []
  /v2/loan-products/{productId}:
    get:
      tags:
        - Loan products
      summary: Get loan product
