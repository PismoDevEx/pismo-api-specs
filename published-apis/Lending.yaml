  /v2/loans/{originalLoanId}/restructure:
    post:
      tags:
        - Loans
      summary: Restructure a loan
      description: Restructures an existing loan based on provided details.
      operationId: restructureLoan
      parameters:
        - name: originalLoanId
          in: path
          required: true
          description: The ID of the original loan to restructure
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - installment_plan_id
                - loan_product_id
                - number_of_installments
              properties:
                installment_plan_id:
                  type: string
                  description: Installment plan ID
                loan_product_id:
                  type: string
                  description: Loan product ID
                number_of_installments:
                  type: integer
                  description: Number of installments
      responses:
        '200':
          description: Loan successfully restructured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loan_id:
                    type: string
                    description: The ID of the new loan.
        '400':
          description: Invalid request.
        '500':
          description: Internal Server Error
  /v2/loans/{loanId}/early-settlement/simulate:
    post:
      tags:
        - Early final settlement
      summary: Simulate early final settlement
      description: >-
        Simulate an early final settlement (EFS) for a loan. Optionally
        calculate present value with a future reference date
      operationId: simulateEarlyFinalSettlementV2
      parameters:
        - $ref: '#/components/parameters/LoanIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        description: Optional request body for simulation parameters
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EarlyFinalSettlementV2Request'
            examples:
              Simulate EFS without reference date:
                description: Simulate EFS using current outstanding balance
                value: {}
              Simulate EFS with reference date:
                description: Simulate EFS with present value calculation for a future date
                value:
                  reference_date: '2025-04-14'
                  waive_penalty: false
              Simulate EFS with waived penalty:
                description: Simulate EFS with penalty waived
                value:
                  waive_penalty: true
      responses:
        '201':
          description: Simulation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EarlyFinalSettlementV2Response'
              examples:
                Simulation created:
                  description: Simulation created successfully
                  value:
                    early_settlement_id: 72852338-5764-4c7e-b503-10dcee1cdb7e
                    settlement_total: 1584
                    outstanding:
                      principal: 800
                      interest: 80
                      charge: 0
                      tax: 0
                      fee: 0
                      installments: 8
                      penalty: 704
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0400:
                  value:
                    code: ELND0400
                    message: Loan must be active to perform this action
                ELND0401:
                  value:
                    code: ELND0401
                    message: Loan product does not support early final settlement.
                ELND0402:
                  value:
                    code: ELND0402
                    message: >-
                      Lock In period defined in the current loan product did not
                      meet the number of installments paid.
                ELND0405:
                  value:
                    code: ELND0405
                    message: >-
                      Field reference_date must be equal to or greater than
                      today.
                ELND0406:
                  value:
                    code: ELND0406
                    message: >-
                      Field waive_penalty is true but no penalty is configured
                      for this product.
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND2000:
                  description: Loan not found
                  value:
                    code: ELND2000
                    message: Loan not found
                ELND3000:
                  description: Loan product not found
                  value:
                    code: ELND3000
                    message: Loan product not found.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0001:
                  description: Unexpected error
                  value:
                    code: ELND0001
                    message: Unexpected error
      security:
        - BearerAuth: []
