  /v2/loans/{loanId}/prepayment/simulate:
    post:
      tags:
        - Prepayment
      summary: Simulate prepayment
      description: >
        Simulate a prepayment for a loan using the V2 prepayment engine.


        The response includes the resulting balance breakdown, the new repayment

        schedule, and a `simulation_id` that can later be used to register the

        prepayment via `POST
        /v2/loans/{loanId}/prepayment/{simulationId}/register`.


        This endpoint generates a [Lending prepayment V2 creation
        (beta)](https://developers.pismo.io/events/docs/lending-lending-prepayment-v2-creation-1)
        event.
      operationId: simulatePrepaymentV2
      parameters:
        - $ref: '#/components/parameters/LoanIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepaymentSimulationV2Request'
            examples:
              Simulate a prepayment that reduces installments:
                value:
                  amount_paid: 2000
                  reference_date: '2026-05-15'
                  waive_fee: false
                  reduce_option: INSTALLMENT
      responses:
        '201':
          description: Prepayment simulated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrepaymentSimulationV2Response'
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0504:
                  value:
                    code: ELND0504
                    message: Field amount_paid not passed.
                ELND0512:
                  value:
                    code: ELND0512
                    message: Field reduce_option not passed.
                ELND0513:
                  value:
                    code: ELND0513
                    message: >-
                      Loan product does not permit the reduce_option passed in
                      the request.
                ELND0511:
                  value:
                    code: ELND0511
                    message: >-
                      The calculated penalty would be greater than the amount
                      being paid.
                ELND0514:
                  value:
                    code: ELND0514
                    message: >-
                      Failed to calculate the new loan with the provided
                      parameters.
                ELND0515:
                  value:
                    code: ELND0515
                    message: Simulation config not found.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0005:
                  value:
                    code: ELND0005
                    message: '{resource name} not found'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0001:
                  value:
                    code: ELND0001
                    message: Unexpected error
  /v2/loans/{loanId}/prepayment/{simulationId}/register:
    post:
      tags:
        - Prepayment
      summary: Register prepayment simulation
      description: >
        Register a previously calculated V2 prepayment simulation, applying it
        to

        the loan. The request body is optional and is only used to override the

        processing codes used to record the prepayment, penalty, and insurance

        movements in the prepayment workflow.
      operationId: registerPrepaymentSimulationV2
      parameters:
        - $ref: '#/components/parameters/LoanIdPath'
        - $ref: '#/components/parameters/PrepaymentSimulationIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPrepaymentSimulationV2Request'
            examples:
              Register with custom processing codes:
                value:
                  prepayment_processing_code: PPMT
                  penalty_processing_code: PNLT
                  insurance_processing_code: INSR
      responses:
        '202':
          description: Prepayment registration accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPrepaymentSimulationV2Response'
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0500:
                  value:
                    code: ELND0500
                    message: simulationId must be an UUID
                ELND0549:
                  value:
                    code: ELND0549
                    message: Prepayment processing code length must be between 2 and 6.
                ELND0550:
                  value:
                    code: ELND0550
                    message: Penalty processing code length must be between 2 and 6.
                ELND0551:
                  value:
                    code: ELND0551
                    message: Insurance processing code length must be between 2 and 6.
                ELND0509:
                  value:
                    code: ELND0509
                    message: >-
                      This Prepayment simulation is no longer valid because the
                      outstanding balance changed after the simulation was
                      requested.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0005:
                  value:
                    code: ELND0005
                    message: '{resource name} not found'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0001:
                  value:
                    code: ELND0001
                    message: Unexpected error
