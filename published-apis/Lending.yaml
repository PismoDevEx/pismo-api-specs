    LoanStatus:
      type: string
      description: >
        Loan status


        `PENDING`-The loan has been created but has not yet been booked. Terms
        may still be under review or awaiting confirmation.

        `BOOKED`-The loan has been approved and booked. The payment schedule is
        confirmed and the loan is ready for disbursement.

        `ACTIVE`-The loan is active and in progress. Funds have been disbursed
        and the borrower is expected to make repayments according to the agreed
        schedule.

        `CANCELED`-A repayment is no longer expected to be paid.

        `SETTLED`-The loan has been fully repaid and is closed. No further
        repayments are expected.

        `RENEGOTIATED`-The original loan terms have been modified after booking,
        typically due to a change in repayment conditions or borrower
        circumstances.

        `SCHEDULED`-A repayment is expected to be paid on or before the due date
        of the repayment.

        `PROCESSING`-An intermediate state that happens whenever there are
        asynchronous process that demand a state change. For example, BOOKING →
        PROCESSING → ACTIVE. Common use case - A repayment registration has just
        been requested using the Register repayment endpoint and is being
        processed.

        `PAID`-The expected repayment amount has been paid in full on or before
        the due date of the repayment.

        `PARTIALLY_PAID`-Only part of the expected payment amount has been paid.
        However, the repayment due date has not passed, so the borrower could
        still make the full payment on time.

        `PAST_DUE`-The repayment due date has passed and the expected repayment
        amount has not been paid in full.

        `NOT_PAID`-An attempt to execute an auto repayment for this installment
        was not successful.
      example: ACTIVE
      enum:
        - PENDING
        - BOOKED
        - ACTIVE
        - CANCELED
        - SETTLED
        - RENEGOTIATED
        - SCHEDULED
        - PROCESSING
        - PAID
        - PARTIALLY_PAID
        - PAST_DUE
        - NOT_PAID
    InstallmentStatus:
      type: string
      description: >
        Current lifecycle status of a loan installment.


        **Normal lifecycle:**

        `SCHEDULED` → (due date passes) → `PAST_DUE` → (penalty accrual window
        closes) → `OVERDUE` → (payment received) → `PAID`


        **Grace period lifecycle:**

        `SCHEDULED` → `IN_GRACE_PERIOD` → (grace period expires) → `PAST_DUE` →
        `OVERDUE` → `PAID`

        `SCHEDULED` → `IN_GRACE_PERIOD` → (payment within grace period) →
        `PAID_WITHIN_GRACE`


        **Partial payment lifecycle:**

        `PAST_DUE` → (partial payment made) → `PARTIALLY_PAID` → (due date
        passes) → `PAST_DUE_PARTIALLY_PAID` → (accrual window closes) →
        `OVERDUE_PARTIALLY_PAID` → (remaining balance paid) → `PAID`

        `IN_GRACE_PERIOD` → (partial payment made) →
        `PARTIALLY_PAID_IN_GRACE_PERIOD` → (grace period expires) →
        `PARTIALLY_PAID`


        **`PAST_DUE` vs `OVERDUE`:**

        - `PAST_DUE`: the due date has passed and daily penalty charges are
        actively accruing.

        - `OVERDUE`: the penalty accrual window has closed (configurable per
        loan product). No further charges accrue; the installment balance is
        frozen.


        **`PAST_DUE_PARTIALLY_PAID` vs `OVERDUE_PARTIALLY_PAID`:**

        - `PAST_DUE_PARTIALLY_PAID`: a partial payment has been received, the
        due date has passed, and daily penalty charges are still accruing on the
        remaining balance.

        - `OVERDUE_PARTIALLY_PAID`: a partial payment has been received and the
        penalty accrual window has closed. No further charges accrue on the
        remaining balance.


        **Pending payment suffixes (`*_PENDING_PAYMENT`):**

        When a group payment or prepayment is initiated, the installment moves
        to a `*_PENDING_PAYMENT` variant

        (for example, `PAST_DUE` → `PAST_DUE_PENDING_PAYMENT`). If the payment
        is confirmed the installment is settled;

        if it expires the installment reverts to its base status. Penalty
        accrual follows the base status while a payment

        is pending: `PAST_DUE_*` variants keep accruing on the remaining
        balance, `OVERDUE_*` variants do not.


        Pending-payment variants of partially paid installments:

        - `PARTIALLY_PAID_PENDING_PAYMENT`: a group payment is pending on a
        partially paid installment (outside the grace-period and past-due
        contexts).

        - `PAST_DUE_PARTIALLY_PAID_PENDING_PAYMENT`: a group payment is pending
        on a `PAST_DUE_PARTIALLY_PAID` installment; penalty charges keep
        accruing until confirmation. Moves to
        `OVERDUE_PARTIALLY_PAID_PENDING_PAYMENT` when the accrual window closes,
        reverts to `PAST_DUE_PARTIALLY_PAID` if the payment expires, or settles
        to `PAID` once confirmed.

        - `OVERDUE_PARTIALLY_PAID_PENDING_PAYMENT`: a group payment is pending
        on an `OVERDUE_PARTIALLY_PAID` installment; no further charges accrue.
        Reverts to `OVERDUE_PARTIALLY_PAID` if the payment expires, or settles
        to `PAID` once confirmed.

        - `PARTIALLY_PAID_IN_GRACE_PERIOD_PENDING_PAYMENT`: a group payment is
        pending on a `PARTIALLY_PAID_IN_GRACE_PERIOD` installment. Moves to
        `PAST_DUE_PENDING_PAYMENT` when the grace period expires, or reverts to
        `PARTIALLY_PAID_IN_GRACE_PERIOD` if the payment expires.
      example: SCHEDULED
      enum:
        - PENDING
        - PROCESSING
        - SCHEDULED
        - PAST_DUE
        - PAID
        - PARTIALLY_PAID
        - CANCELED
        - PENDING_PAYMENT
        - PAST_DUE_PENDING_PAYMENT
        - ACTIVE
        - OVERDUE
        - OVERDUE_PENDING_PAYMENT
        - IN_GRACE_PERIOD
        - IN_GRACE_PERIOD_PENDING_PAYMENT
        - PARTIALLY_PAID_IN_GRACE_PERIOD
        - PAID_WITHIN_GRACE
        - PARTIALLY_PAID_PENDING_PAYMENT
        - PAST_DUE_PARTIALLY_PAID
        - OVERDUE_PARTIALLY_PAID
        - PAST_DUE_PARTIALLY_PAID_PENDING_PAYMENT
        - OVERDUE_PARTIALLY_PAID_PENDING_PAYMENT
        - PARTIALLY_PAID_IN_GRACE_PERIOD_PENDING_PAYMENT
