openapi: 3.1.0
info:
  title: Lending
  description: Lending applications
  version: 1.0.0
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/lending
    description: Sandbox API server for testing
tags:
  - name: Loan products
    description: Creates and manages loan product features
  - name: Simulations
    description: Performs stateless simulations for loan bookings
  - name: Loans
    description: Creates the core loan management features
  - name: Disbursements
    description: Creates the disbursement management features
  - name: Repayments
    description: Creates repayment management features
  - name: Early final settlement
    description: Creates early final settlement management features
  - name: Prepayment
    description: Manages loan prepayment
  - name: Repayment hierarchy
    description: Creates the repayment hierarchy and manages features
  - name: Entity limits
    description: Manages entity limits
components:
  parameters:
    EfsIdPath:
      name: efsId
      in: path
      description: Early final settlement simulation ID
      required: true
      schema:
        type: string
        format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    ProductTypeQuery:
      name: productType
      in: query
      description: Loan product type filter
      example: BNPL
      required: false
      schema:
        $ref: '#/components/schemas/ProductType'
    ExpandQuery:
      name: expand
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: Also retrieve disbursements and repayments?
      example: true
    CurrencyFilterQuery:
      name: currency
      in: query
      required: false
      description: ISO 4217 currency code filter
      example: 840
      schema:
        $ref: '#/components/schemas/CurrencyCode'
    IdempotencyKeyHeader:
      name: idempotency-key
      description: Idempotency key
      in: header
      required: false
      schema:
        type: string
        format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    RequiredIdempotencyKeyHeader:
      name: Idempotency-Key
      description: Idempotency key
      in: header
      required: true
      schema:
        type: string
        format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    LoanIdPath:
      name: loanId
      description: Loan ID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 2717a296-124a-47cc-b2a1-91e80dc723eb
    NextCursorQueryCamelCase:
      name: nextCursor
      in: query
      required: true
      description: Next page cursor identifier
      example: 99999999-9999-9999-9999-999999999999
      schema:
        $ref: '#/components/schemas/NextCursor'
    AccountIdPath:
      name: accountId
      in: path
      required: true
      description: Account ID
      example: '514751581'
      schema:
        type: string
    AccountIdQuery:
      name: accountId
      in: query
      required: false
      description: Account ID
      example: '514751581'
      schema:
        type: string
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page
      example: 10
      schema:
        $ref: '#/components/schemas/Limit'
    StatusQuery:
      name: status
      in: query
      required: false
      description: Loan status filter
      example: ACTIVE
      schema:
        $ref: '#/components/schemas/LoanStatus'
    LoanProductIdQuery:
      name: loanProductId
      in: query
      required: false
      description: Loan product ID filter
      example: 99999999-9999-9999-9999-999999999999
      schema:
        $ref: '#/components/schemas/LoanProductID'
    LoanProductNameQuery:
      name: loanProductName
      in: query
      required: false
      description: Loan product name filter
      example: Home Loan
      schema:
        $ref: '#/components/schemas/ProductName'
    ExpandLoanQuery:
      name: expand
      in: query
      description: Include information about scheduled repayments in the response?
      example: true
      required: false
      schema:
        $ref: '#/components/schemas/BooleanValue'
    AuthorizationIdQuery:
      name: authorizationId
      in: query
      description: ID of the authorization that originated the loan
      example: 123456789
      required: false
      schema:
        $ref: '#/components/schemas/AuthorizationId'
    PresentValueQuery:
      name: presentValue
      in: query
      description: Retrieve the present value of the loan?
      required: false
      schema:
        $ref: '#/components/schemas/BooleanValue'
      example: true
    ReferenceDateQuery:
      name: referenceDate
      in: query
      description: Reference date to calculate the present value of the loan
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2024-06-01'
    FromCreatedDateQuery:
      name: fromCreatedDate
      in: query
      description: >-
        Filter loans created on or after this date (inclusive). Format =
        `YYYY-MM-DD`. Invalid format returns 400 Bad Request. Can be used alone
        to get all loans created from this date onwards, or combined with
        `toCreatedDate` to filter within a specific date range.
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2026-05-01'
    ToCreatedDateQuery:
      name: toCreatedDate
      in: query
      description: >-
        Filter loans created on or before this date (inclusive). Format =
        `YYYY-MM-DD`. Invalid format returns 400 Bad Request. Can be used alone
        to get all loans created up to this date, or combined with
        `fromCreatedDate` to filter within a specific date range.
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2026-05-31'
    FromStartDateQuery:
      name: fromStartDate
      in: query
      description: >-
        Filter loans with start/activation date on or after this date
        (inclusive). Format = `YYYY-MM-DD`. Invalid format returns 400 Bad
        Request. Can be used alone to get all loans with start date from this
        date onwards, or combined with `toStartDate` to filter within a specific
        date range.
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2026-05-01'
    ToStartDateQuery:
      name: toStartDate
      in: query
      description: >-
        Filter loans with start/activation date on or before this date
        (inclusive). Format = `YYYY-MM-DD`. Invalid format returns 400 Bad
        Request. Can be used alone to get all loans with start date up to this
        date, or combined with `fromStartDate` to filter within a specific date
        range.
      required: false
      schema:
        $ref: '#/components/schemas/DateValue'
      example: '2026-05-31'
    SummarizeLoansQuery:
      name: summarizeLoans
      in: query
      required: false
      description: >
        When true, returns an aggregated summary across all loans that match the
        provided filter parameters (pagination is ignored). The response
        contains only the `loan_summary` field. When absent or false, returns a
        standard paginated response (`has_next`, `next_cursor`, `items`).
      schema:
        type: boolean
        default: false
      example: true
    PrepaymentSimulationIdPath:
      name: simulationId
      in: path
      description: Prepayment simulation ID returned by the V2 simulate endpoint
      required: true
      schema:
        type: string
        format: uuid
      example: c04fd22b-7d9c-4099-aaf4-9ee002b5a6a7
    ProductIdPath:
      name: productId
      in: path
      description: Loan product ID
      required: true
      schema:
        type: string
        description: Loan product ID
      example: 99999999-9999-9999-9999-999999999999
  schemas:
    AccountID:
      type: integer
      format: int64
      description: Account ID
      example: 514751581
    AmountPaid:
      minimum: 0
      type: number
      format: double
      example: 1000
      description: Prepayment amount
    Balance:
      description: Balance details for a loan
      properties:
        charge:
          $ref: '#/components/schemas/ChargeAmount'
        fee:
          $ref: '#/components/schemas/FeeAmount'
        interest:
          $ref: '#/components/schemas/InterestAmount'
        penalty:
          $ref: '#/components/schemas/PenaltyAmount'
        principal:
          $ref: '#/components/schemas/PrincipalAmount'
        tax:
          $ref: '#/components/schemas/TaxAmount'
        total:
          $ref: '#/components/schemas/TotalAmount'
    CalculationPenalty:
      type: number
      example: 100
      format: double
      description: Calculation penalty early settlement
    ChargeAmount:
      type: number
      example: 5
      format: double
      description: Charge amount
    IdempotencyKey:
      type: string
      description: Idempotency key
      format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    AuthorizationId:
      type: number
      description: Authorization ID
      format: int64
      example: 123456789
    AuthorizationTrackingId:
      type: string
      description: Authorization tracking ID
      format: uuid
      example: 4df987e3-8179-11ed-8209-06c7b022d1ee
    RepayV2:
      type: object
      properties:
        repayment_id:
          $ref: '#/components/schemas/RepaymentID'
        repayment_amount:
          $ref: '#/components/schemas/RepaymentAmount'
        repayment_date:
          $ref: '#/components/schemas/RepaymentDate'
        reference_date:
          $ref: '#/components/schemas/ReferenceDate'
        metadata:
          $ref: '#/components/schemas/RepaymentMetadata'
      required:
        - repayment_id
    RepaymentMetadata:
      type: object
      description: >
        Additional repayment information


        **Note**: This field must not be used to send Personally Identifiable
        Information (PII), Payment Card Industry (PCI) data, or any
        sensitive/regulated information. Metadata fields are intended for
        operational, non-sensitive data only. For sensitive data, use the
        specific parameters designed for that purpose. For more information,
        refer to [Get started with Pismo APIs](ref:get-started-with-pismo-apis).
      additionalProperties:
        type: string
        description: Additional property
    RepayV2Result:
      type: object
      properties:
        authorization_id:
          $ref: '#/components/schemas/AuthorizationId'
        repaid_amount:
          $ref: '#/components/schemas/RepaidAmount'
        installment_amount:
          $ref: '#/components/schemas/InstallmentAmount'
        minimum_total_payment_delta:
          $ref: '#/components/schemas/MinimumTotalPaymentDelta'
    Collateral:
      type: string
      description: Collateral
      example: SINGLE
      enum:
        - NONE
        - SINGLE
        - COLLATERAL_MULTIPLE
    LoanProductLoanActivationMethod:
      type: string
      description: >-
        Indicate when the system changes a loan to active status. Default is
        `ON_DISBURSEMENT_OR_REPAYMENT`. If disbursement method type is `NONE`,
        you cannot set to `ON_DISBURSEMENT`, and if set to
        `ON_DISBURSEMENT_OR_REPAYMENT` the system changes the loan status on
        repayment.
      example: ON_BOOKING
      enum:
        - ON_BOOKING
        - ON_DISBURSEMENT
        - ON_DISBURSEMENT_OR_REPAYMENT
        - ON_REPAYMENT
    CreateLoanProductV2Request:
      required:
        - collateral
        - currency
        - disbursement_method
        - product_name
        - product_type
        - processing_codes
      type: object
      properties:
        product_type:
          $ref: '#/components/schemas/ProductTypeV2'
        collateral:
          $ref: '#/components/schemas/Collateral'
        loan_activation_method:
          $ref: '#/components/schemas/LoanProductLoanActivationMethod'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        disbursement_method:
          $ref: '#/components/schemas/LoanProductV2DisbursementMethod'
        product_name:
          $ref: '#/components/schemas/ProductName'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        processing_codes:
          $ref: '#/components/schemas/ProcessingCodes'
        repayment_calculation_method:
          $ref: '#/components/schemas/RepaymentCalculationMethodV2'
        interest_plan_ids:
          $ref: '#/components/schemas/InterestPlanIDs'
        early_final_settlement:
          $ref: '#/components/schemas/LoanProductEFS'
        prepayment:
          $ref: '#/components/schemas/LoanProductPrepayment'
        repayment_hierarchy_code:
          $ref: '#/components/schemas/RepaymentHierarchyCodeV2'
        parameters:
          $ref: '#/components/schemas/LoanProductV2Parameters'
        grace_period_days:
          $ref: '#/components/schemas/GracePeriodDays'
        minimum_total_payment:
          $ref: '#/components/schemas/MinimumTotalPayment'
    CreateAdjustmentV2Request:
      required:
        - adjustment_amount
        - loan_balance_impact
        - processing_code
        - repayment_id
      type: object
      properties:
        adjustment_amount:
          $ref: '#/components/schemas/AdjustmentAmount'
        loan_balance_impact:
          $ref: '#/components/schemas/LoanBalanceImpact'
        processing_code:
          type: string
          description: Processing code for the adjustment
        repayment_id:
          $ref: '#/components/schemas/RepaymentID'
    AdjustmentPostResponse:
      required:
        - idempotency_key
        - authorization_id
      type: object
      properties:
        idempotency_key:
          $ref: '#/components/schemas/IdempotencyKey'
        authorization_id:
          $ref: '#/components/schemas/AuthorizationId'
    ProcessingCode:
      type: string
      description: Processing code
      example: '000011'
      minLength: 2
      maxLength: 6
    ProcessingCodes:
      type: object
      description: Define processing codes for each operation during the loan lifecycle.
      properties:
        booking:
          type: array
          description: List of booking processing code
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: List of repayment processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        present_value_discount:
          type: array
          description: List of present value discount processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_accruals:
          type: array
          description: List of penalty accruals processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        penalty_waiver:
          type: array
          description: List of penalty waiver processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        restructuring:
          type: array
          description: List of restructuring processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        insurance:
          $ref: '#/components/schemas/InsurancePC'
        disbursement:
          $ref: '#/components/schemas/DisbursementPC'
        prepayment:
          $ref: '#/components/schemas/PrepaymentPC'
        early_final_settlement:
          $ref: '#/components/schemas/EfsPC'
    InsurancePC:
      type: object
      description: Define processing codes for insurance operations.
      properties:
        booking:
          type: array
          description: List of booking processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
        repayment:
          type: array
          description: List of repayment processing codes
          items:
            $ref: '#/components/schemas/ProcessingCode'
    DisbursementPC:
      type: object
      description: Define processing codes for disbursement operations.
      properties:
        internal:
          type: array
          description: List of processing codes for internal account
          items:
            $ref: '#/components/schemas/ProcessingCode'
        external:
          type: array
          description: List of processing codes for external account
          items:
            $ref: '#/components/schemas/ProcessingCode'
    PrepaymentPC:
      type: object
      description: Define processing codes for prepayment operations.
      properties:
        fee:
          type: array
          description: List of fee processing codes for prepayment
          items:
            $ref: '#/components/schemas/ProcessingCode'
    EfsPC:
      type: object
      description: Define processing codes for early final settlement (EFS) operations.
      properties:
        fee:
          type: array
          description: List of fee processing codes for early final settlement
          items:
            $ref: '#/components/schemas/ProcessingCode'
    CurrencyCode:
      type: integer
      description: ISO 4217 currency code
      format: int32
      minimum: 0
      maximum: 999
      example: 999
    DisbursementAmount:
      type: number
      format: double
      description: Disbursement amount
      example: 1000
    AdjustmentAmount:
      type: number
      format: double
      description: Amount of the adjustment
      example: 1000
    LoanBalanceImpact:
      type: string
      description: Loan balance impact
      example: PRINCIPAL
      enum:
        - PRINCIPAL
        - INTEREST
        - TAX
        - PENALTY
        - FEE
    DisbursementDate:
      type: string
      description: Disbursement date. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-30'
    DisbursementID:
      type: string
      description: >-
        Disbursement ID. Required if the number of loan disbursements is greater
        than 1.
      format: uuid
      example: 5c075cc6-8dc2-4fe6-9ed7-cf5687d4e834
    BookingAmount:
      type: number
      format: double
      description: Booking amount
      example: 1000
    InstallmentPlanId:
      type: string
      description: ID of the installment plan
      format: uuid
      example: 5c075cc6-8dc2-4fe6-9ed7-cf5687d4e834
    NumberOfInstallments:
      type: number
      format: int32
      description: Number of installments
    EarlyFinalSettlementV2Request:
      type: object
      description: Request body for early final settlement simulation V2
      properties:
        reference_date:
          $ref: '#/components/schemas/ReferenceDate'
        waive_penalty:
          type: boolean
          description: Waive penalty for early settlement
          default: false
          example: false
    EarlyFinalSettlementV2Response:
      type: object
      required:
        - early_settlement_id
        - settlement_total
        - outstanding
      properties:
        early_settlement_id:
          type: string
          format: uuid
          description: Early settlement simulation ID
          example: 72852338-5764-4c7e-b503-10dcee1cdb7e
        settlement_total:
          type: number
          format: double
          description: Total amount to settle the loan
          example: 1584
        outstanding:
          $ref: '#/components/schemas/OutstandingResponse'
    RegisterEarlyFinalSettlementV2Response:
      type: object
      required:
        - early_settle_id
        - total_settled
        - outstanding
      description: Response for V2 early final settlement registration
      properties:
        early_settle_id:
          type: string
          format: uuid
          description: Early settlement ID
          example: 72852338-5764-4c7e-b503-10dcee1cdb7e
        total_settled:
          type: number
          format: double
          description: Total amount settled for the loan
          example: 1584
        outstanding:
          $ref: '#/components/schemas/OutstandingResponse'
    LendingLoanRepaymentResponse:
      type: object
      required:
        - account_id
        - created_at
        - loan_amount
        - loan_id
        - outstanding_balance
        - product_id
        - start_date
        - status
        - total_payable
        - updated_at
      properties:
        loan_id:
          $ref: '#/components/schemas/LoanID'
        account_id:
          $ref: '#/components/schemas/AccountID'
        external_id:
          $ref: '#/components/schemas/ExternalID'
        loan_amount:
          $ref: '#/components/schemas/LoanAmount'
        total_payable:
          $ref: '#/components/schemas/TotalPayable'
        total_expected_payment_amount:
          $ref: '#/components/schemas/TotalExpectedPaymentAmount'
        prepayments:
          description: >-
            List of prepayments registered for this loan. Only populated when
            the loan aggregate is fully expanded (single GET, or paginated GET
            with `expand=true`). Only prepayments in `REGISTERED` status are
            returned.
          type: array
          items:
            $ref: '#/components/schemas/PrepaymentSummaryV2Response'
        grace_period_days:
          $ref: '#/components/schemas/GracePeriodDays'
        days_past_due:
          $ref: '#/components/schemas/DaysPastDue'
        original_loan_id:
          $ref: '#/components/schemas/OriginalLoanID'
        restructure_loan_id:
          $ref: '#/components/schemas/RestructureLoanID'
        product_id:
          $ref: '#/components/schemas/LoanProductID'
        rates:
          $ref: '#/components/schemas/LoansRates'
        disbursement:
          $ref: '#/components/schemas/LoanDisbursement'
        repayment_schedule:
          properties:
            repayment_id:
              $ref: '#/components/schemas/RepaymentID'
            transactions_id:
              $ref: '#/components/schemas/TransactionsID'
            status:
              $ref: '#/components/schemas/InstallmentStatus'
            period:
              $ref: '#/components/schemas/Period'
            due_date:
              $ref: '#/components/schemas/LoanPaymentDueDate'
            real_due_date:
              $ref: '#/components/schemas/RealDueDate'
            present_value_amount:
              description: Amount of calculated loan present value
              $ref: '#/components/schemas/PresentValueAmount'
            present_value_discount:
              $ref: '#/components/schemas/PresentValueDiscount'
            amount_due:
              type: object
              description: Amount due for the repayment
              allOf:
                - $ref: '#/components/schemas/Balance'
                - type: object
            amount_paid:
              type: object
              description: Amount paid for the repayment
              allOf:
                - $ref: '#/components/schemas/Balance'
                - type: object
            initial_amount:
              type: object
              description: Initial amount for the repayment
              allOf:
                - $ref: '#/components/schemas/Balance'
                - type: object
        start_date:
          $ref: '#/components/schemas/FirstActiveStartDate'
        status:
          $ref: '#/components/schemas/LoanStatus'
        created_at:
          $ref: '#/components/schemas/LoanCreatedAt'
        updated_at:
          $ref: '#/components/schemas/LoanUpdatedAt'
    PrepaymentSummaryV2Response:
      type: object
      description: Summary of a registered prepayment associated with a loan
      properties:
        prepayment_id:
          type: string
          format: uuid
          description: Identifier of the prepayment
          example: 73e45fd5-759f-4e04-a88a-7172fa948afa
        status:
          type: string
          description: Lifecycle status of the prepayment
          enum:
            - CREATED
            - PROCESSING
            - REGISTERED
          example: REGISTERED
        settlement_date:
          type: string
          format: date-time
          description: >-
            Settlement date of the prepayment. Format =
            yyyy-MM-dd'T'HH:mm:ss.SSSXXX
          example: '2026-06-15T10:00:00.000+00:00'
        amount_paid:
          type: number
          description: Total prepayment amount paid by the customer
          example: 1000
        penalty_amount_paid:
          type: number
          description: Penalty amount charged on the prepayment, if any
          example: 50
        insurance_amount_paid:
          type: number
          description: Insurance portion settled with the prepayment, if any
          example: 0
        tax_amount_paid:
          type: number
          description: Tax amount applied to the prepayment
          example: 0
        reduce_option:
          $ref: '#/components/schemas/ReduceOption'
        new_remaining_total:
          type: number
          description: Outstanding total of the loan after this prepayment was applied
          example: 4000
        created_at:
          type: string
          format: date-time
          description: >-
            When the prepayment record was created. Format =
            yyyy-MM-dd'T'HH:mm:ss.SSSXXX
          example: '2026-06-15T10:00:00.000+00:00'
        updated_at:
          type: string
          format: date-time
          description: >-
            When the prepayment record was last updated (ISO 8601 with UTC
            offset)
          example: '2026-06-15T10:00:00.000+00:00'
    ExternalAccountType:
      type: string
      description: External account type
      example: EXTERNAL
      enum:
        - EXTERNAL
    ExternalID:
      type: string
      description: External ID
      example: my_external_id
      maxLength: 50
    FeeAmount:
      type: number
      example: 10
      format: double
      description: Fee amount
    FirstActiveStartDate:
      type: string
      description: Date loan was first active. Format = YYYY-MM-DD.
      format: date
      example: '2022-06-28'
    HasNext:
      type: boolean
      description: Does the query have additional items to return?
      example: true
    BooleanValue:
      type: boolean
      description: Boolean value
      example: true
    DateValue:
      type: string
      description: Date value in YYYY-MM-DD format
      format: date
      example: '2023-12-31'
    InterestAmount:
      type: number
      format: double
      example: 20
      description: Interest amount
    InternalAccountType:
      type: string
      description: Account type
      example: INTERNAL
      enum:
        - INTERNAL
    DisbursementV2Request:
      required:
        - disbursement_account
      type: object
      properties:
        disbursement_account:
          anyOf:
            - $ref: '#/components/schemas/InternalDisburseAccountV2'
            - $ref: '#/components/schemas/ExternalDisburseAccountV2'
        disbursement_id:
          $ref: '#/components/schemas/DisbursementID'
        disbursement_date:
          $ref: '#/components/schemas/DisbursementDate'
        disbursement_amount:
