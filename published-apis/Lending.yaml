  /v2/repayment-hierarchies:
    post:
      tags:
        - Repayment hierarchy
      summary: Create repayment hierarchy
      description: >-
        Create a repayment hierarchy for a loan. The repayment hierarchy
        determines the order in which loan components are paid during repayment
        processing.
      operationId: createRepaymentHierarchyV2
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        description: Request body containing the hierarchy code and payment order.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepaymentHierarchyV2Request'
            examples:
              Create standard repayment hierarchy:
                description: Creates a repayment hierarchy with a standard payment order.
                value:
                  hierarchy_code: CR008
                  hierarchy:
                    - PRINCIPAL
                    - INTEREST
                    - TAX
                    - FEE
                    - CHARGE
                    - PENALTY
                    - INSURANCE
              Create custom repayment hierarchy:
                description: >-
                  Creates a repayment hierarchy with a custom payment order that
                  prioritizes paying penalties first.
                value:
                  hierarchy_code: CR009
                  hierarchy:
                    - PENALTY
                    - PRINCIPAL
                    - INTEREST
                    - TAX
                    - FEE
                    - CHARGE
                    - INSURANCE
        required: true
      responses:
        '201':
          description: Repayment hierarchy created successfully.
          headers:
            Location:
              description: URI of the created repayment hierarchy
              schema:
                type: string
                format: uri
              example: >-
                https://sandbox.pismolabs.io/lending/v2/repayment-hierarchies/CR008
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepaymentHierarchyV2Response'
              examples:
                Success response:
                  description: Repayment hierarchy created successfully.
                  value:
                    hierarchy_code: CR008
        '202':
          description: Duplicated request identified by Idempotency key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                WLND0001:
                  description: Duplicated request identified by Idempotency key.
                  value:
                    code: WLND0001
                    message: idempotency-key already in use
        '400':
          description: A validation error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                ELND0601:
                  description: Field hierarchy_code not passed
                  value:
                    code: ELND0601
                    message: Field hierarchy_code not passed
                ELND0603:
                  description: Field hierarchy not passed
                  value:
                    code: ELND0603
                    message: Field hierarchy not passed
                ELND0605:
                  description: Field hierarchy_code length must be lower or equal to 80
                  value:
                    code: ELND0605
                    message: Field hierarchy_code length must be lower or equal to 80
                ELND0606:
                  description: Field hierarchy size must be equal to 7
                  value:
                    code: ELND0606
                    message: Field hierarchy size must be equal to 7
                ELND0607:
                  description: Field hierarchy_code contains invalid characters
                  value:
                    code: ELND0607
                    message: Field hierarchy_code contains invalid characters
                ELND0608:
                  description: Invalid hierarchy type provided
