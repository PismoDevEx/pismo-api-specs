openapi: 3.1.0
info:
  title: Banking - Interest engine
  version: 1.0.0
  description: API to handle interest-bearing account operations
  termsOfService: https://developers.pismo.io/terms/
  contact:
    name: API Support
    url: https://developers.pismolabs.io/pismo-docs/docs/support
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/interest-engine
    description: Sandbox API server for testing
  - url: https://sandbox.pismolabs.io/passport/v2/s2s/access-token
    description: Sandbox API for oauth2
tags:
  - name: Account interest
    description: Manage account interest
  - name: Benchmark rate
    description: Manage benchmarks
  - name: Interest accrual
    description: Interest accrual
  - name: Interest engine
    description: Manage interest plans
components:
  parameters:
    AccountId:
      name: accountId
      in: path
      description: Account ID
      required: true
      example: '8080'
      schema:
        type: string
    Authorization:
      name: authorization
      in: header
      description: Authorization
      required: true
      example: Bearer YOUR_BEARER_TOKEN
      schema:
        type: string
    Benchmark:
      name: benchmark
      in: path
      description: Market index used to measure the interest a value has over time
      example: FED
      required: true
      schema:
        type: string
    ContentType:
      name: content-type
      in: header
      description: Content type
      required: true
      example: application/json
      schema:
        type: string
    InterestPlanIdPath:
      name: interestPlanId
      in: path
      description: >-
        Interest plan ID generated during the plan's creation. Must be an
        alphanumeric UUID with the alphabetical characters in lowercase.
      required: true
      example: d9b2c9e1-4633-4a10-841b-270f7f1493cd
      schema:
        type: string
    PageNumber:
      name: page
      in: query
      required: true
      description: Page number. Default is `1`.
      example: 1
      schema:
        type: integer
        format: int32
    PerPage:
      name: perPage
      in: query
      required: true
      description: Number of items per page. Default is `10`.
      example: 10
      schema:
        type: integer
        format: int32
    XProgramId:
      name: x-program-id
      in: header
      description: Program ID
      required: true
      example: '1233'
      schema:
        type: string
    VersionDate:
      name: version_date
      in: query
      description: >-
        Optional date to retrieve a specific version of the interest plan. If
        not provided, returns the latest version. Format = YYYY-MM-DD.
      required: false
      example: '2025-06-17'
      schema:
        type: string
        format: date
  schemas:
    AccrualBasis:
      type: string
      description: |
        Method used to calculate interest accrual.
          * `BD/252`: Calculates daily interest using a 252-day year and the actual number of business days in each time period.
          * `ACTUAL/360`: Calculates daily interest using a 360-day year and the actual number of days in each time period.
          * `ACTUAL/365`: Calculates daily interest using a 365-day year and the actual number of days in each time period.
          * `ACTUAL/ACTUAL`: Calculates daily interest using the actual number of days in the year (which in the leap year is 366) and the actual number of days in each time period.
      enum:
        - BD/252
        - ACTUAL/360
        - ACTUAL/365
        - ACTUAL/ACTUAL
      example: ACTUAL/365
    AccrualFrequency:
      type: string
      description: Interest accrual frequency
      enum:
        - DAILY
        - MONTHLY
        - QUARTERLY
        - HALF_YEARLY
        - YEARLY
        - MATURITY
      example: DAILY
    Amount:
      type: number
      format: double
      description: Amount in the `interest_by_tier`
      example: 1000
    Benchmark:
      type: string
      description: >
        Market index used to measure interest value over time. For fixed
        interest, this field must be null.
          - `BOE`: Bank of England, UK
          - `DI`: Interbank Deposit Contract, Brazil
          - `FED`: Federal Reserve System, USA
          - `RBA`: Reserve Bank of Australia
          - `RBI`: Reserve Bank of India
          - `TO`: Overnight Interbank Target Rate (Tasa Objetivo), Mexico
      enum:
        - BOE
        - DI
        - FED
        - RBA
        - RBI
        - TO
      example: FED
    BenchmarkRequired:
      type: string
      description: |
        Market index used to measure interest value over time.
          - `BOE`: Bank of England, UK
          - `DI`: Interbank Deposit Contract, Brazil
          - `FED`: Federal Reserve System, USA
          - `RBA`: Reserve Bank of Australia
          - `RBI`: Reserve Bank of India
          - `TO`: Overnight Interbank Target Rate (Tasa Objetivo), Mexico
      enum:
        - BOE
        - DI
        - FED
        - RBA
        - RBI
        - TO
      example: FED
    BenchmarkRate:
      type: number
      format: double
      description: Annual market index rate
      example: 0.104
    BenchmarkRateRequest:
      title: Benchmark rate request
      type: object
      properties:
        benchmark:
          $ref: '#/components/schemas/BenchmarkRequired'
        benchmark_rate:
          $ref: '#/components/schemas/BenchmarkRate'
        start_date:
          $ref: '#/components/schemas/StartDate'
      required:
        - benchmark
        - benchmark_rate
        - start_date
      example:
        benchmark: FED
        benchmark_rate: 0.104
        start_date: '2024-09-04'
    BenchmarkRateResponse:
      title: Benchmark rate response
      type: object
      properties:
        benchmark_rate:
          $ref: '#/components/schemas/BenchmarkRate'
        start_date:
          $ref: '#/components/schemas/StartDate'
        version:
          $ref: '#/components/schemas/Version'
        division_id:
          $ref: '#/components/schemas/DivisionId'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
        interest_thresholds:
          $ref: '#/components/schemas/InterestThresholds'
    BenchmarkRateList:
      type: array
      format: array
      items:
        $ref: '#/components/schemas/GetBenchmarkRate'
      description: Benchmark rate list
    CapEffectiveRate:
      type: number
      format: double
      description: >-
        Cap effective rate. If you provide a value for `cap_effective_rate`, you
        must also provide a value for `cap_threshold`.
      example: 1.2
    CapitalizationFrequency:
      type: string
      description: Interest payout frequency
      enum:
        - DAILY
        - MONTHLY
        - QUARTERLY
        - HALF_YEARLY
        - YEARLY
        - MATURITY
      example: DAILY
    CapThreshold:
      type: number
      format: double
      description: >-
        Cap threshold value. If you provide a value for `cap_threshold`, you
        must also provide a value for `cap_effective_rate`.
      example: 1.1
    CurrentPage:
      type: integer
      format: int32
      description: Current page
      example: 1
    CurrencyCode:
      type: string
      format: number
      description: Numeric currency code in ISO 4217 standard
      example: '986'
    Days:
      type: integer
      format: int32
      description: Number of days in `interest_by_tier`
      example: 30
    Description:
      type: string
      description: Interest plan name
      example: Banking plan
    DivisionId:
      type: string
      description: Division ID attached to the interest plan for accrual by division
      example: d9b2c9e1-4633-4a10-841b-270f7f1493cd
    FeeProcessingCode:
      type: string
      format: number
      description: >-
        Processing code configured in the [fee model](doc:fee-model) for
        charging a tax, penalty, or fee.
      example: '001100'
    TaxesExemption:
      type: boolean
      description: Is the account exempt from taxes?
      example: true
    WithholdingMoment:
      type: string
      description: Moment at which tax is withheld. When omitted, no withholding applies.
      enum:
        - ACCRUAL
        - CAPITALIZATION
      example: ACCRUAL
    TaxRule:
      type: object
      description: A single tax rule applied within a tax withholding configuration.
      required:
        - description
        - fixed_percentage
      properties:
        description:
          type: string
          maxLength: 128
          description: Description of the tax rule.
          example: IOF
        fixed_percentage:
          type: number
          description: Fixed percentage applied by the tax rule.
          example: 0.0038
        threshold_amount:
          type: number
          description: Amount threshold above which the tax rule applies.
          example: 1000
    TaxWithholding:
      type: object
      description: >
        Tax withholding configuration. Replaces the standalone
        `fee_processing_code` field.

        Conditional rules enforced at creation/update time:

        - `ACCRUAL`: `fee_processing_code` is required; `tax_rules` must be
        omitted.

        - `CAPITALIZATION`: `tax_rules` is required; `fee_processing_code` must
        be omitted.

        - Omitted `withholding_moment`: both `fee_processing_code` and
        `tax_rules` must be omitted.

        In GET responses, legacy plans that predate this field may return
        `fee_processing_code` with a null `withholding_moment`.
      required:
        - withholding_moment
      properties:
        withholding_moment:
          $ref: '#/components/schemas/WithholdingMoment'
        fee_processing_code:
          $ref: '#/components/schemas/FeeProcessingCode'
        tax_rules:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/TaxRule'
    FixedInterestRate:
      type: number
      format: float
      description: >-
        Fixed annual interest rate for investments or deposits. If a `benchmark`
        value is provided, this field must be null.
      example: 0.1
    FloorEffectiveRate:
      type: number
      format: double
      description: Floor effective rate
      example: 2.2
    FloorThreshold:
      type: number
      format: double
      description: Floor threshold value
      example: 2.1
    GetBenchmarkRate:
      type: object
      properties:
        benchmark:
          $ref: '#/components/schemas/BenchmarkRequired'
        benchmark_rate:
          $ref: '#/components/schemas/BenchmarkRate'
        start_date:
          $ref: '#/components/schemas/StartDate'
        version:
          $ref: '#/components/schemas/Version'
        division_id:
          $ref: '#/components/schemas/DivisionId'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
        interest_thresholds:
          $ref: '#/components/schemas/InterestThresholds'
    GetBenchmarkRateResponse:
      title: Get benchmark rate response
      type: object
      properties:
        get_benchmark_rate_list:
          $ref: '#/components/schemas/BenchmarkRateList'
    GetBenchmarkRateOrgResponse:
      title: Get benchmark rate org response
      type: object
      properties:
        get_benchmark_rate_org_list:
          $ref: '#/components/schemas/BenchmarkRateList'
    GetInterestAccountResponse:
      title: Get interest account response
      type: object
      properties:
        benchmark:
          $ref: '#/components/schemas/Benchmark'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        margin:
          $ref: '#/components/schemas/Margin'
        tax_withholding:
          $ref: '#/components/schemas/TaxWithholding'
        taxes_exemption:
          $ref: '#/components/schemas/TaxesExemption'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
        capitalization_frequency:
          $ref: '#/components/schemas/CapitalizationFrequency'
          description: >-
            Account-level capitalization frequency configured for the interest
            account. Returned only when explicitly configured at account level.
            If not returned, the account uses the capitalization frequency from
            the associated interest plan during processing.
    GetInterestPlanResponse:
      title: Get interest plan response
      type: object
      properties:
        interest_plan_id:
          $ref: '#/components/schemas/InterestPlanId'
        org_id:
          $ref: '#/components/schemas/OrgId'
        description:
          $ref: '#/components/schemas/Description'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        benchmark:
          $ref: '#/components/schemas/Benchmark'
        fixed_interet_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        margin:
          $ref: '#/components/schemas/Margin'
        tax_withholding:
          $ref: '#/components/schemas/TaxWithholding'
        accrual_basis:
          $ref: '#/components/schemas/AccrualBasis'
        interest_type:
          $ref: '#/components/schemas/InterestType'
        capitalization_frequency:
          $ref: '#/components/schemas/CapitalizationFrequency'
        accrual_frequency:
          $ref: '#/components/schemas/AccrualFrequency'
        interest_base_model:
          $ref: '#/components/schemas/InterestBaseModel'
    InterestAccountRequest:
      title: Interest account request
      type: object
      description: >
        Request body for `PUT /v1/interest/account/{accountId}`. The endpoint
        replaces the full

        interest configuration of the account, partial updates are not
        supported. Every request

        must redeclare a complete configuration that satisfies the rules below.


        Interest type. Exactly one of the two paths must be chosen:

        - **Benchmark-indexed rate:** If you pass `benchmark` and
        `margin_rate`., then `margin` is optional.
          `fixed_interest_rate` must be omitted.
        - **Fixed rate:** If you pass `fixed_interest_rate`, then `benchmark`,
        `margin_rate`, and `margin`
          must all be omitted.

        Passing neither `benchmark` nor `fixed_interest_rate` returns `400 Bad
        Request` with

        `fixed_interest_rate must be provided`. Passing both returns `400 Bad
        Request` with

        `fixed_interest_rate is not allowed when benchmark is passed`.


        **Tax-withholding rule**: Driven by
        `tax_withholding.withholding_moment`:

        - When `withholding_moment` is `ACCRUAL`, `fee_processing_code` is
        required and `tax_rules` must be omitted.

        - When `withholding_moment` is `CAPITALIZATION`, `tax_rules` is required
        and `fee_processing_code` must be omitted.

        - When `tax_withholding` is omitted, no withholding is configured.


        **Tax-exemption rule**: When `taxes_exemption` is `true`,
        `tax_withholding` must be null.

        When `taxes_exemption` is `false` or omitted, `tax_withholding` follows
        the rule above.


        Numeric fields (`fixed_interest_rate`, `margin_rate`) must have a
        positive value.

        `tax_withholding.fee_processing_code` is limited to 128 characters.
      properties:
        benchmark:
          $ref: '#/components/schemas/Benchmark'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        margin:
          $ref: '#/components/schemas/Margin'
        taxes_exemption:
          type: boolean
          description: >-
            When true, the account is exempt from tax withholding and
            `tax_withholding` must be null.
        tax_withholding:
          $ref: '#/components/schemas/TaxWithholding'
        capitalization_frequency:
          $ref: '#/components/schemas/CapitalizationFrequency'
          description: >-
            Optional account-level capitalization frequency. When provided with
            a valid value, it overrides the capitalization frequency configured
            in the associated interest plan. If omitted or sent as null, the
            current account-level value remains unchanged. If there is no
            existing account-level value, then the associated interest plan
            value is used during processing.
      example:
        benchmark: FED
        margin_rate: 1.3
        margin: 0.05
        tax_withholding:
          withholding_moment: ACCRUAL
          fee_processing_code: '001100'
    InterestAccountResponse:
      title: Interest account response
      type: object
      properties:
        benchmark:
          $ref: '#/components/schemas/Benchmark'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        margin:
          $ref: '#/components/schemas/Margin'
        tax_withholding:
          $ref: '#/components/schemas/TaxWithholding'
        taxes_exemption:
          $ref: '#/components/schemas/TaxesExemption'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
    InterestAccrualSetupResponse:
      title: Accrual setup response
      type: object
      properties:
        time_utc:
          $ref: '#/components/schemas/TimeUTC'
        division_id:
          $ref: '#/components/schemas/DivisionId'
      required:
        - time_utc
      example:
        division_id: d9b2c9e1-4633-4a10-841b-270f7f1493cd
        time_utc: '07:05'
    InterestAccrualSetupRequest:
      title: Accrual setup request
      type: object
      required:
        - time_utc
      properties:
        time_utc:
          $ref: '#/components/schemas/TimeUTC'
        division_id:
          $ref: '#/components/schemas/DivisionId'
      example:
        division_id: d9b2c9e1-4633-4a10-841b-270f7f1493cd
        time_utc: '07:05'
    InterestBaseModel:
      type: string
      description: >-
        Interest calculation model. `CLOSING-BALANCE` uses the end-of-day
        balance. `BALANCE-CHANGE` uses balance variation events. Defaults to
        `CLOSING-BALANCE`.
      enum:
        - CLOSING-BALANCE
        - BALANCE-CHANGE
      default: CLOSING-BALANCE
      example: CLOSING-BALANCE
    InterestByTiers:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/InterestByTiersType'
        tier_calculation:
          $ref: '#/components/schemas/TierCalculation'
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/InterestByTiersArrayObject'
      required:
        - type
        - tier_calculation
        - tiers
      description: Interest by tiers configuration
      example:
        type: TERM
        tier_calculation: RETROACTIVE
        tiers:
          - days: 30
            amount: 1000
            margin_rate: 1
            fixed_interest_rate: 1.2
          - days: 60
            amount: 2000
            margin_rate: 1
            fixed_interest_rate: 1.3
    InterestByTiersArrayObject:
      type: object
      properties:
        days:
          $ref: '#/components/schemas/Days'
        amount:
          $ref: '#/components/schemas/Amount'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
      description: Tier details for interest calculation
    InterestByTiersType:
      type: string
      description: >
        Interest type

        - `TERM`: Interest rate varies according to the period of time since the
        deposit was made.

        - `AMOUNT`: Interest rate varies according to the current balance.
      enum:
        - TERM
        - AMOUNT
      example: TERM
    InterestPlanId:
      type: string
      format: UUID
      description: >-
        Interest plan ID generated during the plan's creation. Must be an
        alphanumeric UUID with the alphabetical characters in lowercase.
      example: 07d84f79-3027-47bd-b628-65528ccc8fb2
    InterestPlanRequest:
      title: Interest plan request
      type: object
      properties:
        accrual_basis:
          $ref: '#/components/schemas/AccrualBasis'
        accrual_frequency:
          $ref: '#/components/schemas/AccrualFrequency'
        capitalization_frequency:
          $ref: '#/components/schemas/CapitalizationFrequency'
        currency_code:
          $ref: '#/components/schemas/CurrencyCode'
        description:
          $ref: '#/components/schemas/Description'
        interest_type:
          $ref: '#/components/schemas/InterestType'
        benchmark:
          $ref: '#/components/schemas/Benchmark'
        tax_withholding:
          $ref: '#/components/schemas/TaxWithholding'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin:
          $ref: '#/components/schemas/Margin'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        start_date:
          $ref: '#/components/schemas/PlanStartDate'
        division_id:
          $ref: '#/components/schemas/DivisionId'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
        interest_thresholds:
          $ref: '#/components/schemas/InterestThresholds'
        interest_base_model:
          $ref: '#/components/schemas/InterestBaseModel'
      required:
        - accrual_basis
        - accrual_frequency
        - capitalization_frequency
        - currency_code
        - description
        - interest_type
      example:
        accrual_basis: ACTUAL/365
        accrual_frequency: DAILY
        capitalization_frequency: DAILY
        currency_code: '986'
        description: BANKING PLAN
        interest_type: COMPOUND
        benchmark: FED
        tax_withholding:
          withholding_moment: ACCRUAL
          fee_processing_code: '001100'
        margin: 0.05
        margin_rate: 1.2
    InterestPlanResponse:
      title: Org parameters response
      type: object
      properties:
        interest_plan_id:
          $ref: '#/components/schemas/InterestPlanId'
    InterestPlansResponse:
      type: object
      properties:
        current_page:
          $ref: '#/components/schemas/CurrentPage'
        per_page:
          $ref: '#/components/schemas/PerPage'
        pages:
          $ref: '#/components/schemas/Pages'
        total_items:
          $ref: '#/components/schemas/TotalItems'
        items:
          type: array
          items:
            type: object
            properties:
              interest_plan_id:
                $ref: '#/components/schemas/InterestPlanId'
              org_id:
                $ref: '#/components/schemas/OrgId'
              description:
                $ref: '#/components/schemas/Description'
              currency_code:
                $ref: '#/components/schemas/CurrencyCode'
              benchmark:
                $ref: '#/components/schemas/Benchmark'
              fixed_interest_rate:
                $ref: '#/components/schemas/FixedInterestRate'
              margin_rate:
                $ref: '#/components/schemas/MarginRate'
              margin:
                $ref: '#/components/schemas/Margin'
              tax_withholding:
                $ref: '#/components/schemas/TaxWithholding'
              accrual_basis:
                $ref: '#/components/schemas/AccrualBasis'
              interest_type:
                $ref: '#/components/schemas/InterestType'
              capitalization_frequency:
                $ref: '#/components/schemas/CapitalizationFrequency'
              accrual_frequency:
                $ref: '#/components/schemas/AccrualFrequency'
              status:
                $ref: '#/components/schemas/Status'
              operation_type:
                $ref: '#/components/schemas/OperationType'
              start_date:
                $ref: '#/components/schemas/StartDate'
              interest_by_tiers:
                $ref: '#/components/schemas/InterestByTiers'
              interest_thresholds:
                $ref: '#/components/schemas/InterestThresholds'
              division_id:
                $ref: '#/components/schemas/DivisionId'
              interest_base_model:
                $ref: '#/components/schemas/InterestBaseModel'
    InterestPlanVersionRequest:
      title: Interest plan version request
      type: object
      properties:
        start_date:
          $ref: '#/components/schemas/StartDateForNewVersion'
        description:
          $ref: '#/components/schemas/Description'
        fixed_interest_rate:
          $ref: '#/components/schemas/FixedInterestRate'
        margin:
          $ref: '#/components/schemas/Margin'
        margin_rate:
          $ref: '#/components/schemas/MarginRate'
        interest_by_tiers:
          $ref: '#/components/schemas/InterestByTiers'
        interest_thresholds:
          $ref: '#/components/schemas/InterestThresholds'
      required:
        - start_date
      example:
        start_date: '2025-06-17'
        description: BANKING PLAN v2
        margin: 0.05
        margin_rate: 1.2
    InterestPlanVersionResponse:
      title: Interest plan version response
      type: object
      properties:
        interest_plan_id:
          $ref: '#/components/schemas/InterestPlanId'
        version:
          type: string
          description: ID for the new interest plan version
          example: '2025-06-17'
    InterestThresholds:
      type: object
      properties:
        cap_threshold:
          $ref: '#/components/schemas/CapThreshold'
        cap_effective_rate:
          $ref: '#/components/schemas/CapEffectiveRate'
        floor_threshold:
          $ref: '#/components/schemas/FloorThreshold'
        floor_effective_rate:
          $ref: '#/components/schemas/FloorEffectiveRate'
      description: Cap and floor thresholds for the interest plan
      example:
        cap_threshold: 1.1
        cap_effective_rate: 1.2
        floor_threshold: 2.2
        floor_effective_rate: 2.1
    InterestType:
      type: string
      description: >
        Interest calculation type

        - `SIMPLE`: Calculated on the original deposit or investment value.

        - `COMPOUND`: Calculated on the original value plus the last accumulated
        interest.
      enum:
        - SIMPLE
        - COMPOUND
      example: SIMPLE
    Margin:
      type: number
      format: double
      description: >
        Also known as a spread, this is an incremental rate the clients receive
        on investments or deposits.

        If a `benchmark` value is provided, this field is optional.

        If `benchmark` is null, this field must be null also.
      example: 0.02
    MarginRate:
      type: number
      format: double
      description: >-
        Rate linked to the benchmark rate. For example, for 110% FED, margin
        rate is 110%. If a `benchmark` value is not provided, this field must be
        null.
      example: 1.1
    OperationType:
      type: string
      description: |
        Operation type.
        - `DEBIT`: Interest plan for debit type operations
        - `CREDIT`: Interest plan for credit type operations
      enum:
        - DEBIT
        - CREDIT
      example: DEBIT
    OrgId:
      type: string
      description: Organization ID generated in the onboarding process
      example: TN-cc8f8b89-233a-4582-9f36-63ee85278d6d
    Pages:
      type: integer
      format: Int32
      description: Total number of pages. Default is `1`.
      example: 1
    PerPage:
      type: integer
      description: Number of items per page. Default is `10`.
      format: Int32
      example: 1
    PlanStartDate:
      type: string
      format: date
      description: Date to start applying the interest plan. Format = YYYY-MM-DD.
      example: '2025-06-17'
    StartDate:
      type: string
      format: date
      description: >-
        Date to start applying the benchmark rate in the accrual process. Format
        = YYYY-MM-DD.
      example: '2024-09-10'
    StartDateForNewVersion:
      type: string
      format: date
      description: >-
        Date to start applying the new interest plan version. Format =
        YYYY-MM-DD. Must be greater than or equal to current date.
      example: '2025-06-17'
    Status:
      type: string
      description: Interest plan status. Must be set to `ACTIVE`.
      enum:
        - ACTIVE
      example: ACTIVE
    TierCalculation:
      type: string
      description: >
        Tier calculation method

        - `RETROACTIVE`: Interest is recalculated from the beginning based on
        the new applicable rate.

        - `NON-RETROACTIVE`: Interest is calculated progressively based on each
        layer rate.
      enum:
        - RETROACTIVE
        - NON-RETROACTIVE
      example: RETROACTIVE
    TimeUTC:
      type: string
      description: >-
        Time when accrual calculation is performed, specified in hours and
        minutes. `05:05`, `06:05`, `07:05`, `08:05`, `09:05`, `10:05` and
        `19:15` are the only values accepted.
      enum:
        - '05:05'
        - '06:05'
        - '07:05'
        - '08:05'
        - '09:05'
        - '10:05'
        - '19:15'
      example: '19:15'
    TotalItems:
      type: integer
      format: int32
      description: Total number of items
      example: 1
    Version:
      type: string
      description: Benchmark rate version. Format = YYYY-MM.
      example: 2024-09
    ErrorResponse:
      type: object
      description: >
        Standard error payload generated by the global exception handler.

        `message` is a single string for most errors and an array of strings

        when multiple bean-validation or request-binding errors occur in the
        same request.
      additionalProperties: false
      required:
        - message
      properties:
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      example:
        message: interest account not found
    ErrorResponseDeserialization:
      type: object
      description: >
        Error payload generated only when the request body fails JSON
        deserialization

        (unknown field or invalid JSON structure). Returned with HTTP 400.
      additionalProperties: false
      required:
        - error
        - status
      properties:
        error:
          type: string
          description: Short error category.
        message:
          type: string
          description: Details about the field or structure that causes the error.
        field:
          type: string
          description: Name of the invalid field. Present only for unknown-field errors.
        status:
          type: integer
          description: HTTP status code, always 400 for this shape.
      example:
        error: Invalid field in request
        message: >-
          Field 'foo' is not allowed. Only the following fields can be updated:
          start_date, description, benchmark, fixed_interest_rate, margin_rate,
          margin, interest_by_tiers, interest_thresholds
        field: foo
        status: 400
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            anyOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - $ref: '#/components/schemas/ErrorResponseDeserialization'
          examples:
            validation:
              summary: Bean validation or binding errors
              value:
                message:
                  - fixed_interest_rate must be informed
                  - margin_rate must be positive
            requestBody:
              summary: invalid or missing request value
              value:
                message: >-
                  Failed to process your request. Validate the fields in your
                  request.
            tenantHeader:
              summary: Tenant header missing or malformed
              value:
                message: x-tenant header is missing or malformed
            unknownField:
              summary: Unknown field in request body
              value:
                error: Invalid field in request
                message: >-
                  Field 'foo' is not allowed. Only the following fields can be
                  updated: start_date, description, benchmark,
                  fixed_interest_rate, margin_rate, margin, interest_by_tiers,
                  interest_thresholds
                field: foo
                status: 400
            invalidJson:
              summary: Invalid JSON body
              value:
                error: Invalid JSON format
                message: Request contains invalid JSON structure or field types
                status: 400
            taxWithholdingAccrualFeeRequired:
              summary: ACCRUAL withholding without fee_processing_code
              value:
                message:
                  - >-
                    fee_processing_code is required when
                    tax_withholding.withholding_moment is ACCRUAL.
            taxWithholdingAccrualTaxRulesNotAllowed:
              summary: ACCRUAL withholding with tax_rules present
              value:
                message:
                  - >-
                    tax_rules must be null when
                    tax_withholding.withholding_moment is ACCRUAL.
            taxWithholdingCapitalizationFeeNotAllowed:
              summary: CAPITALIZATION withholding with fee_processing_code present
              value:
                message:
                  - >-
                    fee_processing_code must be null when
                    tax_withholding.withholding_moment is CAPITALIZATION.
            taxWithholdingCapitalizationTaxRulesRequired:
              summary: CAPITALIZATION withholding without tax_rules
              value:
                message:
                  - >-
                    tax_rules is required when
                    tax_withholding.withholding_moment is CAPITALIZATION.
            taxWithholdingNoneFieldsNotAllowed:
              summary: >-
                NULL withholding_moment with fee_processing_code or tax_rules
                present
              value:
                message:
                  - >-
                    fee_processing_code and tax_rules must be null when
                    tax_withholding.withholding_moment is NULL.
            taxWithholdingNotAllowedWhenTaxesExemption:
              summary: taxes_exemption is true with tax_withholding present
              value:
                message:
                  - tax_withholding must be null when taxes_exemption is true.
    401Unauthorized:
      description: >-
        Unauthorized. The response body is produced by the upstream
        authentication gateway and is not defined by this service.
    404NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            interestAccountNotFound:
              summary: Interest account not found
              value:
                message: interest account not found
            interestPlanNotFound:
              summary: Interest plan not found
              value:
                message: interest plan not found
            benchmarkNotFound:
              summary: Benchmark not found
              value:
                message: benchmark not found
    409Conflict:
      description: 'Conflict: A version with this start date already exists'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: 'Conflict: Version with this start date already exists'
    500InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Failed to process your request
security:
  - BearerAuth: []
paths:
  /v1/interest/plan:
    post:
      summary: Create interest plan
      description: >
        Create an interest plan configuration that defines how the platform
        calculates interest accrual. After it's created, you can apply the
        interest plan to a specific product or account. For example, you can
        provide the `interest_plan_id` when creating a [deposit
        product](ref:interest-bearing-v1-create-deposit-product), when creating
        a [savings
        account](ref:interest-bearing-v1-create-savings-account-product), or
        when [depositing money](ref:post-v1-interest-deposit) into an account.


        This endpoint generates an [Interest plan creation
        succeeded](https://developers.pismo.io/events/docs/interest-engine-interest-plan-creation-success-1)
        event.


        For more information, refer to the [Interest-bearing
        accounts](doc:interest-bearing-accounts) guide.
      tags:
        - Interest engine
      operationId: post-v1-interest-plan
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ContentType'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestPlanRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPlanResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: List Org interest plans
      description: List all interest plans for a given Org.
      tags:
        - Interest engine
      operationId: get-v1-interest-plans
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPlansResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/interest/plan/{interestPlanId}:
    get:
      summary: Get interest plan
      description: >
        Get interest plan details. By default, returns the latest version of the
        interest plan.

        You can optionally specify a `version_date` query parameter to retrieve
        the version that was active on a specific date.

        If a `version_date` is provided, the endpoint returns the latest version
        with a start date less than or equal to the specified date.
      tags:
        - Interest engine
      operationId: get-v1-interest-plan
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/InterestPlanIdPath'
        - $ref: '#/components/parameters/VersionDate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInterestPlanResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    patch:
      summary: Create interest plan version
      description: >
        Create a new version of an existing interest plan. This endpoint allows
        you to update specific fields while preserving others from the previous
        version.


        Key features:

        - Creates a new version with the specified `start_date`.

        - Updates only the provided fields—any field not specified inherits the
        value from the previous version.

        - Validates that the new `start_date` is after the `start_date` of the
        previous version.

        - Maintains immutable fields like `interest_type` and
        `tier_calculation`.

        - Preserves existing tiers when updating `interest_by_tiers`—only
        specified tiers are updated.


        This endpoint generates an [Interest plan
        created](https://developers.pismo.io/events/docs/interest-engine-interest-plan-creation-success-1)
        event.
      tags:
        - Interest engine
      operationId: patch-v1-interest-plan
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/InterestPlanIdPath'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestPlanVersionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestPlanVersionResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/interest/account/{accountId}:
    get:
      summary: Get account interest
      description: Get account interest details.
      tags:
        - Account interest
      operationId: get-v1-interest-account
      parameters:
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInterestAccountResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    put:
      summary: Update account interest
      description: >
        Apply specific interest accrual options to an account by replacing its
        full interest

        configuration.


        This operation has full-replacement semantics: every request must
        redeclare the complete

        configuration. Partial updates (sending only the fields you want to
        change) are not

        supported and cause the validation to fail.


        Although every property in the request body is independently optional,
        the body as a

        whole must satisfy several conditional rules. See the request body
        schema description

        for the full set of `benchmark`/`fixed_interest_rate`,

        `tax_withholding`, and `taxes_exemption` rules.
      tags:
        - Account interest
      operationId: put-v1-interest-account
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/AccountId'
      requestBody:
        description: >
          Full interest configuration for the account. See the schema
          description for the

          conditional required-field rules in `benchmark`,
          `fixed_interest_rate`,

          `margin_rate`, `margin`, `tax_withholding`, and `taxes_exemption`.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestAccountResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/interest/accrual/setup:
    post:
      summary: Configure timing for accrual calculation
      description: >
        Set up the time when the daily accrual calculations should occur.


        If you provide a value for `division_id`, then the value provided in
        `time_utc` is only used for the corresponding division. That is, it's
        only used for the accruals of installment plans associated with that
        division.


        If you don't provide a value for `division_id`, then the value provided
        in `time_utc` is used for all installment plans in the program's org,
        unless they are associated with a division that already has a time
        assigned to it. (That is, unless you already ran the endpoint with
        `division_id` set to the ID for that division.)


        <b>Note:</b> If you run the endpoint a second time using the same value
        `division_id`, it generates an error. This also happens if you run the
        endpoint twice without providing a value for `division_id`.
      tags:
        - Interest accrual
      operationId: post-v1-interest-accrual-setup
      parameters:
        - $ref: '#/components/parameters/XProgramId'
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterestAccrualSetupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterestAccrualSetupResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/interest/benchmark-rate:
    post:
      summary: Configure benchmark rate
      description: >
        Configure the benchmark rate and its start date. Used to calculate
        interest accual for floating and hybrid investments.
      tags:
        - Benchmark rate
      operationId: post-v1-benchmark-rate
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        description: Request body
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BenchmarkRateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkRateResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
    get:
      summary: Get Org benchmark rates
      description: Get all benchmark rates configured for an organization.
      tags:
        - Benchmark rate
      operationId: get-v1-benchmark-rate-org
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBenchmarkRateOrgResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
  /v1/interest/benchmark-rate/{benchmark}:
    get:
      summary: Get rates for a specific benchmark
      description: Get all rates configured for a specific benchmark.
      tags:
        - Benchmark rate
      operationId: get-v1-benchmark-rate
      parameters:
        - $ref: '#/components/parameters/ContentType'
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/Benchmark'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBenchmarkRateResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
