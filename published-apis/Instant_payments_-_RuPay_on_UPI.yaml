  /v1/cards/transfer:
    post:
      summary: Transfer UPI funds
      description: >
        United Payments Interface (UPI) funds transfer for RuPay, an Indian card
        network.


        Before calling this endpoint, you can call [List
        cards](ref:post-list-cards) to get the `account_reference_number`. You
        should also call [Validate card](ref:post-validate-card-data) to make
        sure the card data for the transfer request is genuine.


        This endpoint generates a [Payment methods authorization
        created](https://developers.pismo.io/events/docs/payment-methods-authorization-1)
        event and a [Platform authorization
        created](https://developers.pismo.io/events/docs/platform-authorization-platform-authorization-1)
        event.


        This operation is **idempotent**, meaning, it can be applied multiple
        times, yet the outcome remains the same. To guarantee this, the request
        has an `external_transaction_id` field, which must be unique by
        transaction type in the context of the same account reference number. 
      operationId: post-funds-transfer
      tags:
        - UPI
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
      requestBody:
        description: Request Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cards.TransferRequest'
        required: true
      responses:
        '201':
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cards.TransferResponse'
              example:
                upi_reference_number: '165238546812'
                external_transaction_id: MGS584A1244F6BC4D50A3FABE6D93DF913C
                authorization_id: 2263052808
                authorization_datetime: '2024-09-04T13:22:09.579Z'
                status: ACCEPTED
        '202':
          description: >-
            It is returned for duplicated requests, when the transfer is still
            being processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cards.TransferResponse'
              example:
                upi_reference_number: '165238546812'
                external_transaction_id: MGS584A1244F6BC4D50A3FABE6D93DF913C
                status: PROCESSING
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0002:
                  summary: Validation error
                  value:
                    code: EUPI0002
                    message: Validation error
                    details:
                      payload:
                        - field: external_transaction_id
                          message: Field 'external_transaction_id' is required
                EUPI0003:
                  summary: Bad request
                  value:
                    code: EUPI0003
                    message: Bad request
                EUPI0104:
                  summary: Invalid transaction type
                  value:
                    code: EUPI0104
                    message: Invalid transaction type
                EUPI0101:
                  summary: >-
                    The transaction was cancelled due authorization request
                    validation error
                  value:
                    code: EUPI0101
                    message: >-
                      The transaction was cancelled due authorization request
                      validation error
                EUPI0108:
                  summary: The transaction was cancelled due to authorization error
                  value:
                    code: EUPI0108
                    message: >-
                      The transaction was cancelled due to an authorization
                      error
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0120:
                  summary: Transfer amount is greater than the account available limits
                  value:
                    code: EUPI0120
                    message: >-
                      Transfer amount is greater than the account available
                      limits
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0004:
                  summary: Missing required header 'x-tenant'
                  value:
                    code: EUPI0004
                    message: Missing required header 'x-tenant'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0110:
                  summary: Original transaction not found on reversal operation
                  value:
                    code: EUPI0110
                    message: Original transaction not found on reversal operation
        '408':
          description: Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0020:
                  summary: Upi - API returned a timeout error
                  value:
                    code: EUPI0020
                    message: Upi - API returned a timeout error
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0100:
                  summary: Transaction already exists with the external_transaction_id
                  value:
                    code: EUPI0100
                    message: >-
                      Transaction already exists with the
                      external_transaction_id
                EUPI0112:
                  summary: Original transaction is still being processed
                  value:
                    code: EUPI0112
                    message: Original transaction is still being processed
                EUPI0113:
                  summary: >-
                    Original transaction is not accepted, then it can't be
                    reverted
                  value:
                    code: EUPI0113
                    message: >-
                      Original transaction is not accepted, then it can't be
                      reverted
                EUPI0114:
                  summary: >-
                    Reversal transaction amount must be equals to the original
                    transaction
                  value:
                    code: EUPI0114
                    message: >-
                      Reversal transaction amount must be equals to the original
                      transaction
                EUPI0121:
                  summary: Invalid card status
                  value:
                    code: EUPI0121
                    message: Invalid card status
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0001:
                  summary: An unexpected error happened
                  value:
                    code: EUPI0001
                    message: An unexpected error happened
                EUPI0105:
                  summary: The transaction will be cancelled due to internal error
                  value:
                    code: EUPI0105
                    message: The transaction will be cancelled due to internal error
                EUPI0106:
                  summary: >-
                    The transaction was authorized but will be canceled due to
                    internal error
                  value:
                    code: EUPI0106
                    message: >-
                      The transaction was authorized but will be canceled due to
                      internal error
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0109:
                  summary: The transaction will be cancelled due to authorization error
