openapi: 3.1.0
info:
  title: Instant payments - RuPay on UPI
  description: >-
    United Payments Interface (UPI) API integrating providers with the Pismo
    platform
  contact:
    name: Pismo
  license:
    name: Apache 2.0
  version: '1.0'
servers:
  - url: https://sandbox.pismolabs.io/upi-gateway
    description: Sandbox API server for testing
security:
  - BearerAuth: []
tags:
  - name: UPI
    description: Endpoints to manage UPI operations
components:
  parameters:
    AccountRefNumberPath:
      in: path
      name: account_reference_number
      description: >
        Account reference number. Pismo creates this automatically when creating
        a card linked to RuPay on UPI


        This number combines 10 BIN digits and the credit account number. If BIN
        is 6 digits, the remaining 4 digits  are set to zero (`0`). If BIN is 8
        digits, then the remaining 2 digits are set to zero. This is a
        [NPCI](https://www.npci.org.in/what-we-do/rupay/product-overview)
        standard. For example, if the account reference number =
        `1234560000987654321`, the first six digits are the BIN, appended with 4
        zeros and then the credit account number (`987654321``).


        You can call [List cards](ref:post-list-cards) to get a card's account
        reference number.
      required: true
      schema:
        type: string
    AuthHeader:
      in: header
      name: Authorization
      required: true
      description: >-
        Authorization token. Tokens can expire quickly, which can result in a
        **401 Unauthorized** message.
      schema:
        type: string
        example: Bearer eyJhbGci...IUzUx
    ExternalTransactionIDpath:
      name: external_transaction_id
      in: path
      description: External transaction ID
      required: true
      schema:
        type: string
    UserAgentHeader:
      in: header
      name: user-agent
      required: true
      description: Client consuming API.
      schema:
        type: string
  schemas:
    accountReferenceNumber:
      type: string
      description: >

        Account reference number. Pismo creates this automatically when creating
        a card linked to RuPay on UPI.


        This number combines 10 BIN digits and the credit account number. If BIN
        is 6 digits, the remaining 4 digits  are set to zero (`0`). If BIN is 8
        digits, then the remaining 2 digits are set to zero. This is a
        [NPCI](https://www.npci.org.in/what-we-do/rupay/product-overview)
        standard. For example, if the account reference number =
        `1234560000987654321`, the first six digits are the BIN, appended with 4
        zeros and then the credit account number (`987654321``).


        You can call [List cards](ref:post-list-cards) to get a card's account
        reference number.
      example: '12345600000000001140340134'
    amountAndRateEntity:
      type: object
      properties:
        type:
          type: string
          description: Entity type
        amount:
          type: number
          description: Entity applied amount
          example: 20.98
        rate:
          type: number
          description: Percentage rate used for calculating
          example: 5.9
    authorizationDatetime:
      type: string
      format: datetime
      description: When transfer was authorised. RFC 3339 format.
    authorizationID:
      type: number
      description: Authorization ID
      example: 2263052808
    card_info:
      type: object
      description: Card information
      properties:
        account_reference_number:
          type: string
          description: >-
            Card account reference number. Either this field or `last_4_digits`
            is **REQUIRED**.
          example: '789012000087442038'
        last_4_digit:
          type: string
          description: >-
            Card last 4 PAN digits. Either this field or
            `account_reference_number` is **REQUIRED**.
          example: '2432'
      example:
        account_reference_number: '789012000087442038'
        last_4_digit: '2432'
    cards.BalanceRequest:
      type: object
      required:
        - account_reference_number
        - external_transaction_datetime
        - external_transaction_id
      properties:
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
    cards.BalanceResponse:
      type: object
      required:
        - card
      properties:
        card:
          type: object
          description: Card balance
          allOf:
            - $ref: '#/components/schemas/cards.CardBalance'
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
    cards.CardBalance:
      type: object
      required:
        - available_balance
        - ledger_balance
      properties:
        available_balance:
          type: number
          description: Available card balance
          example: 150000
        ledger_balance:
          type: number
          description: Ledger balance
          example: 1000
    cards.CardBillRequest:
      type: object
      required:
        - card_info
        - phone
      properties:
        card_info:
          $ref: '#/components/schemas/card_info'
        phone:
          $ref: '#/components/schemas/phone'
    cards.CardBillResponse:
      type: object
      required:
        - total_due_amount
        - minimum_due_amount
        - due_date
        - card_masked_number
        - account_reference_number
      properties:
        total_due_amount:
          type: number
          description: Total due amount
          example: 500
        minimum_due_amount:
          type: number
          description: Minimum due amount
          example: 500
        due_date:
          type: string
          description: Bill due date
          example: '23012025'
        card_masked_number:
          type: string
          description: Card masked number
          example: 123456XXXXXXXX78
        account_reference_number:
          type: string
          description: Card account reference number
          example: '789012000087442038'
    cards.CardData:
      type: object
      required:
        - card_expiration
        - last_six_digits
      properties:
        card_expiration:
          type: string
          description: >-
            Card expiration, format = MMYY. **REQUIRED** if `last_six_digits` is
            passed.
          example: '0529'
        last_six_digits:
          type: string
          description: Card's last six digits. **REQUIRED** if `card_expiration` is passed
          example: '657114'
    cards.CardsData:
      type: object
      required:
        - account_reference_number
        - bin
        - masked_number
        - printed_name
        - status
        - type
      properties:
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        bin:
          type: string
          description: Card Bank Identification Number (BIN)
          example: '123456'
        masked_number:
          type: string
          description: Card masked number
          example: 123456XXXXXXXX78
        printed_name:
          type: string
          description: Card printed name
          example: Nan Tucket
        status:
          type: string
          description: >-
            Card status. For more information, see [Card lifecycle and
            statuses](https://developers.pismo.io/pismo-docs/docs/card-lifecycle-and-statuses).
          example: ACTIVE
        type:
          $ref: '#/components/schemas/cardType'
    cards.EmiRequest:
      type: object
      required:
        - amount
        - currency
        - account_reference_number
        - external_transaction_datetime
        - external_transaction_id
        - original_external_transaction_id
        - mcc
        - merchant_name
        - phone
        - transaction_type
        - upi_reference_number
        - emi_status
      properties:
        amount:
          type: number
          description: Transaction amount
          example: 500
        currency:
          type: string
          description: >-
            Transaction currency. ISO 4217 3-digit currency code. For example -
            `INR` (Indian rupee)
          example: INR
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        original_external_transaction_id:
          $ref: '#/components/schemas/originalExternalTransactionId'
        emi_status:
          type: string
          description: EMI status
          enum:
            - PRE
            - POST
            - DURING
            - FORECLOSE
          example: DURING
        mcc:
          type: string
          description: Transaction Merchant Category Code (MCC)
          example: '6012'
        merchant_name:
          type: string
          description: Merchant name
          example: Cafe Coffee Day
        phone:
          $ref: '#/components/schemas/phone'
        transaction_type:
          $ref: '#/components/schemas/transactionType'
        upi_reference_number:
          $ref: '#/components/schemas/upiReferenceNumber'
        transaction_reference:
          type: string
          description: Transaction reference
          example: Lunch
        credit_account_number:
          type: string
          description: Payee account number if available
          example: '98765004371'
        foreclose_data:
          $ref: '#/components/schemas/forecloseData'
        emi_data:
          $ref: '#/components/schemas/emiData'
    cards.EmiResponse:
      type: object
      required:
        - external_transaction_id
        - status
        - upi_reference_number
      properties:
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        status:
          $ref: '#/components/schemas/transactionStatus'
        upi_reference_number:
          $ref: '#/components/schemas/upiReferenceNumber'
        authorization_id:
          $ref: '#/components/schemas/authorizationID'
        authorization_datetime:
          $ref: '#/components/schemas/authorizationDatetime'
        foreclose_data:
          $ref: '#/components/schemas/forecloseData'
        emi_data:
          $ref: '#/components/schemas/emiData'
    cards.Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
          example: EUPI0001
        message:
          type: string
          description: Error message
          example: An unexpected error happened
    cards.InquiryResponse:
      type: object
      required:
        - external_transaction_datetime
        - external_transaction_id
        - status
        - transaction_type
        - upi_reference_number
      properties:
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        status:
          $ref: '#/components/schemas/transactionStatus'
        transaction_type:
          $ref: '#/components/schemas/transactionType'
        upi_reference_number:
          $ref: '#/components/schemas/upiReferenceNumber'
        reason:
          $ref: '#/components/schemas/reason'
        authorization_id:
          $ref: '#/components/schemas/authorizationID'
        authorization_datetime:
          $ref: '#/components/schemas/authorizationDatetime'
    cards.ListCardsRequest:
      type: object
      required:
        - external_transaction_datetime
        - external_transaction_id
        - phone
      properties:
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        phone:
          $ref: '#/components/schemas/phone'
        type:
          $ref: '#/components/schemas/cardType'
    cards.ListCardsResponse:
      type: object
      required:
        - cards
        - external_transaction_datetime
        - external_transaction_id
        - owner
        - phone
      properties:
        cards:
          type: array
          description: Account cards
          items:
            $ref: '#/components/schemas/cards.CardsData'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        owner:
          type: object
          description: Account owner data
          allOf:
            - $ref: '#/components/schemas/cards.Owner'
        phone:
          $ref: '#/components/schemas/phone'
    cards.Owner:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Owner name
    cards.PinData:
      type: object
      required:
        - key_id
        - pin_block
      properties:
        pin_block:
          type: string
          description: Pin block
          example: 3FE661D50EF1F6F1
        key_id:
          type: string
          description: Key encryption ID
          example: 7d14ca2e-1057-11ee-8cee-060f666de710
    cards.TransferRequest:
      type: object
      required:
        - amount
        - currency
        - account_reference_number
        - external_transaction_datetime
        - external_transaction_id
        - mcc
        - merchant_name
        - phone
        - transaction_type
        - upi_reference_number
      properties:
        amount:
          type: number
          description: Transaction amount
          example: 500
        currency:
          type: string
          description: >-
            Transaction currency. ISO 4217 3-digit currency code. For example -
            `INR` (Indian rupee)
          example: INR
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        mcc:
          type: string
          description: Transaction Merchant Category Code (MCC)
          example: '6012'
        merchant_name:
          type: string
          description: Merchant name
          example: Cafe Coffee Day
        merchant:
          $ref: '#/components/schemas/merchant'
        phone:
          $ref: '#/components/schemas/phone'
        transaction_type:
          $ref: '#/components/schemas/transactionType'
        upi_reference_number:
          $ref: '#/components/schemas/upiReferenceNumber'
        transaction_reference:
          type: string
          description: Transaction reference
          example: Lunch
        credit_account_number:
          type: string
          description: Payee account number if available
          example: '98765004371'
    cards.TransferResponse:
      type: object
      required:
        - external_transaction_id
        - status
        - upi_reference_number
      properties:
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        status:
          $ref: '#/components/schemas/transactionStatus'
        upi_reference_number:
          $ref: '#/components/schemas/upiReferenceNumber'
        authorization_id:
          $ref: '#/components/schemas/authorizationID'
        authorization_datetime:
          $ref: '#/components/schemas/authorizationDatetime'
    cards.ValidateRequest:
      required:
        - account_reference_number
        - card_data
        - external_transaction_datetime
        - external_transaction_id
      type: object
      properties:
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        card_data:
          type: object
          description: Card data
          allOf:
            - $ref: '#/components/schemas/cards.CardData'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        pin_data:
          type: object
          description: Pin data
          allOf:
            - $ref: '#/components/schemas/cards.PinData'
    cards.ValidateResponse:
      type: object
      required:
        - account_reference_number
        - external_transaction_datetime
        - external_transaction_id
        - result
      properties:
        account_reference_number:
          $ref: '#/components/schemas/accountReferenceNumber'
        external_transaction_datetime:
          $ref: '#/components/schemas/externalTransactionDatetime'
        external_transaction_id:
          $ref: '#/components/schemas/externalTransactionID'
        result:
          type: string
          description: Validation result. If not valid, an error message is returned.
          example: VALIDATED
    cardType:
      type: string
      description: >-
        Pismo card type. For more information, see [Cards
        management](https://developers.pismo.io/pismo-docs/docs/cards-overview-1#card-types).
        Default is empty string, meaning all card types are returned.
      enum:
        - ''
        - PLASTIC
        - VIRTUAL
        - TEMPORARY
      example: PLASTIC
    domain.DetailMessage:
      type: object
      properties:
        external:
          type: array
          items:
            $ref: '#/components/schemas/domain.ExternalMessage'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/domain.ParameterMessage'
        payload:
          type: array
          items:
            $ref: '#/components/schemas/domain.PayloadMessage'
    domain.Error:
      type: object
      properties:
        code:
          type: string
          description: Error type code
          example: EPT0001
        details:
          type: object
          description: Detailed error message
          allOf:
            - $ref: '#/components/schemas/domain.DetailMessage'
        message:
          type: string
          description: Error message
          example: User not found
    domain.ExternalMessage:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Code
          example: PBE315
        message:
          type: string
          description: Message
          example: Generic error
    domain.ParameterMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field
          example: Query parameter
        message:
          type: string
          description: Message
          example: Generic error
    domain.PayloadMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field
          example: Entity.field
        message:
          type: string
          description: Error message
          example: Generic error
    emiData:
      type: object
      required:
        - contract_amount
        - principal_amount
        - number_of_installments
        - installments
      properties:
        contract_amount:
          type: number
          description: >-
            Total installment amount calculation and addition of any necessary
            fees
          example: 122.98
        principal_amount:
          type: number
          description: >-
            Total installment amount after calculation without the addition of
            any fees
          example: 100.98
        number_of_installments:
          type: number
          description: Number of installments in this calculation
          example: 3
        fees:
          type: array
          description: All applied fees on this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
        taxes:
          type: array
          description: All applied taxes on this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
        interests:
          type: array
          description: All applied taxes on this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
        installments:
          type: array
          description: Installments applied
          items:
            $ref: '#/components/schemas/installment'
    externalTransactionDatetime:
      type: string
      description: Request datetime. ISO 8601 format.
      example: '2020-09-15T19:39:54.013Z'
    externalTransactionID:
      type: string
      description: Request ID code
      example: MGS584A1244F6BC4D50A3FABE6D93DF913C
    forecloseData:
      type: object
      required:
        - contract_amount
      properties:
        contract_amount:
          type: number
          description: >-
            Total installment amount after calculation and addition of any
            necessary fees
          example: 122.98
    installment:
      type: object
      required:
        - contract_amount
        - principal_amount
        - number_of_installments
      properties:
        contract_amount:
          type: number
          description: >-
            Total installment amount after calculation and addition of any
            necessary fees
          example: 122.98
        principal_amount:
          type: number
          description: >-
            Total installment amount after calculation without the addition of
            any fees
          example: 100.98
        number_of_installments:
          type: number
          description: Number of installments in this calculation
          example: 3
        fees:
          type: array
          description: Applied fees in this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
        taxes:
          type: array
          description: Applied taxes in this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
        interests:
          type: array
          description: Applied interests in this calculation
          items:
            $ref: '#/components/schemas/amountAndRateEntity'
    merchant:
      type: object
      properties:
        mid:
          type: string
          description: Merchant ID number
          example: HDFC000018966129
        tid:
          type: string
          description: Terminal ID
          example: '42284754'
        sid:
          type: string
          description: >-
            Service ID - payment network (like NPCI) assigned unique code to a
            merchant or service provider.
          example: '18994373'
    originalExternalTransactionId:
      type: string
      description: Request identification code
      example: MGS584A1244F6BC4D50A3FABE6D93DF913C
    phone:
      type: object
      required:
        - country_code
        - phone
      properties:
        country_code:
          type: string
          description: Phone number country code
          example: '55'
        phone:
          type: string
          description: Phone number
          example: '999167803'
        area_code:
          type: string
          description: Phone number area code
          example: '47'
      example:
        country_code: '91'
        phone: '9592714958'
    reason:
      type: object
      description: Reason
      allOf:
        - $ref: '#/components/schemas/cards.Error'
    transactionStatus:
      type: string
      description: Transaction status
      enum:
        - PROCESSING
        - ACCEPTED
        - ERROR
        - CANCELLED
      example: PROCESSING
    transactionType:
      type: string
      description: |
        Transaction type:
         * `C` - Credit
         * `D` - Debit
         * `R` - Reversal
         * `E` - Equated monthly installments (EMI)
         * `F` - Foreclose
      enum:
        - C
        - D
        - R
        - E
        - F
      example: C
    upiReferenceNumber:
      type: string
      description: UPI reference number
      minLength: 12
      maxLength: 12
      example: '165238546812'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Account token - token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a **401 Unauthorized** error.
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/domain.Error'
    404NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/domain.Error'
    409Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/domain.Error'
    500InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/domain.Error'
          example:
            code: EUPI0001
            message: An unexpected error happened
paths:
  /v1/cards/list:
    post:
      summary: List cards
      description: Return active account card list
      operationId: post-list-cards
      tags:
        - UPI
      parameters:
        - $ref: '#/components/parameters/AuthHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
      requestBody:
        description: Request Body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cards.ListCardsRequest'
        required: true
      responses:
        '200':
          description: Response Body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cards.ListCardsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0003:
                  summary: Bad Request
                  value:
                    code: EUPI0003
                    message: Bad Request
                EUPI0023:
                  summary: number is a required field
                  value:
                    code: EUPI0023
                    message: number is a required field
                EUPI0002:
                  summary: Validation error
                  value:
                    code: EUPI0002
                    message: Validation error
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0004:
                  summary: Missing required header 'x-tenant'
                  value:
                    code: EUPI0004
                    message: Missing required header 'x-tenant'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0028:
                  summary: Cards not found.
                  value:
                    code: EUPI0028
                    message: Cards not found.
                EUPI0032:
                  summary: Not found.
                  value:
                    code: EUPI0032
                    message: Not found.
                EUPI0007:
                  summary: Account not found.
                  value:
                    code: EUPI0007
                    message: Account not found.
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0024:
                  summary: card type invalid
                  value:
                    code: EUPI0024
                    message: card type invalid
                EUPI0014:
                  summary: Not unique owner for the phone number
                  value:
                    code: EUPI0014
                    message: Not unique owner for the phone number
        '422':
          description: UnprocessableEntity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Error'
              examples:
                EUPI0004:
                  summary: An unexpected error has occurred
                  value:
                    code: EUPI0042
