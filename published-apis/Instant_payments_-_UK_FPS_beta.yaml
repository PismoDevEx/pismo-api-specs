  /v1/payments/fps/return/{endToEndId}:
    post:
      summary: Return FPS payment [beta]
      description: >
        Manually trigger a return for a previously credited FPS inbound
        transaction.


        This endpoint allows clients to initiate a return of funds for an
        inbound FPS payment that has already been credited to the beneficiary's
        account. The return is submitted to the payment provider (Form3) for
        processing.


        Returns initiated through this endpoint are marked with `return_origin`
        = `CLIENT` to distinguish them from provider-initiated returns.


        The `return_reason` must be one of the 14 standardized Form3 reason
        codes (`00000001` through `00000014`).


        This endpoint generates an [FPS inbound payment return
        processed](https://developers.pismo.io/events/docs/fps-fps-in-return-status-change-1)
        event with `return_origin` = `CLIENT`.
      operationId: post-return-fps
      tags:
        - Faster payments
      parameters:
        - $ref: '#/components/parameters/authHeader'
        - $ref: '#/components/parameters/tenantHeader'
        - $ref: '#/components/parameters/idempotencyKeyHeader'
        - $ref: '#/components/parameters/reqTrackingIdHeader'
        - $ref: '#/components/parameters/endToEndIDPath'
      requestBody:
        description: Return payment request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fps_return.FpsReturnRequest'
        required: true
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fps_return.FpsReturnResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0004:
                  summary: Validation Error
                  value:
                    code: EFPS0004
                    message: Validation error
                EFPS0016:
                  summary: Unmarshal Error
                  value:
                    code: EFPS0016
                    message: Unmarshal error
                EFPS0096:
                  summary: Partial Return Not Allowed
                  value:
                    code: EFPS0096
                    message: >-
                      Partial returns are not allowed. Return amount must match
                      the original transaction amount
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0002:
                  summary: Missing Tenant Header
                  value:
                    code: EFPS0002
                    message: 'Missing required header: ''x-tenant'''
                EFPS0085:
                  summary: Missing Account ID Header
                  value:
                    code: EFPS0085
                    message: Missing required account-id
                EFPS0086:
                  summary: Missing Idempotency Key
                  value:
                    code: EFPS0086
                    message: 'Missing required header: ''Idempotency-Key'''
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0067:
                  summary: Transaction Not Found
                  value:
                    code: EFPS0067
                    message: Transaction API not found error
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0058:
                  summary: Record Already Exists
                  value:
                    code: EFPS0058
                    message: Record already exists
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0093:
                  summary: Payment Not Eligible For Return
                  value:
                    code: EFPS0093
                    message: Payment is not eligible for return
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0015:
                  summary: PSP Gateway API Rate Limit
                  value:
                    code: EFPS0015
                    message: PSPGateway API Rate Limit exceeded
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0006:
                  summary: HTTP Error
                  value:
                    code: EFPS0006
                    message: HTTP request error
                EFPS0012:
                  summary: PSP Gateway API Timeout
                  value:
                    code: EFPS0012
                    message: PSPGateway API timeout error
                EFPS0023:
                  summary: Transaction Database Error
                  value:
                    code: EFPS0023
                    message: Transaction database error
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0014:
                  summary: PSP Gateway API Bad Gateway
                  value:
                    code: EFPS0014
                    message: PSPGateway API Bad Gateway
