openapi: 3.0.1
info:
  title: Instant payments - Faster payments
  description: Faster Payments (FPS) real-time payments system API
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
  version: '1.0'
servers:
  - url: https://sandbox.pismolabs.io/fps
    description: Sandbox API server for testing
tags:
  - name: Faster payments
    description: Faster Payment Service (FPS) endpoints
components:
  parameters:
    authHeader:
      name: Authorization
      in: header
      schema:
        type: string
      description: >
        Account token—token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a <b>401 Unauthorized</b> message.
      required: true
    endToEndIDPath:
      name: endToEndId
      in: path
      description: FPS transaction's end to end ID.
      required: true
      schema:
        type: string
        maxLength: 31
    idempotencyKeyHeader:
      name: Idempotency-key
      in: header
      schema:
        type: string
      description: >
        A UUID to ensure the operation remains idempotent, allowing for
        operation repetition without causing unintended effects or duplication.
        An idempotent operation is one that can be applied multiple times, yet
        the outcome remains the same. it ensures that network errors, retries,
        or failures can occur without introducing inconsistencies.
      required: true
    tenantHeader:
      name: x-tenant
      in: header
      schema:
        type: string
      description: Organization ID
      required: true
    reqTrackingIdHeader:
      name: x-cid
      in: header
      schema:
        type: string
      description: >
        Request tracking identifier. If not provided, a random UUID will be
        generated.
      required: false
  schemas:
    Amount:
      type: number
      description: Transaction amount
      example: 853.09
    customer.DetailMessage:
      type: object
      properties:
        external:
          type: array
          items:
            $ref: '#/components/schemas/customer.ExternalMessage'
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/customer.ParameterMessage'
        payload:
          type: array
          items:
            $ref: '#/components/schemas/customer.PayloadMessage'
    customer.Error:
      type: object
      properties:
        code:
          type: string
          description: Error's code.
          example: EPT0001
        details:
          $ref: '#/components/schemas/customer.DetailMessage'
        message:
          type: string
          description: Error's message.
          example: User not found
    customer.ExternalMessage:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Code
          example: PBE315
        message:
          type: string
          description: Message
          example: Generic error
    customer.ParameterMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field
          example: Query parameter
        message:
          type: string
          description: Message
          example: Generic error
    customer.PayloadMessage:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field
          example: Entity.field
        message:
          type: string
          description: Message
          example: Generic error
    endToEndID:
      maxLength: 31
      type: string
      description: >
        Client-generated transaction identifier. Must be unique for each
        transaction.
      example: 1374f841568e4ff4b3a63b023c170ec
    fps_cancel.FpsCancelResponse:
      type: object
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/endToEndID'
        status:
          $ref: '#/components/schemas/fps_cancel.status'
    fps_cancel.status:
      type: string
      enum:
        - CANCELLED
      description: >
        - `CANCELLED` - Something went wrong and the transaction was cancelled.
        Refer to `reason` for details,
      example: CANCELLED
    fps_get.FpsGetResponse:
      type: object
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/endToEndID'
        status:
          $ref: '#/components/schemas/status'
        amount:
          $ref: '#/components/schemas/Amount'
    fps_out.CreditorAccount:
      type: object
      description: Creditor's account information
      pattern: ^[a-zA-Z0-9\/\-?:().,'+\s#=!"%&*<>;{@\r\n]*$
      required:
        - identification
        - name
        - scheme_name
      properties:
        name:
          maxLength: 40
          type: string
          description: Creditor name.
          example: Len Lease
        scheme_name:
          $ref: '#/components/schemas/schemeName'
        identification:
          $ref: '#/components/schemas/schemeID'
    fps_out.FpsOutRequest:
      type: object
      required:
        - end_to_end_id
        - creditor_account
        - currency
        - scheme_payment_type
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/endToEndID'
        creditor_account:
          $ref: '#/components/schemas/fps_out.CreditorAccount'
        scheme_payment_type:
          $ref: '#/components/schemas/fps_out.SchemaPaymentType'
        currency:
          $ref: '#/components/schemas/fps_out.Currency'
        remittance_information:
          $ref: '#/components/schemas/fps_out.RemittanceInformation'
    fps_out.FpsOutResponse:
      type: object
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/endToEndID'
        status:
          $ref: '#/components/schemas/status'
    fps_out.Currency:
      required:
        - amount
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        code:
          type: string
          enum:
            - GBP
          description: Transaction currency (ISO 4217 3-letter code).
          example: GBP
    fps_out.RemittanceInformation:
      type: object
      properties:
        reference:
          maxLength: 140
          pattern: ^[a-zA-Z0-9\/\-?:().,'+\s#=!"%&*<>;{@\r\n]*$
          type: string
          description: Remittance reference.
          example: Reference information
    fps_out.SchemaPaymentType:
      type: string
      enum:
        - ImmediatePayment
        - StandingOrder
        - ForwardDatedPayment
      description: |
        Payment scheme to be used.<br>
        * `ImmediatePayment` — Single Immediate Payment (SIP)<br>
        * `StandingOrder` — Standing Order Payment (SOP)<br>
        * `ForwardDatedPayment`— Forward Dated Payment (FDP)<br>
      example: ImmediatePayment
    cop.AccountClassification:
      type: string
      description: Account classification type
      enum:
        - personal
        - business
      example: personal
    cop.AccountNumber:
      type: string
      description: BBAN account number (exactly 8 numeric characters)
      minLength: 8
      maxLength: 8
      pattern: ^[0-9]{8}$
      example: '12345678'
    cop.AccountNumberCode:
      type: string
      description: >
        Account number format code.

        * `BBAN` - Basic Bank Account Number. Currently the only supported
        format.
      enum:
        - BBAN
      example: BBAN
    cop.ActualName:
      type: string
      description: >-
        Actual name on the account. Returned for `close_match` or `no_match`
        results.
      example: Mabel Syrup
    cop.Answer:
      type: string
      enum:
        - match
        - close_match
        - no_match
        - rejected
      description: |
        Verification result:
        * `match`—Name matches the account holder.
        * `close_match`—Close match
        * `no_match`—Does not match
        * `rejected`—Verification was rejected.
      example: match
    cop.BankID:
      type: string
      description: Bank identifier - sort code (exactly 6 numeric characters).
      minLength: 6
      maxLength: 6
      pattern: ^[0-9]{6}$
      example: '123456'
    cop.BankIdCode:
      type: string
      description: >
        Bank identifier code type

        * `GBDSC`—Great Britain Domestic Sort Code. Currently the only supported
        format.
      enum:
        - GBDSC
      example: GBDSC
    cop.COPVerificationRequest:
      type: object
      required:
        - id
        - account_classification
        - account_number
        - account_number_code
        - bank_id
        - bank_id_code
        - name
      properties:
        id:
          $ref: '#/components/schemas/cop.ID'
        account_classification:
          $ref: '#/components/schemas/cop.AccountClassification'
        account_number:
          $ref: '#/components/schemas/cop.AccountNumber'
        account_number_code:
          $ref: '#/components/schemas/cop.AccountNumberCode'
        bank_id:
          $ref: '#/components/schemas/cop.BankID'
        bank_id_code:
          $ref: '#/components/schemas/cop.BankIdCode'
        name:
          $ref: '#/components/schemas/cop.Name'
        secondary_identification:
          $ref: '#/components/schemas/cop.SecondaryID'
    cop.COPVerificationResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/cop.Status'
        answer:
          $ref: '#/components/schemas/cop.Answer'
        actual_name:
          $ref: '#/components/schemas/cop.ActualName'
        name_in_request:
          $ref: '#/components/schemas/cop.NameInResponse'
        reason_code:
          $ref: '#/components/schemas/cop.ReasonCode'
        reason:
          $ref: '#/components/schemas/cop.Reason'
    cop.ID:
      type: string
      description: UUID identifier for this COP verification request.
      format: uuid
      maxLength: 36
      example: 4942f12c-5430-4d1b-8b56-c7f1c8a9118d
    cop.Name:
      type: string
      maxLength: 135
      description: |
        Account name to verify
      example: Doe Reetos
    cop.NameInResponse:
      type: array
      items:
        type: string
        description: Name(s) passed in the verification request
      example:
        - Tam Arind
    cop.Reason:
      type: string
      description: Human-readable reason description
      example: String is a close match to the account
    cop.ReasonCode:
      type: string
      description: >
        Reason code for the verification result. Known values include
        (non-exhaustive):<br>
            * `AC01` - No account with the given account number<br>
            * `ACNS` - Account does not support Confirmation of Payee<br>
            * `ANNM` - String does not match the account name<br>
            * `BAMM` - Close match to the account name. Account type is Business when Personal was indicated<br>
            * `BANM` - Match to the account name, but account type is Business when Personal was indicated<br>
            * `CASS` - Account has been switched to a different organisation<br>
            * `IVCR` - Invalid secondary customer reference data<br>
            * `MBAM` - Close match to the account name<br>
            * `OPTO` - Account opted out of Confirmation of Payee<br>
            * `PAMM` - Close match to the account name. Account type is Personal when Business was indicated<br>
            * `PANM` - Match to the account name, but account type is Personal when Business was indicated<br>
            * `SCNS` - Organisation doesn't own the passed sort code<br>
        example: "MBAM"
    cop.SecondaryID:
      type: string
      description: >
        Secondary reference to identify the account, such as a roll number for
        building society accounts. A building society roll number is a unique
        alphanumeric identifier—often 10-12 digits or a mix of letters and
        numbers—used to identify specific savings or mortgage accounts.
      maxLength: 35
      example: A1B2C3D
    cop.Status:
      type: string
      description: |
        COP request status
          * `confirmed`—Verification request was delivered and a response received.
          * `delivery_failed`—Verification request could not be delivered.
      enum:
        - confirmed
        - delivery_failed
      example: confirmed
    fps_release.FpsReleaseResponse:
      type: object
      properties:
        end_to_end_id:
          $ref: '#/components/schemas/endToEndID'
        status:
          $ref: '#/components/schemas/fps_release.status'
        amount:
          $ref: '#/components/schemas/Amount'
    fps_release.status:
      type: string
      enum:
        - SETTLED
      description: |
        - `SETTLED` - Transaction was completed processed and settled
      example: SETTLED
    fps_return.FpsReturnRequest:
      type: object
      required:
        - return_reason
        - amount
      properties:
        return_reason:
          $ref: '#/components/schemas/fps_return.ReturnReason'
        amount:
          type: string
          maxLength: 20
          description: >-
            Amount to return. Must match the original transaction amount, since
            the Pismo platform does not support partial returns.
          example: '10.50'
    fps_return.FpsReturnResponse:
      type: object
      properties:
        status:
          type: string
          description: Return request status
          example: ACCEPTED
        return_transaction_id:
          type: string
          description: Return transaction ID
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        original_transaction_id:
          type: string
          description: ID of the original inbound transaction being returned
          example: f1e2d3c4-b5a6-7890-abcd-ef1234567890
        return_origin:
          type: string
          description: |
            Origin of the return request.
              * `CLIENT`—Return was manually triggered by the client via this endpoint.
          example: CLIENT
    fps_return.ReturnReason:
      type: string
      description: |
        Form3 return reason code. Must be one of the following 14 codes:
          * `00000001`—Beneficiary sort code/account number unknown
          * `00000002`—Beneficiary account closed
          * `00000003`—Beneficiary account stopped
          * `00000004`—Beneficiary deceased
          * `00000005`—Account cannot be identified without data in reference field
          * `00000006`—Beneficiary account name does not match beneficiary account number
          * `00000007`—Return requested by sender of original payment
          * `00000008`—Account is not in currency quoted
          * `00000009`—Beneficiary not expecting funds/instructed return
          * `00000010`—Terms and conditions of account do not permit crediting of these funds
          * `00000011`—Sending institution action required
          * `00000012`—Account transferred
          * `00000013`—Payment cannot be applied because of beneficiary sensitivities
          * `00000014`—Reason not given
      enum:
        - '00000001'
        - '00000002'
        - '00000003'
        - '00000004'
        - '00000005'
        - '00000006'
        - '00000007'
        - '00000008'
        - '00000009'
        - '00000010'
        - '00000011'
        - '00000012'
        - '00000013'
        - '00000014'
      example: '00000001'
    schemeID:
      maxLength: 22
      type: string
      description: >
        Creditor's scheme value. A scheme identifies an account - UK-SCAN, IBAN,
        or BBAN. Refer to `schemeName` for details.
          * `uk-scan`—Sort code and account number (SCAN) scheme. Format: `sortcode + accountnumber`
          * `bban`—Basic Bank Account Number scheme. Format: `bankidentifier + branchidentifier + accountnumber`
          * `iban`—International Bank Account Number scheme. Format: `country code + check digits + bban`

        For example, for an IBAN account `GB93UBKL12345612345678`, the
        identification would be:

          `iban`: `GB93UBKL12345612345678`
          `bban`: `UBKL12345612345678`
          `uk-scan`: `12345612345678`
      example: AA00AAA000000000000000
    schemeName:
      type: string
      enum:
        - uk-scan
        - bban
        - iban
      description: |
        Bank scheme that identifies the account
          * `uk-scan`—Sort code and account number (SCAN) scheme
          * `bban`—Basic Bank Account Number scheme
          * `iban`—International Bank Account Number scheme
      example: iban
    status:
      type: string
      enum:
        - CREATED
        - PROCESSING
        - SETTLED
        - CANCELLED
        - HOLD
      description: >
        - `CREATED` - Payment has been created and is pending processing

        - `PROCESSING` - P2P balance was impacted and waiting for provider
        confirmation

        - `SETTLED` - Transaction completed processing and is settled

        - `CANCELLED` - Something went wrong and the transaction is cancelled.
        Refer to `reason` for more details

        - `HOLD` - The payment is on hold, pending further review
      example: PROCESSING
paths:
  /v1/payments/fps/out:
    post:
      summary: Send Faster Payment [beta]
      description: >
        Send a Faster Payments payment.


        The Faster Payments System (FPS) is a UK service that allows
        near-instant electronic money transfers between banks.


        **Notes:**
          * Before calling this endpoint, you **must** call [Confirmation of Payee](ref:post-cop-verification) to verify the payee.

          * In case of failure, the transaction is updated with `status` = `CANCELLED`, and the `status_reason` field explains why.

          * If the counterparty bank rejects the transaction, the transaction is still considered `SETTLED` and, when the provider webhook return is processed, a new [FPS out return](https://developers.pismo.io/events/docs/fps-fps-out-return-status-change-1)  event is generated and the amount is credited back to the debtor's account.

          * This endpoint generates a [FPS out payment transaction](https://developers.pismo.io/events/docs/fps-fps-out-status-change-1) event.
      operationId: post-create-fps
      tags:
        - Faster payments
      parameters:
        - $ref: '#/components/parameters/authHeader'
        - $ref: '#/components/parameters/idempotencyKeyHeader'
      requestBody:
        description: Send payment request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fps_out.FpsOutRequest'
        required: true
      responses:
        '201':
          description: Response Body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/fps_out.FpsOutResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0004:
                  summary: Validation Error
                  value:
                    code: EFPS0004
                    message: Validation error
                EFPS0016:
                  summary: Unmarshal Error
                  value:
                    code: EFPS0016
                    message: Unmarshal error
                EFPS0019:
                  summary: Accounts API Invalid Request Error
                  value:
                    code: EFPS0019
                    message: Accounts - API returned 4xx error
                EFPS0025:
                  summary: P2P API Invalid Request Error
                  value:
                    code: EFPS0025
                    message: P2p - API returned 4xx error
                EFPS0029:
                  summary: Ledger API Invalid Request Error
                  value:
                    code: EFPS0029
                    message: Ledger - API returned 4xx error
                EFPS0037:
                  summary: Invalid Creditor Sort Code Account Number
                  value:
                    code: EFPS0037
                    message: Invalid creditor sort code/account number
                EFPS0038:
                  summary: Invalid Creditor IBAN
                  value:
                    code: EFPS0038
                    message: Invalid creditor IBAN
                EFPS0039:
                  summary: Invalid Creditor BBAN
                  value:
                    code: EFPS0039
                    message: Invalid creditor BBAN
                EFPS0046:
                  summary: IntlBankAccounts API Invalid Request Error
                  value:
                    code: EFPS0046
                    message: IntlBankAccounts - API returned 4xx error
                EFPS0047:
                  summary: PSP Gateway API Bad Request
                  value:
                    code: EFPS0047
                    message: >-
                      Invalid FPS Request. Check error details for more
                      information.
                EFPS0073:
                  summary: Amount Greater Than Balance
                  value:
                    code: EFPS0073
                    message: The amount passed is greater than the current balance
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0002:
                  summary: Missing Tenant Header
                  value:
                    code: EFPS0002
                    message: 'Missing required header: ''x-tenant'''
                EFPS0021:
                  summary: Account Blocked Or Cancelled
                  value:
                    code: EFPS0021
                    message: Account blocked or cancelled
                EFPS0033:
                  summary: Invalid Account Id
                  value:
                    code: EFPS0033
                    message: 'Invalid account id header: ''x-account-id'''
                EFPS0034:
                  summary: Invalid Idempotency Key
                  value:
                    code: EFPS0034
                    message: 'Missing required header: ''x-idempotency-key'''
                EFPS0035:
                  summary: Account Has No Active Addresses
                  value:
                    code: EFPS0035
                    message: Account has no active addresses
                EFPS0040:
                  summary: FPS Not Enabled
                  value:
                    code: EFPS0040
                    message: FPS is not enabled for the creditor sort code
                EFPS0041:
                  summary: Modulus Check Error
                  value:
                    code: EFPS0041
                    message: Failed to execute account number modulus check
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0010:
                  summary: Sort Code Not Found
                  value:
                    code: EFPS0010
                    message: Sort Code not found
                EFPS0018:
                  summary: Accounts API Not Found Error
                  value:
                    code: EFPS0018
                    message: Accounts - Not found
                EFPS0028:
                  summary: Ledger API Not Found Error
                  value:
                    code: EFPS0028
                    message: Ledger - Not found
                EFPS0031:
                  summary: IntlBankAccounts API Not Found Error
                  value:
                    code: EFPS0031
                    message: IntlBankAccounts - Not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0022:
                  summary: Transaction Already Exists
                  value:
                    code: EFPS0022
                    message: >-
                      A transaction with the specified idempotency key and
                      end_to_end_id already exists
                EFPS0036:
                  summary: Mismatching Currency Error
                  value:
                    code: EFPS0036
                    message: >-
                      The provided currency does not match with the account's
                      configured currency
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0015:
                  summary: PSP Gateway API Rate Limit
                  value:
                    code: EFPS0015
                    message: PSPGateway API Rate Limit exceeded
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0006:
                  summary: HTTP Error
                  value:
                    code: EFPS0006
                    message: HTTP request error
                EFPS0009:
                  summary: IntlBankAccounts API Timeout
                  value:
                    code: EFPS0009
                    message: IntlBankAccounts API timeout error
                EFPS0011:
                  summary: IntlBankAccounts API Internal Error
                  value:
                    code: EFPS0011
                    message: IntlBankAccounts API Internal Server error
                EFPS0012:
                  summary: PSP Gateway API Timeout
                  value:
                    code: EFPS0012
                    message: PSPGateway API timeout error
                EFPS0017:
                  summary: Accounts API Timeout
                  value:
                    code: EFPS0017
                    message: Accounts API timeout error
                EFPS0020:
                  summary: Accounts API Server Error
                  value:
                    code: EFPS0020
                    message: Accounts - API returned 5xx error
                EFPS0023:
                  summary: Transaction Database Error
                  value:
                    code: EFPS0023
                    message: Transaction database error
                EFPS0024:
                  summary: P2P API Timeout
                  value:
                    code: EFPS0024
                    message: P2p - API timeout error
                EFPS0026:
                  summary: P2P API Server Error
                  value:
                    code: EFPS0026
                    message: P2p - API returned 5xx error
                EFPS0027:
                  summary: Ledger API Timeout
                  value:
                    code: EFPS0027
                    message: Ledger API timeout error
                EFPS0030:
                  summary: Ledger API Server Error
                  value:
                    code: EFPS0030
                    message: Ledger - API returned 5xx error
                EFPS0032:
                  summary: IntlBankAccounts API Server Error
                  value:
                    code: EFPS0032
                    message: IntlBankAccounts - API returned 5xx error
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/customer.Error'
              examples:
                EFPS0014:
                  summary: PSP Gateway API Bad Gateway
                  value:
                    code: EFPS0014
                    message: PSPGateway API Bad Gateway
  /v1/payments/fps/cop:
    post:
      summary: Confirmation of payee [beta]
      description: >
        Verify a beneficiary's account name before making an FPS payment using
        the [Confirmation of Payee
        (CoP)](https://www.wearepay.uk/what-we-do/overlay-services/confirmation-of-payee/)
        service.


        CoP allows payers to check that the name they have for the intended
        recipient matches the actual name on the recipient's account, reducing
        the risk of fraud and misdirected payments.


        This verification does not create an FPS payment transaction. The
        request is forwarded to the payment provider for real-time name
        verification.


        This endpoint generates a [CoP name verification
        requested](https://developers.pismo.io/events/docs/fps-cop-name-verification-submissions-1)
        event. The result is received in a [CoP name verification result
        received](https://developers.pismo.io/events/docs/fps-cop-name-verification-admissions-1)
        event.
      operationId: post-cop-verification
      tags:
        - Faster payments
      parameters:
        - $ref: '#/components/parameters/authHeader'
        - $ref: '#/components/parameters/tenantHeader'
        - $ref: '#/components/parameters/idempotencyKeyHeader'
        - $ref: '#/components/parameters/reqTrackingIdHeader'
      requestBody:
        description: COP verification request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cop.COPVerificationRequest'
        required: true
      responses:
        '200':
          description: COP verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/cop.COPVerificationResponse'
