  /v1/deposits/accounts/open:
    post:
      tags:
        - Deposit account open
      summary: Open deposit account
      description: >
        Create or locate a transaction banking account and attach a validated
        deposit product in a single request. On success, the endpoint generates
        a [Deposit account opened
        event](https://developers.pismo.io/events/docs/deposit-product-deposit-account-opened-1).


        This endpoint supports two scenarios:


        * **Existing account**: Provide both `account.account_id` and
        `account.external_account_id`. The Pismo platform locates the account
        via the transaction banking API and validates the IDs. If there is a
        mismatch, the request fails with a `400` error.


        * **New account**: Provide `account.external_account_id` and the
        `account_creation` object. The Pismo platform creates a new transaction
        banking account and attaches the deposit product. If the transaction
        banking API returns `409` because the account already exists, the Pismo
        platform locates the existing account and proceeds with product
        attachment.


        **Note**: The deposit product must exist, be of type `deposit`, and have
        an `ACTIVE` status.
      operationId: interest-bearing-v1-deposit-account-open
      parameters:
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedDepositOpenRequest'
            examples:
              newAccount:
                summary: Create new account and attach deposit
                value:
                  account:
                    external_account_id: ext-acct-001
                  account_creation:
                    program_id: 100
                    currency_code: USD
                    division_code: '001'
                    applicant:
                      document_number: '12345678900'
                      name: John Doe
                  deposit_attachment:
                    product_id: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
                    deposit_configs:
                      maturity_period:
                        unit: MONTHS
                        value: 6
                  metadata:
                    source: mobile-app
              existingAccount:
                summary: Attach deposit to existing account
                value:
                  account:
                    account_id: 123456
                    external_account_id: ext-acct-001
                  deposit_attachment:
                    product_id: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
                    deposit_configs:
                      maturity_period:
                        calendar_maturity_date: '2027-06-15'
      responses:
        '201':
          description: Deposit account opened successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedDepositOpenResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    account_id: 123456
                    external_account_id: ext-acct-001
                    product_id: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
                    deposit_configs:
                      maturity_period:
                        unit: MONTHS
                        value: 6
                      payout_account:
                        type: EXTERNAL
                        external_account:
                          account_number: '123456789'
                          bank_code: '001'
                      maturity_instructions:
                        principal: ROLLOVER
                        interest: PAY
                        reason: VIP retention package
                      penalties:
                        reason: VIP retention package
                        grace_period:
                          waived: false
                          duration_days: 10
                          penalty_interest_days: 15
                        early_withdrawal_after_opening:
                          waived: false
                          applicable_within_days: 30
                          penalty_interest_days: 90
                        withdrawal_fee:
                          waived: false
                          type: PERCENTAGE
                          value: 2.5
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Request body validation error
                  value:
                    code: EIBACC0008
                    message: Bad Request
                    details: >-
                      error EIBACC0008: Validation error [(Field
                      'external_account_id' is required)]
                accountCreationRequired:
                  summary: account_creation is required when account_id is not provided
                  value:
                    code: EIBACC0325
                    message: >-
                      Field 'account_creation' is required when 'account_id' is
                      not provided
                accountMismatch:
                  summary: Provided account_id does not match external_account_id
                  value:
                    code: EIBACC0407
                    message: >-
                      Provided account_id does not match the resolved
                      external_account_id
                productNotActive:
                  summary: Product is not in ACTIVE status
                  value:
                    code: EIBACC0108
                    message: >-
                      Product isn't ACTIVE. Activate to proceed with the
                      attachment
                corporateValidationError:
                  summary: Corporate API validation error
                  value:
                    code: EIBACC0321
                    message: Corporate API validation error
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingTenantHeader:
                  summary: Missing tenant header
                  value:
                    code: EIBACC0005
                    message: 'Missing required header: ''x-tenant'''
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                productNotFound:
                  summary: Product not found
                  value:
                    code: EIBACC0064
                    message: Product not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                accountAlreadyAttached:
                  summary: Account already has a product attached
                  value:
                    code: EIBACC0106
                    message: The product ID provided is already attached
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                internalError:
                  summary: Internal processing error
                  value:
                    code: EIBACC0007
                    message: Internal error
                getProductError:
                  summary: Failed to retrieve product
                  value:
                    code: EIBACC0066
                    message: Failed on get product
        '502':
          description: Bad Gateway
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                corporateUnavailable:
                  summary: Corporate API unavailable
                  value:
                    code: EIBACC0322
                    message: Corporate API unavailable
        '504':
          description: Gateway Timeout
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                corporateTimeout:
                  summary: Corporate API timeout
                  value:
                    code: EIBACC0318
                    message: Corporate API timeout
  /v1/deposits/accounts/{accountId}/penalty-simulation:
    post:
      tags:
        - Penalty
      summary: Simulate penalty
      description: >
        Simulate the penalty applied to a specified withdrawal on a given date.
        The operation is read‑only and does not modify any data.


        Use this endpoint to preview penalty fees before making an actual
        withdrawal.


        The simulation evaluates all penalty rules configured in the product,
        including:


        - Early withdrawal penalties


        - Grace period penalties


        - Tiered interest forfeiture penalties


        - Withdrawal fees


        - Subsequent withdrawal penalties


        Notes:

        - A withdrawal date inside the cool‑off period results in no penalties

        - If `withdrawal_amount` is omitted, the Pismo platform fetches the
        current book balance from [Get transaction banking account
        balance](ref:get-account-balances).

        - If `withdrawal_amount` is provided, the balance cannot exceed the
        current book balance.
      operationId: interest-bearing-v1-simulate-penalty
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PenaltySimulationRequest'
      responses:
        '200':
          description: Simulation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenaltySimulationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidAccountId:
                  summary: Invalid account ID path parameter
                  value:
                    code: EIBACC0015
                    message: Invalid accountId path param
                invalidWithdrawalAmount:
                  summary: Invalid withdrawal amount (zero or negative)
                  value:
                    code: EIBACC0008
                    message: Validation error
                    details: withdrawal_amount requires a positive number
                missingWithdrawalDate:
                  summary: Missing withdrawal date
                  value:
                    code: EIBACC0008
                    message: Validation error
                    details: withdrawal_date is required
                invalidWithdrawalDate:
                  summary: Invalid withdrawal date format
                  value:
                    code: EIBACC0008
                    message: Validation error
                    details: >-
                      withdrawal_date must be a valid ISO 8601 datetime (e.g.
                      2026-01-15T15:00:00Z)
                withdrawalAmountExceedsBalance:
                  summary: Withdrawal amount exceeds book balance
                  value:
                    code: EIBACC0338
                    message: >-
                      withdrawal_amount cannot be greater than the account
                      balance
                    details: 'available balance: 40667.17'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingTenantHeader:
                  summary: Missing tenant header
                  value:
                    code: EIBACC0005
                    message: 'Missing required header: ''x-tenant'''
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                accountNotFound:
                  summary: Account not found
                  value:
                    code: EIBACC0226
                    message: Account not found
                productNotAttached:
                  summary: Product is not attached to account
                  value:
                    code: EIBACC0064
                    message: Product not found
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                withdrawalDateInPast:
                  summary: Withdrawal date set in the past
                  value:
                    code: EIBACC0294
                    message: withdrawalDate must not be in the past
                productNotDeposit:
                  summary: Product is not a deposit product
                  value:
                    code: EIBACC0295
                    message: Penalty simulation is only available for deposit accounts
                noPenaltyConfigured:
                  summary: No penalty configured for simulation
                  value:
                    code: EIBACC0296
                    message: >-
                      No penalty is configured for the product attached to this
                      account
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                internalError:
                  summary: Internal error
                  value:
                    code: EIBACC0007
                    message: Internal error
                getPenaltyError:
                  summary: Get penalty error
                  value:
                    code: EIBACC0204
                    message: Get Penalty error
