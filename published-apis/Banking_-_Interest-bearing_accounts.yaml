  /v1/deposits/accounts/{accountId}/attachment:
    patch:
      tags:
        - Account attachment
      summary: Update deposit account attachment overrides
      description: >
        Partially updates `deposit_configs.overrides` and
        `deposit_configs.interest_capitalization_mode` on an active deposit
        account attachment. Each field is processed using three‑state `PATCH`
        semantics, allowing values to be added, changed, or cleared as part of
        the update.
          * **Omitted**: Keeps the current value
          * `null`: Removes the override; falls back through the cascade (program → product)
          * **Value**: Replaces the current override with the supplied value

        **NOTES**:


        * At least one of `deposit_configs.overrides` or
        `deposit_configs.interest_capitalization_mode` must be provided.

        * The `overrides` envelope, if provided, must contain at least one
        field. Sending an empty object returns `400 EIBACC0315`.

        * `renewal_term` still requires `ROLLOVER` configured in
        `maturity_instructions` somewhere in the fallback sequence (`400
        EIBACC0310` otherwise).


        This endpoint generates an [Account attachment
        updated](https://developers.pismo.io/events/docs/deposit-product-account-attachment-updated-1)
        event.
      operationId: interest-bearing-v1-deposit-update-account-attachment
      parameters:
        - $ref: '#/components/parameters/accountId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountAttachmentRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttachment'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyOverridesEnvelope:
                  summary: deposit_configs.overrides must contain at least one field
                  value:
                    code: EIBACC0315
                    message: deposit_configs.overrides must contain at least one field
                overrideValidUntilPast:
                  summary: valid_until must be a future datetime
                  value:
                    code: EIBACC0308
                    message: valid_until must be a future datetime
                renewalTermRequiresRollover:
                  summary: renewal_term requires ROLLOVER in maturity_instructions
                  value:
                    code: EIBACC0310
                    message: Validation error
                    details: >-
                      renewal_term requires ROLLOVER configured in
                      maturity_instructions.principal or
                      maturity_instructions.interest (account/program override
                      or product default).
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                attachmentNotFound:
                  summary: Active deposit attachment not found for this account
                  value:
                    code: EIBACC0113
                    message: Product attachment not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                attachmentNotActive:
                  summary: Attachment is not active
                  value:
                    code: EIBACC0301
                    message: Product attachment is not active
                optimisticLock:
                  summary: Product attachment was modified concurrently
                  value:
                    code: EIBACC0314
                    message: >-
                      Product attachment was modified concurrently; retry with
                      the latest state
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                internalError:
                  summary: Internal error
                  value:
                    code: EIBACC0007
                    message: Internal error
                attachmentOverridesUpdate:
                  summary: Failed to update attachment overrides
                  value:
                    code: EIBACC0316
                    message: Failed to update attachment overrides
