        * Sending `maturity_instructions` inside `overrides` results in a `400
        EIBACC0318` error. This field cannot be modified at the program level
        and must be configured on each account attachment instead.

        * An empty `overrides` envelope returns `400 EIBACC0315`

        * `renewal_term` still requires `ROLLOVER` configured in
        `maturity_instructions` somewhere in the fallback sequence (`400
        EIBACC0310` otherwise)


        This endpoint generates a [Program attachment
        updated](https://developers.pismo.io/events/docs/deposit-product-program-attachment-updated-1)
