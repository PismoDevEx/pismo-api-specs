openapi: 3.1.0
info:
  title: Banking - Interest-bearing accounts
  version: 1.0.0
  description: API for interest-bearing account functionality
  contact:
    name: API Support
    url: https://developers.pismo.io/support/
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/savings-products
    description: Sandbox API server for testing
tags:
  - name: Average balance
    description: Endpoints that enable calculating average balances for an account
  - name: Account attachment
    description: >-
      Endpoints that manage account attachments to interest-bearing account
      products
  - name: Deposit account lifecycle
    description: >-
      Endpoints that allow consolidated, point‑in‑time snapshots of a deposit
      account lifecycle
  - name: Penalty
    description: Endpoints that manage penalties for deposit accounts
  - name: Product
    description: Endpoints that manage Interest-bearing accounts products
  - name: Deposit account open
    description: >-
      Endpoints that create deposit accounts and attach products in a single
      operation
  - name: Program attachment
    description: >-
      Endpoints that manage program attachments to interest-bearing account
      products
components:
  parameters:
    authorizationTokenHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Account token. Token encoded with a Pismo account ID. Tokens can expire
        quickly, which can result in a 401 Unauthorized error.
      example: 1234
    authorizationTokenGenericHeader:
      name: AuthorizationToken
      in: header
      schema:
        type: string
      required: true
      description: >
        Generic token. Token encoded with a generic token ID. Tokens can expire
        quickly, which can result in a 401 Unauthorized error.
      example: 1234
    productId:
      description: Product ID
      in: path
      name: productId
      required: true
      schema:
        type: string
      example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    accountId:
      description: Account ID
      in: path
      name: accountId
      required: true
      schema:
        type: integer
      example: 123456
    programIdPath:
      description: Program ID
      in: path
      name: programId
      required: true
      schema:
        type: integer
      example: 123
    afterIdQuery:
      description: >
        This is the `last_id` field returned in the response which you can use
        to get the next result set. This is displayed in UNIX timestamp.
      in: query
      name: afterId
      required: false
      schema:
        type: integer
      example: 1706027185000
    beginDateTimeQuery:
      description: >
        Queries for the date and time of products after the value of this field.
        Date and time are displayed in RFC 3339 format, for example:
        `2024-01-28T10:33:01Z`.
      in: query
      name: beginDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-28T10:33:01.000Z'
    endDateTimeQuery:
      description: >
        Queries for the date and time of products created before the value of
        this field. Date and time are displayed in RFC 3339 format, for example:
        `2024-01-29T10:33:01Z`.
      in: query
      name: endDatetime
      required: false
      schema:
        type: string
        format: date-time
      example: '2024-01-30T10:33:01.000Z'
    perPageQuery:
      description: Number of items per page.
      in: query
      name: perPage
      required: false
      schema:
        type: integer
        maximum: 100
        default: 20
      example: 20
    orderQuery:
      description: >-
        List result order of the `created_at` value. It can be sorted in
        ascending (`ASC`) or descending (`DESC`) order. Default is `DESC`.
      in: query
      name: order
      required: false
      schema:
        type: string
        enum:
          - ASC
          - DESC
        default: DESC
      example: DESC
    productTypeQuery:
      description: Filter results by product type.
      in: query
      name: productType
      required: false
      schema:
        type: string
        enum:
          - deposit
          - savings-account
      example: deposit
    statusQuery:
      description: Filter results by status.
      in: query
      name: status
      required: false
      schema:
        type: string
        enum:
          - CREATED
          - ACTIVE
          - INACTIVE
      example: ACTIVE
    idempotencyHeader:
      name: idempotency
      in: header
      schema:
        type: string
      required: true
      description: >
        A unique identifier for the request. If you need to retry a request, use
        the same idempotency key to avoid creating duplicate resources.
      example: 123e4567-e89b-12d3-a456-426614174000
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error type code
          example: EIBACC0003
        details:
          type: string
          description: Error details
          example: 'error EIBACC0008: Validation error [(Field ''Order'' is invalid)]'
        message:
          description: Error message
          example: Bad Request
          type: string
    DepositMaturityInstructions:
      properties:
        principal:
          type: string
          description: >
            Specifies the status of the principal amount at maturity.

            - `NO_ACTION`: No action is taken with the principal amount

            - `ROLLOVER`: The principal amount is rolled over to a new deposit
            term


            If no value is selected, the principal defaults to `NO_ACTION`.
          example: ROLLOVER
          enum:
            - NO_ACTION
            - ROLLOVER
          default: NO_ACTION
        interest:
          type: string
          description: >
            Specifies the status of the accrued interest at maturity.

            - `PAY`: The accrued interest is paid to the account

            - `ROLLOVER`: The accrued interest is rolled over and added to the
            principal


            If no value is selected, the interest defaults to `PAY`.
          example: PAY
          enum:
            - PAY
            - ROLLOVER
          default: PAY
      type: object
      description: >
        - If the principal or interest are `ROLLOVER,` the respective amounts is
        rolled over to a new deposit term.

        - If the principal is `NO_ACTION`, no action is taken with the principal
        amount at maturity.

        - If the interest is `PAY` and the accrued interest is greater than
        zero, it's paid to the account's cash balance.
    PayoutAccount:
      type: object
      description: >
        The payout account defines where outbound payments are sent, and it is
        used in two operational contexts.<br>


        * **Capitalization flow**: When the capitalization mode is set to
        `PAYOUT`, the capitalized interest is directed to this account. If the
        mode is `REINVEST`, the payout account is not involved because the
        interest is added to the principal instead.

        * **Maturity instruction flow**: At maturity, this account receives
        principal or interest whenever the maturity instructions specify `PAY`
        for either `maturity_instructions.principal` or
        `maturity_instructions.interest`. This flow always relies on the payout
        account, regardless of how capitalization is configured.


        Both flows reference the same payout account settings. Choosing
        `REINVEST` for capitalization does not remove or disable the payout
        account, and it remains fully available for maturity‑related payments.
      properties:
        label:
          type: string
          description: |
            Label to identify the account
          example: My payout account
        type:
          type: string
          description: |
            Payout account type, either `INTERNAL` or `EXTERNAL`
          enum:
            - INTERNAL
            - EXTERNAL
          example: INTERNAL
        internal_account_id:
          type: number
          description: |
            Internal account ID for the account that receives the payments.
            Required for type `INTERNAL` and not allowed for `EXTERNAL`.
          example: 123456
        external_account:
          type: object
          description: >
            Contains user-defined key-value pairs that identify the external
            account receiving the payments.

            Note that external account information is client-provided.


            Required for type `EXTERNAL` and not allowed for `INTERNAL`.
          example:
            key: value
    MaturityPeriod:
      type: object
      description: >
        Defines when the deposit matures. There are three usage modes:


        * **Relative period**: Sends `unit` + `value` (e.g. `MONTHS` + `6`).

        * **Explicit date**: Sends `calendar_maturity_date` (e.g. `2027-06-15`).

        * **Default**: Omits the field or sends `{}`. The product's configured
        default maturity term (`PRODUCT_DEFAULT_MATURITY_DATE_DAYS`, typically
        `10950` days ≈ 30 years) is applied.


        **NOTE**: `calendar_maturity_date` and `unit`/`value` are mutually
        exclusive, sending both in the same request returns a `400` validation
        error.


        The response returns exactly what was sent in the request:

        * Send `unit` + `value` returns `unit` + `value`

        * Send `calendar_maturity_date` returns `calendar_maturity_date`

        * Send nothing (default fallback applied) returns `unit=DAYS` and
        `value` equal to the product's configured
        `PRODUCT_DEFAULT_MATURITY_DATE_DAYS`
      properties:
        unit:
          $ref: '#/components/schemas/MaturityPeriodUnit'
        value:
          $ref: '#/components/schemas/MaturityPeriodValue'
        calendar_maturity_date:
          $ref: '#/components/schemas/CalendarMaturityDate'
    MaturityPeriodUnit:
      type: string
      description: >
        Time unit for the relative maturity period. It's used together with
        `value` and cannot coincide with `calendar_maturity_date`.


        - `DAYS`: Uses `value` directly. Example: `value=90` → 90 days.

        - `WEEKS`: Multiplies `value` by 7. Example: `value=4` → 28 days.

        - `MONTHS`: Calculates calendar-month with end-of-month (EOM) clamping
        when the target day does not exist. Example: `2024-01-31` + 1 month =
        `2024-02-29` (leap year) or `2025-02-28` (non-leap year).

        - `YEARS`: Calculates calendar-year, for example: `2024-02-29` + 1 year
        = `2025-02-28`. Note that there is no Feb 29 in 2025.


        For `WEEKS`, `MONTHS`, and `YEARS`, the resulting calendar date is
        converted back to a day count to validate against the product's
        configured minimum or maximum term.
      enum:
        - DAYS
        - WEEKS
        - MONTHS
        - YEARS
      example: MONTHS
    MaturityPeriodValue:
      type: integer
      description: >
        Number of time units until maturity. Must be greater than `0`. Mutually
        exclusive with `calendar_maturity_date`.
      minimum: 1
      example: 6
    CalendarMaturityDate:
      type: string
      format: date
      description: >
        Maturity date. Format is `YYYY-MM-DD`. The date must be a future date.


        This date cannot coincide with `unit`/`value`, sending both in the same
        request returns a `400` validation error.
      example: '2027-06-15'
    DepositConfigs:
      type: object
      properties:
        maturity_period:
          $ref: '#/components/schemas/MaturityPeriod'
        payout_account:
          $ref: '#/components/schemas/PayoutAccount'
        interest_capitalization_mode:
          type: string
          enum:
            - PAYOUT
            - REINVEST
          default: PAYOUT
          description: >
            Controls the treatment of capitalized interest.<br>


            * `PAYOUT` is the default behavior. In this mode, the capitalized
            amount is sent to the configured payout_account. If no payout
            account exists, the amount stays in the base account.

            * `REINVEST` instructs the Pismo platform to add the capitalized
            amount to the principal through the interest engine. The new
            principal becomes the foundation for the next accrual cycle.


            This setting affects only the capitalization process. The maturity
            instruction flow always uses `payout_account`, regardless of the
            value of this field.


            If the field is not provided, it is omitted from the attachment and
            the Pismo platform applies `PAYOUT` at runtime.
          example: REINVEST
        overrides:
          $ref: '#/components/schemas/AttachmentOverridesRequest'
    AttachmentOverridesRequest:
      type: object
      description: >
        Per-attachment overrides applied on top of the product defaults. All
        sub-fields are optional.

        This object contains the per‑attachment overrides that supplement the
        product defaults. All sub‑fields are optional. Omitting a section causes
        the Pismo platform to follow the normal fallback sequence, moving from
        the account level to the program and then to the product defaults. Each
        penalty type provides `waived` as a required field, optional
        type‑specific fields, and an optional `valid_until` to schedule the
        revert.
      properties:
        maturity_instructions:
          $ref: '#/components/schemas/MaturityInstructionsOverrideRequest'
        renewal_term:
          $ref: '#/components/schemas/RenewalTermOverrideRequest'
        penalties:
          $ref: '#/components/schemas/PenaltiesOverrideRequest'
    MaturityInstructionsOverrideRequest:
      type: object
      description: >
        Overrides the deposit’s behavior at maturity. If a field is omitted, the
        Pismo platform uses the value defined at the higher‑level configuration
        that governs this deposit.
      properties:
        principal:
          type: string
          enum:
            - ROLLOVER
            - PAY
          description: Specifies how the principal is handled once the deposit matures.
          example: ROLLOVER
        interest:
          type: string
          enum:
            - ROLLOVER
            - PAY
          description: Specifies how the interest is handled once the deposit matures.
          example: PAY
        reason:
          type: string
          maxLength: 100
          description: Optional audit-trail reason.
          example: Customer preference at onboarding
    RenewalTermOverrideRequest:
      type: object
      description: >
        Specifies the recurring rollover term, not to be confused with the
        initial `maturity_period`.


        You must provide either `unit` with `value` or
        `renewal_calendar_maturity_date`.


        A `ROLLOVER` configuration in principal or interest is required.


        When you pass `renewal_calendar_maturity_date`, the Pismo platform
        converts the interval from today into a day count and stores it at
        attach time in normalized form: `{unit: DAYS, value: <calculated>}`.
      properties:
        unit:
          type: string
          enum:
            - DAYS
            - WEEKS
            - MONTHS
            - YEARS
          description: >-
            Time unit of the renewal term. Required together with `value` when
            calendar form is not used.
          example: MONTHS
        value:
          type: integer
          minimum: 1
          description: >-
            Number of units. Required together with `unit` when calendar form is
            not used.
          example: 6
        renewal_calendar_maturity_date:
          type: string
          format: date
          description: >-
            Explicit calendar date (`YYYY-MM-DD`), the date must be a future
            date, and does not coincide with `unit`+`value`.
          example: '2027-05-22'
    PenaltiesOverrideRequest:
      type: object
      description: >
        Per-type penalty overrides. Each type independently uses three-state
        semantics:

        omit (inherit) · `{waived: true}` (exempt) · `{waived: false, <fields>}`
        (customize).
      properties:
        reason:
          type: string
          maxLength: 100
          description: Optional audit-trail reason for the entire penalties block.
          example: Q4 2026 VIP retention package
        grace_period:
          $ref: '#/components/schemas/GracePeriodOverrideRequest'
        early_withdrawal_after_opening:
          $ref: '#/components/schemas/EarlyWithdrawalAfterOpeningOverrideRequest'
        withdrawal_fee:
          $ref: '#/components/schemas/WithdrawalFeeOverrideRequest'
        tiered_interest_forfeiture:
          $ref: '#/components/schemas/TieredInterestForfeitureOverrideRequest'
        subsequent_withdrawals:
          $ref: '#/components/schemas/SubsequentWithdrawalsOverrideRequest'
    GracePeriodOverrideRequest:
      type: object
      description: >-
        Grace period override. Type-specific fields are optional pointers, when
        omitted, the Pismo platform follows the normal fallback sequence, moving
        from the account level to the program and then to the product defaults.
      required:
        - waived
      properties:
        waived:
          type: boolean
          description: >-
            `true` = fully exempt; `false` = penalty active (customize via the
            fields below).
        duration_days:
          type: integer
          minimum: 0
        penalty_interest_days:
          type: integer
          minimum: 0
        valid_until:
          type: string
          format: date-time
          description: >-
            Schedules the revert of this override via EventBridge. This value
            must be a future date and follows the ISO 8601 standard.
    EarlyWithdrawalAfterOpeningOverrideRequest:
      type: object
      description: Override for early withdrawal after account opening.
      required:
        - waived
      properties:
        waived:
          type: boolean
        applicable_within_days:
          type: integer
          minimum: 0
        penalty_interest_days:
          type: integer
          minimum: 0
        valid_until:
          type: string
          format: date-time
    WithdrawalFeeOverrideRequest:
      type: object
      description: Withdrawal fee override.
      required:
        - waived
      properties:
        waived:
          type: boolean
        type:
          type: string
          enum:
            - PERCENTAGE
            - FIXED
        value:
          type: number
          minimum: 0
          exclusiveMinimum: true
        valid_until:
          type: string
          format: date-time
    TieredInterestForfeitureOverrideRequest:
      type: object
      description: >-
        Tiered interest forfeiture override. Tiers replace the product's tiers
        when provided.
      required:
        - waived
      properties:
        waived:
          type: boolean
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/TieredInterestForfeitureTierRequest'
        valid_until:
          type: string
          format: date-time
    TieredInterestForfeitureTierRequest:
      type: object
      required:
        - min_days_held
        - forfeited_interest_days
      properties:
        min_days_held:
          type: integer
          minimum: 0
        max_days_held:
          type: integer
          minimum: 0
          description: Optional. Open-ended tier when omitted.
        forfeited_interest_days:
          type: integer
          minimum: 0
    SubsequentWithdrawalsOverrideRequest:
      type: object
      description: Subsequent withdrawals (Regulation D) override.
      required:
        - waived
      properties:
        waived:
          type: boolean
        applicable_within_days:
          type: integer
          minimum: 1
        penalty_interest_days:
          type: integer
          minimum: 1
        window_behavior:
          type: string
          enum:
            - ROLLING
            - FIXED
        valid_until:
          type: string
          format: date-time
    ProgramAttachmentOverridesRequest:
      type: object
      description: >
        Defines the per‑attachment overrides permitted at program scope. Only
        `renewal_term` is valid. `penalties` and `maturity_instructions` result
        in `400` responses (`EIBACC0317` and `EIBACC0318`) and must be provided
        at the account level.
      properties:
        renewal_term:
          $ref: '#/components/schemas/RenewalTermOverrideRequest'
    ProgramDepositConfigs:
      type: object
      properties:
        maturity_period:
          $ref: '#/components/schemas/MaturityPeriod'
        payout_account:
          $ref: '#/components/schemas/PayoutAccount'
        interest_capitalization_mode:
          type: string
          enum:
            - PAYOUT
            - REINVEST
          default: PAYOUT
          description: >
            Program‑level setting that defines how capitalized interest should
            be treated.<br>


            * `PAYOUT` is the default. In this mode, the capitalized amount is
            sent to the configured `payout_account`.

            * `REINVEST` instructs the Pismo platform to add the capitalized
            amount to the principal through the interest engine.


            All accounts attached to the program inherit this behavior unless an
            account‑level configuration overrides it.


            If the field is not provided, it is omitted from the attachment and
            the system applies `PAYOUT` at runtime.
          example: PAYOUT
        overrides:
          $ref: '#/components/schemas/ProgramAttachmentOverridesRequest'
    AttachmentOverridesPatchRequest:
      type: object
      description: >
        PATCH envelope for account‑level `deposit_configs.overrides`. Fields
        support three‑state semantics, omission preserves the current value,
        `null` removes the override and restores the inherited configuration,
        and a provided value replaces it. The envelope must define at least one
        field, an empty overrides object returns a `400` error: `EIBACC0315`.
      properties:
        maturity_instructions:
          allOf:
            - $ref: '#/components/schemas/MaturityInstructionsOverrideRequest'
          nullable: true
        renewal_term:
          allOf:
            - $ref: '#/components/schemas/RenewalTermOverrideRequest'
          nullable: true
        penalties:
          $ref: '#/components/schemas/PenaltiesPatchRequest'
    PenaltiesPatchRequest:
      type: object
      description: >
        PATCH envelope for `deposit_configs.overrides.penalties`. Penalty types
        support three‑state semantics: omit to retain the existing value, use
        `null` to clear the override and restore the inherited configuration, or
        provide a value object to replace it. `reason` is optional metadata.
      properties:
        reason:
          type: string
          maxLength: 100
          example: Update — Q1 2027 VIP retention package
        grace_period:
          allOf:
            - $ref: '#/components/schemas/GracePeriodOverrideRequest'
          nullable: true
        early_withdrawal_after_opening:
          allOf:
            - $ref: '#/components/schemas/EarlyWithdrawalAfterOpeningOverrideRequest'
          nullable: true
        withdrawal_fee:
          allOf:
            - $ref: '#/components/schemas/WithdrawalFeeOverrideRequest'
          nullable: true
        tiered_interest_forfeiture:
          allOf:
            - $ref: '#/components/schemas/TieredInterestForfeitureOverrideRequest'
          nullable: true
        subsequent_withdrawals:
          allOf:
            - $ref: '#/components/schemas/SubsequentWithdrawalsOverrideRequest'
          nullable: true
    ProgramAttachmentOverridesPatchRequest:
      type: object
      description: |
        PATCH envelope for program-level `deposit_configs.overrides`.<br>
        **NOTES**:
          * Only `renewal_term` is valid and uses three-state semantics: omit for no change, `null` to clear the override, or supply a value to replace it
          * `penalties` and `maturity_instructions` are not allowed and produce `400 EIBACC0317` and `EIBACC0318`
          * An empty `overrides` object is rejected with `400 EIBACC0315`
      properties:
        renewal_term:
          allOf:
            - $ref: '#/components/schemas/RenewalTermOverrideRequest'
          nullable: true
    UpdateAccountAttachmentRequest:
      type: object
      required:
        - deposit_configs
      properties:
        deposit_configs:
          type: object
          description: >
            At least one of `overrides` or `interest_capitalization_mode` must
            be provided.
          properties:
            interest_capitalization_mode:
              type: string
              enum:
                - PAYOUT
                - REINVEST
              nullable: true
              description: >
                Defines how capitalized interest is treated.<br>


                * `PAYOUT` (default): The capitalized amount is routed to
                `payout_account`. If no payout account is configured, the amount
                remains in the base account.

                * `REINVEST`: the capitalized amount is added to the principal
                through the interest engine. The updated principal becomes the
                basis for the next accrual cycle.


                This field applies only to the capitalization flow. The maturity
                instruction flow always uses `payout_account` regardless of this
                setting.<br>


                If the field is not provided, it is absent in the attachment and
                defaults to `PAYOUT` at runtime.
              example: REINVEST
            overrides:
              $ref: '#/components/schemas/AttachmentOverridesPatchRequest'
    UpdateProgramAttachmentRequest:
      type: object
      required:
        - deposit_configs
      properties:
        deposit_configs:
          type: object
          description: >
            At least one of `overrides` or `interest_capitalization_mode` must
            be provided.
          properties:
            interest_capitalization_mode:
              type: string
              enum:
                - PAYOUT
                - REINVEST
              nullable: true
              description: >
                Updates the program-level default capitalization mode. Inherited
                by all accounts attached to this program unless overridden at
                account level.


                Send `null` to remove the program-level value and revert to the
                product default.
              example: PAYOUT
            overrides:
              $ref: '#/components/schemas/ProgramAttachmentOverridesPatchRequest'
    DepositAttachAccountResponse:
      type: object
      description: Response body returned when attaching a deposit product to an account
      properties:
        account_id:
          type: integer
          description: Account ID
          example: 123456
        product_id:
          type: string
          description: Product ID
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        effective_date:
          type: string
          format: date
          description: >
            The effective value date of the attachment. Format is `YYYY-MM-DD`.

            This is the date when the attachment becomes valid. Maturity is
            calculated from this date.
          example: '2025-12-01'
        deposit_configs:
          type: object
          properties:
            maturity_period:
              $ref: '#/components/schemas/MaturityPeriod'
            interest_capitalization_mode:
              type: string
              enum:
                - PAYOUT
                - REINVEST
              description: >
                Present only when the request included
                `interest_capitalization_mode`. Reflects the value stored on the
                attachment.
              example: REINVEST
            overrides:
              $ref: '#/components/schemas/AttachmentOverridesSnapshot'
    DepositAttachProgramResponse:
      type: object
      description: Response body returned when attaching a deposit product to a program.
      properties:
        program_id:
          type: integer
          description: Program identifier.
          example: 123
        product_id:
          type: string
          description: Product identifier.
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        deposit_configs:
          type: object
          properties:
            maturity_period:
              $ref: '#/components/schemas/MaturityPeriod'
            interest_capitalization_mode:
              type: string
              enum:
                - PAYOUT
                - REINVEST
              description: >
                Present only when the request included
                `interest_capitalization_mode`. Reflects the value stored on the
                attachment.
              example: PAYOUT
            overrides:
              $ref: '#/components/schemas/AttachmentOverridesSnapshot'
    AttachmentOverridesSnapshot:
      type: object
      description: >
        Representation of the persisted overrides, present only when the request
        defined at least one override. Sub-fields are included only when set.
        The `renewal_term` retains the structure provided by the client
        (calendar form or `unit`+`value`), mirroring the behavior of
        `maturity_period`.
      properties:
        maturity_instructions:
          $ref: '#/components/schemas/MaturityInstructionsOverrideRequest'
        renewal_term:
          $ref: '#/components/schemas/RenewalTermResponse'
        penalties:
          $ref: '#/components/schemas/PenaltiesOverrideSnapshot'
    RenewalTermResponse:
      type: object
      description: >
        Renewal term applied on each rollover. The platform preserves the
        client’s original format: `unit`+`value` appears when provided, and
        `renewal_calendar_maturity_date` is returned as a string when that form
        is used.
      properties:
        unit:
          type: string
          enum:
            - DAYS
            - WEEKS
            - MONTHS
            - YEARS
          example: MONTHS
        value:
          type: integer
          minimum: 1
          example: 6
        renewal_calendar_maturity_date:
          type: string
          format: date
          description: >-
            Returned only when the request uses the calendar format. Format =
            `YYYY-MM-DD`.
          example: '2027-05-22'
    PenaltiesOverrideSnapshot:
      type: object
      description: >
        Persisted penalty overrides for each type. Types appear only when set.
        Each entry includes `waived`, the relevant type-specific fields, and an
        optional `valid_until` for scheduling the revert.
      properties:
        reason:
          type: string
          example: Q4 2026 VIP retention package
        grace_period:
          $ref: '#/components/schemas/GracePeriodOverrideRequest'
        early_withdrawal_after_opening:
          $ref: '#/components/schemas/EarlyWithdrawalAfterOpeningOverrideRequest'
        withdrawal_fee:
          $ref: '#/components/schemas/WithdrawalFeeOverrideRequest'
        tiered_interest_forfeiture:
          $ref: '#/components/schemas/TieredInterestForfeitureOverrideRequest'
        subsequent_withdrawals:
          $ref: '#/components/schemas/SubsequentWithdrawalsOverrideRequest'
