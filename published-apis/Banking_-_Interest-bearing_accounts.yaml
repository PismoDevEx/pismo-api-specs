            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    CalculateAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        idempotency_key:
          type: string
          description: Idempotency key.
          example: 123e4567-e89b-12d3-a456-xyz
        status:
          type: string
          description: Status of the average balance calculation request.
          enum:
            - PROCESSING
            - COMPLETE
        message:
          type: string
          description: Message.
          example: Request is under progress
    GetAverageBalanceResponse:
      type: object
      properties:
        account_id:
          type: number
          description: Account ID.
          example: 123456
        begin_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation begins. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-28T10:33:01Z`.
          example: '2024-01-28T10:33:01.000Z'
        end_date_datetime:
          type: string
          format: date-time
          description: >
            The date and time when the calculation ends. The date and time are
            displayed in RFC 3339 format, for example: `2024-01-29T10:33:01Z`.
          example: '2024-01-30T10:33:01.000Z'
        balance_types_to_calculate:
          type: array
          items:
            type: string
            enum:
              - available
              - savings
              - held_funds
          description: >
            Choose a balance to calculate its average balance, you can select
            multiple balance types to calculate their average balances
            simultaneously. The balance types are:<br>

            * `available`

            * `savings`

            * `held_funds`
          example:
            - available
            - savings
            - held_funds
    DetachProductFromProgramRequest:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: string
          description: Product ID
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
    DepositPenalties:
      type: object
      description: >
        Set of penalty configurations that can be applied to a deposit product.
        Each penalty type corresponds to a specific fee ID and transaction flow
        within the Pismo platform.

        For details about penalty types, refer to the [Penalty
        types](doc:penalties-for-cd-accounts#penalty-types) section of Penalties
        for CD accounts.
      properties:
        early_withdrawal_after_opening:
          $ref: '#/components/schemas/EarlyWithdrawalAfterOpening'
        grace_period:
          $ref: '#/components/schemas/GracePeriod'
        tiered_interest_forfeiture:
          description: >-
            This penalty corresponds to fee ID
            `tieredInterestForfeiturePenaltyID` and transaction flow
            `tieredInterestForfeiturePenalty`
          type: array
          items:
            $ref: '#/components/schemas/TieredInterestForfeitureTier'
        withdrawal_fee:
          $ref: '#/components/schemas/WithdrawalFee'
        subsequent_withdrawals:
          $ref: '#/components/schemas/SubsequentWithdrawals'
    EarlyWithdrawalAfterOpening:
      description: >-
        This penalty corresponds to fee ID
        `earlyWithdrawalAfterOpeningPenaltyID` and transaction flow
        `earlyWithdrawalAfterOpeningPenalty`
      type: object
      required:
        - applicable_within_days
        - penalty_interest_days
      properties:
        applicable_within_days:
          type: integer
          minimum: 0
          description: Number of days after opening that the penalty is applied
          example: 30
        penalty_interest_days:
          type: integer
          minimum: 0
          description: >-
            Number of days multiplied by the applicable interest or earnings
            rate to determine the penalty amount.
          example: 90
    GracePeriod:
      description: >-
        This penalty corresponds to fee ID `gracePeriodPenaltyID` and trasaction
        flow `gracePeriodPenalty`
      type: object
      required:
        - duration_days
        - penalty_interest_days
      properties:
        duration_days:
          type: integer
          minimum: 0
          description: Duration of the grace period in days
          example: 7
        penalty_interest_days:
          type: integer
          minimum: 0
          description: Number of interest days to forfeit as penalty
          example: 30
    TieredInterestForfeitureTier:
      description: >-
        This penalty corresponds to fee ID `tieredInterestForfeiturePenaltyID`
        and transaction flow `tieredInterestForfeiturePenalty`
      type: object
      required:
        - min_days_held
        - max_days_held
        - forfeited_interest_days
      properties:
        min_days_held:
          type: integer
          description: Minimum number of days the deposit must be held
          example: 1
        max_days_held:
          type: integer
          description: Maximum number of days the deposit can be held
          example: 90
        forfeited_interest_days:
          type: integer
          description: Number of interest days to forfeit as penalty
          example: 30
    WithdrawalFee:
      description: >-
        This penalty corresponds to fee ID `withdrawalFeePenaltyID` and
        transaction flow `withdrawalFeePenalty`
      type: object
      required:
        - type
        - value
      properties:
        type:
          type: string
          enum:
            - PERCENTAGE
            - FIXED
          description: Withdrawal fee type
          example: PERCENTAGE
        value:
          type: number
          description: Value of the withdrawal fee
          example: 1.5
    SubsequentWithdrawals:
      type: object
      description: >
        This penalty corresponds to fee ID `subsequentWithdrawalPenaltyID` and
        transaction flow `subsequentWithdrawalPenalty`.<br>

        Settings for the subsequent withdrawal penalty (Regulation D).

        A penalty fee is applied when a customer makes a withdrawal within the
        configured window.

        The window either resets with each withdrawal (ROLLING) or remains fixed
        from the first withdrawal (FIXED).
      required:
        - applicable_within_days
        - window_behavior
      properties:
        applicable_within_days:
          type: integer
          minimum: 1
          description: >
            The number of days following a withdrawal during which a subsequent
            withdrawal triggers the penalty.

            Must be at least 1.
          example: 30
        window_behavior:
          type: string
          enum:
            - ROLLING
            - FIXED
          description: >
            Controls how the penalty window is managed after each withdrawal:

            - `ROLLING`: the window resets on every withdrawal (scheduler is
            replaced)

            - `FIXED`: the window is set once on the first withdrawal and does
            not reset
          example: ROLLING
        penalty_interest_days:
          type: integer
          minimum: 1
          description: |
            Number of interest days to forfeit as the penalty amount.
            Must be at least 1 when provided.
          example: 7
    CycleSnapshotResponse:
      type: object
      description: >
        Provides a point in time representation of a deposit account lifecycle.
        Includes the current state and the previous cycle’s key attributes, such
        as product and attachment references, interest plan context, lifecycle
        dates, and principal details. Supports audit, statement, and
        reconciliation workflows without requiring clients to reassemble the
        account’s history from individual events.
      properties:
        account_id:
          type: integer
          description: Deposit account ID
          example: 1234567
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: Cycle status, this can be either `ACTIVE` or `INACTIVE`
          example: ACTIVE
        current_product_id:
          type: string
          description: Product ID currently attached to the account
          example: ze2b8k77-f6a0-4ba4-890a-0dc23f13fhg4
        current_attachment_id:
          type: string
          description: Current attachment ID
          example: 1234test
        current_interest_plan_id:
          type: string
          description: Current interest plan ID
          example: ee2b8b77-f6a0-4ba4-890a-0dc23f13fcb4
        current_grace_period:
          type: integer
          description: Current grace period in days
          example: 10
        current_rollover_date:
          type: string
          format: date-time
          description: >-
            Current rollover date, The datetime format follows the ISO 8601
            standard `yyyy-mm-ddThh:mm:ss.sssZ`.
          example: '2026-02-01T00:00:00Z'
        current_calendar_maturity_date:
          type: string
          format: date-time
          description: >-
            Current calendar maturity date. The datetime format follows the ISO
            8601 standard `yyyy-mm-ddThh:mm:ss.sssZ`.
          example: '2026-01-26T12:00:00Z'
        previous_product_id:
          type: string
          description: Previous product ID
          example: ae2b8k77-f6a0-4ba4-890a-0dc23f13fcb4
        previous_attachment_id:
          type: string
          description: Previous attachment ID
          example: attach685
        previous_interest_plan_id:
          type: string
          description: Previous interest plan ID
          example: ee2b8b77-f6a0-4ba4-890a-0dc23f13fcb4
        previous_grace_period:
          type: integer
          description: Previous grace period in days
          example: 5
        previous_calendar_maturity_date:
          type: string
          format: date-time
          nullable: true
          description: >-
            Previous calendar maturity date. The datetime format follows the ISO
            8601 standard `yyyy-mm-ddThh:mm:ss.sssZ`.
          example: '2025-12-01T00:00:00Z'
        cycle_start_date:
          type: string
          format: date-time
          description: >-
            Cycle start date. The datetime format follows the ISO 8601 standard
            `yyyy-mm-ddThh:mm:ss.sssZ`.
          example: '2026-01-26T12:00:00Z'
        start_date:
          type: string
          format: date-time
          description: >-
            Start date of the cycle. The datetime format follows the ISO 8601
            standard `yyyy-mm-ddThh:mm:ss.sssZ`.
          example: '2024-12-01T00:00:00Z'
    UpdatePayoutAccountRequest:
      type: object
      required:
        - payout_account
      properties:
        payout_account:
          $ref: '#/components/schemas/PayoutAccount'
    UpdatePayoutAccountResponse:
      type: object
      properties:
        payout_account:
          $ref: '#/components/schemas/PayoutAccount'
        updated_at:
          type: string
          format: date-time
          description: The date and time when the payout account was updated
          example: '2024-01-23T13:26:25.000Z'
    PenaltySimulationRequest:
      type: object
      required:
        - withdrawal_date
      properties:
        withdrawal_amount:
          type: number
          description: >
            The amount the customer intends to withdraw. When omitted, the
            system fetches the current book balance from Bank Statements API.
            When provided, it must not exceed the current book balance.
          example: 5000
        withdrawal_date:
          type: string
          format: date-time
          description: Simulated withdrawal date in ISO 8601 format.
          example: '2026-06-15T00:00:00Z'
    PenaltySimulationResponse:
      type: object
      properties:
        withdrawal_amount:
          type: number
          description: >-
            The withdrawal amount used in the simulation (equals book_balance
            when omitted in request)
          example: 40667.17
        withdrawal_date:
          type: string
          format: date-time
          description: The withdrawal date used in the simulation in ISO 8601 format.
          example: '2026-12-15T00:00:00Z'
        penalty_rule_applied:
          type: array
          description: >
            List of penalty rules that applies to the withdrawal, omitted if no
            penalties apply.
          items:
            $ref: '#/components/schemas/PenaltyRuleApplied'
        penalty_amount:
          type: number
          description: >-
            The total penalty amount applied to the withdrawal, combining all
            relevant penalty rules.
          example: 231.75
        penalty_breakdown:
          $ref: '#/components/schemas/PenaltyBreakdown'
        currency:
          type: string
          description: >-
            The currency in ISO 4217 alphabetic format, omitted if no penalty
            applies.
          example: BRL
        gross_amount:
          type: number
          description: >
            The gross amount of the deposit account, calculated as the sum of
            the total balance without interest plus the total interest earned.
            Always present; 0 when no total record exists.
          example: 41329.34
        interest_earned_amount:
          type: number
          description: >
            The total interest earned (paid/capitalized) on the account. Always
            present; 0 when no total record exists.
          example: 667.17
        net_amount:
          type: number
          description: >
            The net amount after deducting penalties from the gross amount:
            `gross_amount - penalty_amount`.
          example: 41097.59
        simulation_timestamp:
          type: string
          format: date-time
          description: >-
            The date and time of the simulation, formatted according to ISO
            8601.
          example: '2026-06-19T19:22:55Z'
    PenaltyRuleApplied:
      type: object
      description: A single penalty rule applied during a simulated withdrawal
      properties:
        type:
          type: string
          enum:
            - percentage
            - fixed
          description: >
            The penalty calculation type.

            - `percentage`: The penalty calculated as a percentage of the
            withdrawal amount

            - `fixed`: The penalty is a fixed amount
          example: percentage
        value:
          type: number
          description: >
            The penalty value. For `percentage`, this represents the percentage
            rate, for example, `2.5` = 2.5%. For `fixed`, this is the absolute
            amount in the account's currency.
          example: 2.5
        description:
          type: string
          description: Describes the penalty rule that triggers the penalty
          example: Early withdrawal after opening penalty
    PenaltyBreakdown:
      type: object
      description: >-
        Breakdown of the total penalty amount by calculation type. Omitted when
        no penalty applies.
      properties:
        fixed_amount:
          type: number
          description: The sum of all fixed-amount penalties
          example: 50
        percentage_amount:
          type: number
          description: The sum of all percentage-based penalties
          example: 75.5
    UnifiedDepositOpenRequest:
      type: object
      required:
        - account
        - deposit_attachment
      description: >
        Creates or locates a deposit account and attaches a deposit product in a
        single request.
      properties:
        account:
          $ref: '#/components/schemas/UnifiedOpenAccount'
        deposit_attachment:
          $ref: '#/components/schemas/UnifiedOpenDepositAttachment'
        account_creation:
          $ref: '#/components/schemas/UnifiedOpenAccountCreation'
        metadata:
          type: object
          description: >
            The metadata object contains user-defined key-value pairs that
            provide additional context or custom information.<br>

            Metadata content is not controlled by the Pismo platform and is
            instead controlled by the user.<br>


            **Note**: This field must not be used to send Personally
            Identifiable Information (PII), Payment Card Industry (PCI) data, or
            any sensitive/regulated information. Metadata fields are intended
            for operational, non-sensitive data only. For sensitive data, use
            the specific parameters designed for that purpose. For more
            information, refer to [Get started with Pismo
            APIs](ref:get-started-with-pismo-apis).
          example:
            key: value
    UnifiedOpenAccount:
      type: object
      required:
        - external_account_id
      description: Identifies the account to which the deposit product is attached
      properties:
        external_account_id:
          type: string
          description: >
            The external account ID identifies the transaction banking account.
            The Pismo platform uses this ID to find the account via the
            transaction banking API and attach the specified deposit product.
          example: ext-acct-001
        account_id:
          type: integer
          format: int64
          description: >
            Pismo account ID. When provided, the Pismo platform locates the
            account using `external_account_id` and validates the ID.

            If omitted, the Pismo platform uses `account_creation` to create a
            new account.
          example: 123456
    UnifiedOpenAccountCreation:
      type: object
      required:
        - program_id
        - division_code
        - applicant
      description: >
        Account creation parameters. Required when `account.account_id` is not
        provided.

        Pismo platform uses these fields to create a new transaction banking
        account via the transaction banking API.
      properties:
        program_id:
          type: integer
          format: int64
          description: Program ID to associate the new account with
          example: 100
        division_code:
          type: string
          description: Division code for the new account
          example: '001'
        applicant:
          $ref: '#/components/schemas/UnifiedOpenApplicant'
        currency_code:
          type: string
          description: >-
            ISO 4217 currency code for the account. If omitted, the default
            currency for the program is used.
          example: USD
        account_creation_datetime:
          type: string
          format: date-time
          minLength: 24
          maxLength: 24
          description: >-
            Account creation timestamp is passed directly to the
            transaction‑banking API as an ISO 8601 value
            (`yyyy‑mm‑ddThh:mm:ss.sssZ`, 24 characters). The field is optional
            and omitted when not supplied, and all validation is handled by the
            transaction banking API.
          example: '2026-06-24T14:49:36.017Z'
    UnifiedOpenApplicant:
      type: object
      required:
        - document_number
        - name
      description: Applicant information for account creation
      properties:
        document_number:
          type: string
          description: >-
            Applicant document number. For example, CPF or the US social
            security number.
          example: '12345678900'
        name:
          type: string
          description: Applicant's full name
          example: John Doe
    UnifiedOpenDepositAttachment:
      type: object
      required:
        - product_id
      description: Deposit product attachment configuration
      properties:
        product_id:
          type: string
          description: Product ID of the deposit product to attach
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        deposit_configs:
          $ref: '#/components/schemas/DepositConfigs'
    UnifiedDepositOpenResponse:
      type: object
      description: >-
        Response returned after successfully opening a deposit account and
        attaching a product
      properties:
        account_id:
          type: integer
          format: int64
          description: Pismo account ID (new or existing)
          example: 123456
        external_account_id:
          type: string
          description: External account ID
          example: ext-acct-001
        product_id:
          type: string
          description: Product ID of the attached deposit product
          example: 2c336e9d-d04f-4fd0-8f6e-25808f48d70c
        deposit_configs:
          type: object
          description: Deposit configuration after attachment
          properties:
            maturity_period:
              $ref: '#/components/schemas/MaturityPeriod'
            renewal_term:
              type: object
              description: >-
                Renewal term configuration, present only when the override
                includes a renewal term.
              properties:
                unit:
                  $ref: '#/components/schemas/MaturityPeriodUnit'
                value:
                  $ref: '#/components/schemas/MaturityPeriodValue'
                renewal_calendar_maturity_date:
                  type: string
                  format: date
                  description: Explicit renewal maturity date
                  example: '2028-06-15'
            payout_account:
              $ref: '#/components/schemas/PayoutAccount'
            maturity_instructions:
              $ref: '#/components/schemas/MaturityInstructionsOverrideRequest'
            penalties:
              $ref: '#/components/schemas/PenaltiesOverrideRequest'
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    400BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request
              value:
                code: EIBACC0008
                message: Bad Request
                details: >-
                  error EIBACC0008: Validation error [(Field 'Order' is
                  invalid)]
            maturityPeriodMutuallyExclusive:
              summary: >-
                maturity_period — calendar_maturity_date and unit/value are
                mutually exclusive
              value:
                code: EIBACC0307
                message: Validation error
                details: >-
                  maturity_period accepts either calendar_maturity_date OR
                  unit+value, not both. Choose one: send calendar_maturity_date
                  for an explicit date, or unit+value for a relative period.
            calendarMaturityDateInvalidFormat:
              summary: >-
                maturity_period — calendar_maturity_date is not in YYYY-MM-DD
                format
              value:
                code: EIBACC0305
                message: Validation error
                details: calendar_maturity_date must be in YYYY-MM-DD format
            calendarMaturityDateNotFuture:
              summary: maturity_period — calendar_maturity_date is not a future date
              value:
                code: EIBACC0306
                message: Validation error
                details: calendar_maturity_date must be a future date (after today)
            effectiveDateInFuture:
              summary: effective_date cannot be in the future
              value:
                code: EIBACC0308
                message: Effective date cannot be in the future
            effectiveDateTooFarInPast:
              summary: effective_date exceeds maximum backdating limit
              value:
                code: EIBACC0309
                message: Effective date exceeds maximum backdating limit
            effectiveDateInvalidFormat:
              summary: effective_date is not in YYYY-MM-DD format
              value:
                code: EIBACC0310
                message: Invalid effective date format. Expected YYYY-MM-DD
    404NotFound:
      description: Bad request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequestBody:
              summary: Bad Request
              value:
                code: EIBACC0064
                message: Product not found
    409Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              summary: Conflict
              value:
                code: EIBACC0114
                message: Product is already detached
    500InternalServer:
      description: Internal error
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalProcessingError:
              summary: Internal processing error
              value:
                code: EIBACC0007
                message: Internal error
                detail: Internal error
paths:
  /v1/products:
    get:
      tags:
        - Product
      summary: List products
      description: |
        Return a list of an organization's savings and time-deposit accounts.
      operationId: interest-bearing-v1-list-products
      parameters:
        - $ref: '#/components/parameters/beginDateTimeQuery'
        - $ref: '#/components/parameters/endDateTimeQuery'
        - $ref: '#/components/parameters/afterIdQuery'
        - $ref: '#/components/parameters/perPageQuery'
        - $ref: '#/components/parameters/orderQuery'
        - $ref: '#/components/parameters/productTypeQuery'
        - $ref: '#/components/parameters/statusQuery'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits:
    post:
      tags:
        - Product
      summary: Create deposit product
      description: >
        Create an organization's time deposit accounts. Time deposit accounts,
        such as CDs, require you to keep your funds in the account for a
        mutually agreed amount for a specific period of time.<br>

        This endpoint generates the [Deposit product
        created](https://developers.pismo.io/events/docs/deposit-product-creation-1)
        event.

        For information about interest-bearing accounts, refer to
        [Interest-bearing accounts](doc:interest-bearing-accounts).
      operationId: interest-bearing-v1-create-deposit-product
      parameters:
        - $ref: '#/components/parameters/authorizationTokenHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepositProductRequest'
      responses:
        '201':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/deposits/{productId}:
    get:
      tags:
        - Product
      summary: Get deposit product
      description: >
        Get deposit product by product ID. Note that product ID is
        Pismo-generated.
      operationId: interest-bearing-v1-get-deposit-products
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenHeader'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositProduct'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
    patch:
      tags:
        - Product
      summary: Update deposit product
      description: >
        Update deposit by product ID. Note that product ID is
        Pismo-generated.<br>

        This endpoint generates the [Deposit product
        updated](https://developers.pismo.io/events/docs/deposit-product-update-1)
        event.
      operationId: interest-bearing-v1-patch-deposit-product
      parameters:
        - $ref: '#/components/parameters/productId'
        - $ref: '#/components/parameters/authorizationTokenGenericHeader'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductRequest'
      responses:
        '204':
          description: Success
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServer'
  /v1/savings-accounts:
    post:
      tags:
        - Product
      summary: Create savings account product
      description: >
