        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  summary: Generic validation error
                  value:
                    code: EIBACC0008
                    message: Bad Request
                overrideValidUntilPast:
                  summary: valid_until must be a future datetime
                  value:
                    code: EIBACC0308
                    message: valid_until must be a future datetime
                renewalTermMutuallyExclusive:
                  summary: >-
                    renewal_term — calendar date and unit/value are mutually
                    exclusive
                  value:
                    code: EIBACC0309
                    message: Validation error
                    details: >-
                      renewal_term accepts either renewal_calendar_maturity_date
                      OR unit+value, not both.
                renewalTermRequiresRollover:
                  summary: renewal_term requires ROLLOVER in maturity_instructions
                  value:
                    code: EIBACC0310
                    message: Validation error
                    details: >-
                      renewal_term requires ROLLOVER configured in
                      maturity_instructions.principal or
                      maturity_instructions.interest (account/program override
                      or product default).
                renewalCalendarMaturityDateNotFuture:
                  summary: renewal_calendar_maturity_date must be a future date
                  value:
                    code: EIBACC0311
                    message: Validation error
                    details: >-
                      renewal_calendar_maturity_date must be a future date
                      (after today)
                renewalTermFieldsMissing:
                  summary: >-
                    renewal_term requires unit+value or
                    renewal_calendar_maturity_date
                  value:
                    code: EIBACC0312
                    message: Validation error
                    details: >-
                      renewal_term requires either both unit and value, or
                      renewal_calendar_maturity_date
        '404':
          $ref: '#/components/responses/404NotFound'
        '409':
          $ref: '#/components/responses/409Conflict'
        '500':
          description: Internal Server Error
          content:
            application/json:
