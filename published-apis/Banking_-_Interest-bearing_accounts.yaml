                    code: EIBACC0317
                    message: >-
                      deposit_configs.overrides.penalties is not supported at
                      program-level; apply per-account instead
                programLevelMaturityInstructionsNotSupported:
                  summary: maturity_instructions not supported at program-level
                  value:
                    code: EIBACC0318
                    message: >-
                      deposit_configs.overrides.maturity_instructions is not
                      supported at program-level; apply per-account instead
                renewalTermRequiresRollover:
                  summary: renewal_term requires ROLLOVER in maturity_instructions
                  value:
                    code: EIBACC0310
                    message: Validation error
                    details: >-
                      renewal_term requires ROLLOVER configured in
                      maturity_instructions.principal or
                      maturity_instructions.interest (account/program override
                      or product default).
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                attachmentNotFound:
                  summary: Active deposit attachment not found for this program
                  value:
                    code: EIBACC0113
                    message: Product attachment not found
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                attachmentNotActive:
                  summary: Attachment is not active
                  value:
                    code: EIBACC0301
                    message: Product attachment is not active
                optimisticLock:
                  summary: Product attachment was modified concurrently
                  value:
                    code: EIBACC0314
                    message: >-
                      Product attachment was modified concurrently; retry with
                      the latest state
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
