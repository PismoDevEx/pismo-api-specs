  /v1/payments/bacs/directcredit/return/{id}:
    post:
      summary: Return BACS direct credit inbound payment [beta]
      description: >
        Initiates a client return for a settled BACS direct credit inbound
        payment. The return amount must match the original transaction amount
        exactly, since the platform does not allow partial returns. The platform
        permits only one return per original transaction.


        Returns initiated through this endpoint are marked with `return_origin`
        = `CLIENT` to distinguish them from system-initiated returns
        (`return_origin` = `SYSTEM`).


        This endpoint generates a [BACS direct credit inbound return payment
        processed](https://developers.pismo.io/events/docs/bacs-direct-credit-in-return-status-change-1)
        event with `return_origin` = `CLIENT`.
      operationId: post-bacs-client-return
      tags:
        - BACS
      parameters:
        - $ref: '#/components/parameters/authHeader'
        - $ref: '#/components/parameters/tenantHeader'
        - $ref: '#/components/parameters/reqTrackingIdHeader'
        - $ref: '#/components/parameters/idempotencyKeyHeader'
        - $ref: '#/components/parameters/idPath'
