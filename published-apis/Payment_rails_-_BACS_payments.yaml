  /v1/payments/bacs/directcredit/cancel/{id}:
    post:
      summary: Cancel BACS inbound transaction [beta]
      description: >
        Cancel a suspended transaction, which was kept on hold based on client's
        anti-fraud (AF) provider analysis, and return the transaction.


        **Suspense transaction flow**


        You can use the suspense transaction flow to manage incoming BACS
        transactions that have been temporarily placed on hold due to suspected
        fraud pending a decision from the client's anti-fraud (AF) provider.


        **Supported scenarios:**

          * An incoming (cash-in) BACS transaction is received.

          * Client' s anti-fraud provider returns "hold" instead of approve or reject.

          * Pismo places the transaction amount into additional fund (unavailable balance) so the beneficiary cannot use the funds until a final decision is made.

          * The client later calls Pismo's [release](ref:post-release-bacs-1) or cancel endpoints to finalize the transaction.

        This endpoint generates a [BACS direct credit inbound payment
        processed](https://developers.pismo.io/events/docs/bacs-direct-credit-in-status-change-1)
        event with `status` = `CANCELLED`.
