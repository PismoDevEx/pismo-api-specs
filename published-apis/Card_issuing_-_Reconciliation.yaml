openapi: 3.0.0
info:
  title: Card issuing - Reconciliation
  version: 1.0.0
  description: Model for the Network transactions backoffice endpoints
  contact:
    name: API Support
    url: https://developers.pismo.io/support
  license:
    name: Copyright Pismo
servers:
  - url: https://sandbox.pismolabs.io/network-transactions-backoffice-api
    description: Sandbox API server for testing for transactions backoffice
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Account access token. Tokens can expire quickly, which can result in an
        "Unauthorized" error.
      bearerFormat: JWT
  parameters: {}
  schemas:
    ReconciliationRequest:
      type: object
      properties:
        card_network:
          type: string
          description: Card network
          example: valid card network
        card_hash:
          type: string
          description: Card hash
          example: valid card hash
        reconciliation_reason:
          type: string
          description: Reason for reconciliation
          example: valid reason
        adjustments:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Field to be adjusted
                example: valid field
              new_value:
                type: string
                description: New value for the field
                example: valid field value
                required:
                  - field
                  - new_value
      required:
        - card_hash
        - card_network
        - reconciliation_reason
    ReconciliationResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
          example: The message has been received and is being processed.
      required:
        - message
    DLQTransactionsResponse:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/DLQTransaction'
    DLQTransaction:
      type: object
      properties:
        card_network:
          type: string
        card_hash:
          type: string
        reconciliation_reason:
          type: string
        authorization_code:
          type: string
        correlation_id:
          type: string
        created_at:
          type: string
        action:
          type: string
        count_retries:
          type: integer
        authorization_status:
          type: string
    TransactionDetailsResponse:
      type: object
      properties:
        card_network:
          type: string
          example: VISA
        card_hash:
          type: string
          example: abc123hash
        reconciliation_reason:
          type: string
          example: PENDING
        cid:
          type: string
          description: Correlation ID
          example: 7e5213b7-e0a3-46f4-bb6a-2c4f38e413fb
        caller:
          type: string
          example: Visa
        org_id:
          type: string
          example: TN-b77ecb37-d149-4674-a499-af0d11e404864
        authorization_transaction_amount:
          type: string
          example: '100.00'
        authorization_code:
          type: string
          example: '123456'
        authorization_cid:
          type: string
          example: auth-cid-123
        authorization_status:
          type: string
          example: APPROVED
        authorization_processing_code:
          type: string
          example: '000000'
        clearing_authorization_code:
          type: string
          example: '654321'
        clearing_processing_code:
          type: string
          example: '000000'
        clearing_transaction_amount:
          type: string
          example: '100.00'
        message:
          type: object
          nullable: true
          description: Raw clearing message from ClearingTransactions table
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Error code
          example: BTN0000
        message:
          type: string
          description: Error message
          example: 'Validation error: Test message'
      required:
        - code
        - message
  responses:
    400BadRequest:
      description: >-
        The request is not acceptable, the syntax is malformed, for example,
        some type number parameter with a text content.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    401Unauthorized:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    403Forbidden:
      description: The request has been lost
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404NotFound:
      description: The specified resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    500InternalServerError:
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
security:
  - BearerAuth: []
tags:
  - name: Network transactions backoffice
    description: Network transactions backoffice related endpoints
  - name: health
    description: Health check endpoints
paths:
  /v1/clearing-reconciliation:
    post:
      summary: Perform clearing reconciliation
      description: >-
        Perform clearing reconciliation using the provided clearing message. The
        clearing message must be pending to enable reprocessing.
      operationId: performClearingReconciliation
      tags:
        - Network transactions backoffice
      security:
        - BearerAuth: []
      parameters: []
      requestBody:
        description: Clearing reconciliation request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationRequest'
      responses:
        '202':
          description: Reconciliation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalServerError'
